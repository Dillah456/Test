<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saule</title>

<style>
/* RESET */
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: system-ui, sans-serif;
}

/* Layout */
.layout {
  display: flex;
  min-height: 100vh;
  background: #f8fafc;
}

/* Sidebar */
.sidebar {
  width: 220px;
  background: #ffffff;
  border-right: 1px solid #dee2e6;
  padding: 20px;
  transition: transform 0.3s ease;
}

.sidebar h3 {
  margin-bottom: 15px;
}

.sidebar button {
  width: 100%;
  margin-bottom: 10px;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #dee2e6;
  background: #f8fafc;
  cursor: pointer;
  font-size: 15px;
}

.sidebar button:hover {
  background: #e9ecef;
}

/* Content */
.content {
  flex: 1;
  padding: 15px;
}

/* Topbar */
.topbar {
  display: none;
  align-items: center;
  gap: 12px;
  padding: 12px 15px;
  background: #ffffff;
  border-bottom: 1px solid #dee2e6;
  font-weight: 600;
}

.menu-btn {
  font-size: 24px;
  background: none;
  border: none;
  cursor: pointer;
}

/* Iframe */
.iframe-container {
  border: 2px solid #dee2e6;
  border-radius: 15px;
  overflow: hidden;
}

iframe {
  width: 100%;
  height: 85vh;
  border: none;
}

/* Overlay */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 999;
}

/* ========== MOBILE ========== */
@media (max-width: 768px) {
  .layout {
    flex-direction: column;
  }

  .sidebar {
    position: fixed;
    inset: 0;
    width: 80%;
    max-width: 300px;
    transform: translateX(-100%);
    z-index: 1000;
  }

  .sidebar.active {
    transform: translateX(0);
  }

  .overlay.active {
    display: block;
  }

  .topbar {
    display: flex;
  }

  iframe {
    height: calc(100vh - 60px);
  }
}
</style>
</head>

<body>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <h3>Oort Archive</h3>
    <button onclick="loadFrame('https://www.oort678.my.id')">Oort</button>
    <button>
      <a href="/REAP/4_Ponder/House-7/index.html">
        Ekspresi
      </a>
    </button>
    <button onclick="loadFrame('https://pesonasukabumii.blogspot.com/')">
      Service
    </button>
    <button onclick="window.open('https://desert-straw-899.notion.site/2cb6e99e5bc880a996e5debaedecfaf4?v=2cb6e99e5bc8813e99f5000c427b8386','_blank')">
      Project
    </button>
    <button>
      <a href="/REAP/4_Ponder/House-1/Neo-Beta/Sirius.html">
        Neo Beta
      </a>
    </button>
    
    <button>
      <a href="/REAP/4_Ponder/House-8/Shinano.html">
        GJ3991
      </a>
    </button>
    <button>
      <a href="BSC/PRTS.html">
        PRTS


      </a>
    </button>
  </aside>

  <!-- Overlay -->
  <div class="overlay" id="overlay" onclick="toggleSidebar()"></div>

  <!-- Main -->
  <main class="content">
    <div class="topbar">
      <button class="menu-btn" onclick="toggleSidebar()">☰</button>
      <span>Saule</span>
    </div>

    <div class="iframe-container">
      <iframe id="contentFrame" src="https://www.oort678.my.id"></iframe>
    </div>
  </main>

</div>

<script src="core.js"></script>
<script>
function toggleSidebar() {
  document.getElementById("sidebar").classList.toggle("active");
  document.getElementById("overlay").classList.toggle("active");
}

function loadFrame(url) {
  document.getElementById("contentFrame").src = url;
  toggleSidebar();
}

function openLocalProject(path) {
  window.open(path, "_blank", "noopener,noreferrer");
  toggleSidebar();
}
</script>

</body>
</html>
