<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kisaki — Quotes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #131720; --surface2: #181d29;
    --border: #262d3e; --border2: #313a52;
    --gold: #7aabcc; --gold2: #a8d4f0; --blue: #7aa3c4; --red: #c47a7a;
    --text: #cdd8e3; --muted: #6b7d8f; --dim: #3e4f60; --active-bg: #141c2a;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Georgia', serif; font-size: 15px; line-height: 1.6; min-height: 100vh; }
  .site-header { background: var(--surface); border-bottom: 2px solid var(--gold); padding: 28px 40px 22px; display: flex; align-items: flex-end; gap: 32px; flex-wrap: wrap; }
  .site-header h1 { font-size: 2.4rem; font-weight: normal; letter-spacing: 0.04em; color: var(--gold2); line-height: 1; }
  .site-header .sub { font-size: 0.78rem; color: var(--muted); letter-spacing: 0.18em; text-transform: uppercase; margin-top: 6px; }
  .header-meta { margin-left: auto; text-align: right; font-size: 0.78rem; color: var(--muted); line-height: 1.8; }
  .header-meta strong { display: block; color: var(--gold); font-size: 1.2rem; font-weight: normal; }
  .lang-bar { background: var(--surface2); border-bottom: 1px solid var(--border); padding: 10px 40px; display: flex; align-items: center; gap: 6px; }
  .lang-bar span { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.12em; margin-right: 10px; }
  .lang-btn { background: none; border: 1px solid var(--border2); color: var(--muted); padding: 5px 16px; cursor: pointer; font-family: 'Georgia', serif; font-size: 0.78rem; letter-spacing: 0.06em; border-radius: 2px; transition: all 0.15s; }
  .lang-btn:hover { border-color: var(--gold); color: var(--gold2); }
  .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: bold; }
  #np-bar { position: sticky; top: 0; z-index: 200; background: rgba(13,15,20,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--gold); padding: 10px 40px; display: none; align-items: center; gap: 16px; }
  #np-bar.on { display: flex; }
  .np-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); animation: blink 1.2s ease-in-out infinite; flex-shrink: 0; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.2; } }
  #np-label { flex: 1; font-size: 0.82rem; color: var(--gold2); }
  #np-label small { color: var(--muted); font-size: 0.72rem; margin-left: 8px; }
  #np-stop { background: none; border: 1px solid var(--border2); color: var(--muted); padding: 4px 12px; cursor: pointer; font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; font-family: 'Georgia', serif; border-radius: 2px; transition: all 0.15s; }
  #np-stop:hover { border-color: var(--red); color: var(--red); }
  /* ===============================
     FEATURED VIEWER (gambar + voiceline berpasangan)
     Pola kontrol diadaptasi dari Sirius.html (index sinkron
     antara gambar & audio), desain disesuaikan tema gelap.
  ================================ */
  .featured { padding: 30px 40px 10px; max-width: 1320px; margin: 0 auto; }
  .featured-heading { display: flex; align-items: baseline; gap: 14px; padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 18px; }
  .featured-heading h2 { font-size: 1.15rem; font-weight: normal; color: var(--gold2); letter-spacing: 0.03em; }
  .featured-count { font-size: 0.68rem; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-left: auto; }

  .featured-cards { display: flex; gap: 22px; align-items: stretch; }

  .card-image { flex: 0 0 240px; display: flex; flex-direction: column; align-items: flex-start; gap: 12px; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }

  .featured-viewer { width: 100%; display: flex; flex-direction: column; gap: 8px; align-items: flex-start; }
  .featured-viewer-frame { width: 100%; border-radius: 8px; overflow: hidden; background: var(--surface2); border: 1px solid var(--border2); display: flex; align-items: center; justify-content: center; }
  .featured-viewer img { width: 100%; height: 220px; object-fit: cover; display: block; opacity: 0; transition: opacity 0.4s ease; cursor: zoom-in; }
  .featured-viewer img.show { opacity: 1; }

  /* Lightbox / Image Viewer */
  #lightbox-overlay {
    position: fixed; inset: 0; z-index: 500; background: rgba(8,9,12,0.92);
    display: none; align-items: center; justify-content: center; padding: 40px;
    backdrop-filter: blur(4px);
  }
  #lightbox-overlay.on { display: flex; }
  #lightbox-overlay img {
    max-width: 100%; max-height: 100%; border-radius: 6px;
    box-shadow: 0 12px 48px rgba(0,0,0,0.6); border: 1px solid var(--border2);
    cursor: zoom-out;
  }
  #lightbox-close {
    position: absolute; top: 24px; right: 32px; background: none; border: 1px solid var(--border2);
    color: var(--muted); width: 36px; height: 36px; border-radius: 50%; cursor: pointer;
    font-family: 'Georgia', serif; font-size: 1.1rem; line-height: 1; transition: all 0.15s;
  }
  #lightbox-close:hover { border-color: var(--gold); color: var(--gold2); }
  #lightbox-caption {
    position: absolute; bottom: 28px; left: 0; right: 0; text-align: center;
    font-size: 0.78rem; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted);
  }
  .featured-viewer-title { font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--gold); text-align: left; word-break: break-word; }

  .featured-audio-row { display: flex; align-items: center; gap: 10px; width: 100%; justify-content: flex-start; }
  .featured-audio-row audio { width: 100%; height: 32px; }

  .iframe-sync-toggle { display: flex; align-items: center; gap: 8px; font-size: 0.74rem; color: var(--muted); letter-spacing: 0.03em; user-select: none; justify-content: flex-start; width: 100%; }
  .iframe-sync-toggle input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--gold); cursor: pointer; }
  .iframe-sync-toggle label { cursor: pointer; }

  .featured-controls { display: flex; flex-direction: column; gap: 8px; width: 100%; align-items: flex-start; }
  .featured-controls button { width: 100%; text-align: left; padding: 8px 16px; border-radius: 6px; background: var(--surface2); color: var(--text); border: 1px solid var(--border2); cursor: pointer; font-family: 'Georgia', serif; font-size: 0.82rem; letter-spacing: 0.04em; transition: all 0.15s; }
  .featured-controls button:hover { border-color: var(--gold); color: var(--gold2); }

  .card-iframe { flex: 1; display: flex; flex-direction: column; gap: 14px; min-width: 0; background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
  .featured-iframe-row { display: flex; flex-direction: column; gap: 8px; flex: 1; }
  .featured-iframe-row iframe { width: 100%; height: 480px; border: 1px solid var(--border2); border-radius: 6px; background: var(--surface2); display: block; }

  .featured-quote { font-size: 1rem; line-height: 1.7; color: var(--text); }
  .featured-quote .lang-text { display: none; }
  .featured-quote .lang-text.visible { display: block; }

  @media (max-width: 900px) {
    .featured-iframe-row iframe { height: 340px; }
  }

  @media (max-width: 640px) {
    .featured { padding-left: 16px; padding-right: 16px; }
    .featured-cards { flex-direction: column; }
    .card-image { flex: none; width: 100%; padding: 16px; }
    .featured-viewer img { height: 200px; }
    .card-iframe { padding: 16px; }
    .featured-iframe-row iframe { height: 260px; }
  }

  footer { border-top: 1px solid var(--border); padding: 24px 40px; font-size: 0.72rem; color: var(--dim); text-align: center; letter-spacing: 0.06em; }
  footer a { color: var(--blue); text-decoration: none; }
  footer a:hover { text-decoration: underline; }
  @media (max-width: 640px) {
    .site-header, .lang-bar { padding-left: 16px; padding-right: 16px; }
    #np-bar { padding: 10px 16px; }
  }
</style>
</head>
<body>

<header class="site-header">
  <div>
    <h1>Kisaki</h1>
    <div class="sub">竜華キサキ · Genryumon · Blue Archive</div>
  </div>
  <div class="header-meta">
    <strong id="total-n">—</strong>
    paired voice lines
  </div>
</header>

<div class="lang-bar">
  <span>Transcription</span>
  <button class="lang-btn active" data-lang="jp">日本語</button>
  <button class="lang-btn" data-lang="en">English</button>
</div>

<section class="featured">
  <div class="featured-heading">
    <h2>Featured Moment</h2>
    <span class="featured-count" id="featured-count">—</span>
  </div>
  <div class="featured-cards">
    <div class="card-image">
      <div class="featured-viewer">
        <div class="featured-viewer-frame">
          <img id="featured-img" alt="Kisaki" title="Klik untuk memperbesar">
        </div>
        <div class="featured-viewer-title" id="featured-event">—</div>
      </div>
      <div class="featured-audio-row">
        <audio id="featured-audio" controls></audio>
      </div>
      <div class="iframe-sync-toggle">
        <input type="checkbox" id="iframe-sync-checkbox" checked>
        <label for="iframe-sync-checkbox">Sync iframe with Next/Previous/Random</label>
      </div>
      <div class="iframe-sync-toggle">
        <input type="checkbox" id="autoplay-audio-checkbox" checked>
        <label for="autoplay-audio-checkbox">Autoplay Audio</label>
      </div>
      <div class="featured-controls">
        <button onclick="prevFeatured()">⏮ Sebelumnya</button>
        <button onclick="nextFeatured()">⏭ Selanjutnya</button>
        <button onclick="randomFeatured()">🎲 Acak</button>
      </div>
    </div>
    <div class="card-iframe">
      <div class="featured-iframe-row">
        <iframe id="featured-iframe" title="Kisaki reference"></iframe>
      </div>
      <div class="featured-quote" id="featured-quote"></div>
    </div>
  </div>
</section>

<div id="np-bar">
  <div class="np-dot"></div>
  <div id="np-label">— <small></small></div>
  <button id="np-stop">Stop</button>
</div>

<div id="lightbox-overlay">
  <button id="lightbox-close" aria-label="Close">✕</button>
  <img id="lightbox-img" alt="">
  <div id="lightbox-caption"></div>
</div>

<footer>
  Source: <a href="https://bluearchive.wiki/wiki/Kisaki/audio" target="_blank">Blue Archive Wiki</a>
  &nbsp;·&nbsp; Audio © Nexon / Yostar
</footer>

<audio id="aud"></audio>

<script>
// ======================================================
// 1. DEKLARASI VARIABEL & DATA (semua di atas dulu)
// ======================================================

// --- Pasangan gambar + voiceline + iframe (untuk Featured Viewer) ---
// Setiap entri WAJIB punya image + url (audio) berpasangan.
// Field "iframe" ikut berganti bersama image/audio saat navigasi,
// TAPI hanya jika checkbox sinkronisasi sedang aktif (lihat bagian 4).
// Voice line yang tidak memiliki pasangan gambar tidak dimasukkan di sini.
const VIEWER_PAIRS = [
  {
    image: "https://safebooru.org//images/4162/f68ca2b71c56624bcfd771f6ff0099f076c8caa0.jpg",
    event: "Title",
    url: "https://static.wikitide.net/bluearchivewiki/5/5c/Kisaki_Title.ogg",
    iframe: "http://oort678.my.id/",
    jp: "ブルーアーカイブ、じゃ。",
    en: "It's Blue Archive."
  },
  {
    image: "https://safebooru.org//images/62/b853c8c102dd042a51ff4110471ccf359890ac14.png",
    event: "Gachaget",
    url: "https://static.wikitide.net/bluearchivewiki/5/58/Kisaki_Gachaget.ogg",
    iframe: "https://bluearchive.wiki/wiki/Kisaki",
    jp: "山海経高級中学校、玄龍門の門主。竜華キサキじゃ。 ふふ。妾の力が必要かの？",
    en: "I'm Ryuuge Kisaki, president of Shanhaijing Academy's Genryumon. Fufu. Is it in my power to assist you?"
  },
  {
    image: "https://safebooru.org//images/1341/5c26ddafa995c003b044c0d5fd836ab3a21aa8c5.jpg",
    event: "Season_Birthday_1",
    url: "https://static.wikitide.net/bluearchivewiki/e/e7/Kisaki_Season_Birthday_1.ogg",
    iframe: "https://bluearchive.wiki/wiki/Kisaki/audio",
    jp: "……そうか、覚えていたか。",
    en: "...I see. You remembered."
  },
  {
    image: "https://safebooru.org//images/1341/bbbf685924223fa060621b36b41157605cc355a1.png",
    event: "Season_Xmas",
    url: "https://static.wikitide.net/bluearchivewiki/8/84/Kisaki_Season_Xmas.ogg",
    iframe: "https://bluearchive.wiki/wiki/Kisaki/audio",
    jp: "クリスマス……そうじゃな、 穏やかな日を過ごしてくれ。 リンゴを持ってきたが、 一緒に食べぬか？",
    en: "Is it Christmas? So it is. Then I wish you a day of peace."
  },
  {
    image: "https://safebooru.org//images/1339/ac1eaa1d539a4845580776b8d558d0b10e4ee461.jpg?6748168",
    event: "Relationship_Up_4",
    url: "https://static.wikitide.net/bluearchivewiki/e/e5/Kisaki_Relationship_Up_4.ogg",
    iframe: "https://bluearchive.wiki/wiki/Kisaki/audio",
    jp: "一期に一度の会、とは言うが、うら寂しいものじゃ。 ……じゃが、妾が先生を忘れることはない。 何があろうと、いつまでも、な。",
    en: "I would call our encounter as once in a lifetime, but that would be so very lonely. ...Even so, I will never forget you. No matter what happens. Forever. Alright."
  }
];

// --- Konstanta delay ---
const FEATURED_FADE_DELAY = 60; // delay kecil sebelum gambar fade-in saat index berganti


// ======================================================
// 2. REFERENSI DOM & STATE (state berubah saat runtime)
// ======================================================

const aud = document.getElementById('aud');
const npBar = document.getElementById('np-bar');
const npLabel = document.getElementById('np-label');
const npStop = document.getElementById('np-stop');
const featuredImg = document.getElementById('featured-img');
const featuredIframe = document.getElementById('featured-iframe');
const iframeSyncCheckbox = document.getElementById('iframe-sync-checkbox');
const autoplayAudioCheckbox = document.getElementById('autoplay-audio-checkbox');
const featuredCount = document.getElementById('featured-count');
const featuredEvent = document.getElementById('featured-event');
const featuredQuote = document.getElementById('featured-quote');
const featuredAudio = document.getElementById('featured-audio');
const lightboxOverlay = document.getElementById('lightbox-overlay');
const lightboxImg = document.getElementById('lightbox-img');
const lightboxCaption = document.getElementById('lightbox-caption');
const lightboxClose = document.getElementById('lightbox-close');

let currentLang = 'jp';
let featuredIndex = 0; // index gambar+voiceline yang sedang aktif di Featured Viewer
let iframeSyncEnabled = true; // true = iframe ikut berganti saat navigasi, false = iframe diam
let autoplayEnabled = true; // true = audio otomatis diputar saat featured berganti

// ======================================================
// 3. FUNGSI — AUDIO / NOW PLAYING
// ======================================================

function stopAll() {
  aud.pause(); aud.src = '';
  npBar.classList.remove('on');
}

// ======================================================
// 4. FUNGSI — FEATURED VIEWER (gambar + voiceline berpasangan)
//    Pola: satu index dipakai bersama untuk gambar, teks
//    quote, dan audio — seperti render() di Sirius.html.
// ======================================================

function renderFeatured(i) {
  const pair = VIEWER_PAIRS[i];
  if (!pair) return;

  // hentikan playback lain yang sedang aktif (table quote) supaya tidak tumpang tindih
  stopAll();
  featuredAudio.pause();

  // GAMBAR (fade-out lalu fade-in)
  featuredImg.classList.remove('show');
  setTimeout(() => {
    featuredImg.src = pair.image;
    featuredImg.alt = `Kisaki — ${pair.event}`;
    requestAnimationFrame(() => featuredImg.classList.add('show'));
  }, FEATURED_FADE_DELAY);

  // IFRAME (ikut berganti bersama pasangan ini HANYA jika sinkronisasi aktif)
  if (iframeSyncEnabled && pair.iframe) {
    featuredIframe.src = pair.iframe;
  }

  // TEKS QUOTE (mengikuti currentLang yang sudah ada di sistem lang-bar)
  featuredEvent.textContent = pair.event;
  featuredQuote.innerHTML = `
    <span class="lang-text${currentLang === 'jp' ? ' visible' : ''}" data-lang="jp">${pair.jp}</span>
    <span class="lang-text${currentLang === 'en' ? ' visible' : ''}" data-lang="en">${pair.en}</span>`;

  // AUDIO (siap diputar manual lewat tombol player; autoplay mengikuti checkbox)
  featuredAudio.src = pair.url;
  if (autoplayEnabled) {
    featuredAudio.play().catch(() => {});
  }

  // COUNTER
  featuredCount.textContent = `${i + 1} / ${VIEWER_PAIRS.length}`;
}

function nextFeatured() {
  featuredIndex = (featuredIndex + 1) % VIEWER_PAIRS.length;
  renderFeatured(featuredIndex);
}

function prevFeatured() {
  featuredIndex = (featuredIndex - 1 + VIEWER_PAIRS.length) % VIEWER_PAIRS.length;
  renderFeatured(featuredIndex);
}

function randomFeatured() {
  featuredIndex = Math.floor(Math.random() * VIEWER_PAIRS.length);
  renderFeatured(featuredIndex);
}

// ======================================================
// 4b. FUNGSI — IMAGE VIEWER (LIGHTBOX)
//     Klik gambar featured untuk memperbesar tampilannya.
// ======================================================

function openLightbox() {
  if (!featuredImg.src) return;
  lightboxImg.src = featuredImg.src;
  lightboxImg.alt = featuredImg.alt;
  lightboxCaption.textContent = featuredEvent.textContent;
  lightboxOverlay.classList.add('on');
}

function closeLightbox() {
  lightboxOverlay.classList.remove('on');
  lightboxImg.src = '';
}

featuredImg.addEventListener('click', openLightbox);
lightboxImg.addEventListener('click', closeLightbox);
lightboxClose.addEventListener('click', closeLightbox);
lightboxOverlay.addEventListener('click', (e) => {
  if (e.target === lightboxOverlay) closeLightbox();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && lightboxOverlay.classList.contains('on')) closeLightbox();
});


aud.addEventListener('ended', stopAll);
featuredAudio.addEventListener('play', () => stopAll()); // kalau featured diputar, hentikan playback dari table

iframeSyncCheckbox.addEventListener('change', () => {
  iframeSyncEnabled = iframeSyncCheckbox.checked;
  // saat dinyalakan kembali, langsung samakan iframe dengan pasangan yang aktif sekarang
  if (iframeSyncEnabled) {
    const pair = VIEWER_PAIRS[featuredIndex];
    if (pair && pair.iframe) featuredIframe.src = pair.iframe;
  }
});

autoplayAudioCheckbox.addEventListener('change', () => {
  autoplayEnabled = autoplayAudioCheckbox.checked;
});

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    document.querySelectorAll('.lang-text').forEach(el => {
      el.classList.toggle('visible', el.dataset.lang === currentLang);
    });
  });
});

document.getElementById('total-n').textContent = VIEWER_PAIRS.length;

// ======================================================
// 5. INISIASI
// ======================================================
renderFeatured(featuredIndex);
</script>
</body>
</html>
