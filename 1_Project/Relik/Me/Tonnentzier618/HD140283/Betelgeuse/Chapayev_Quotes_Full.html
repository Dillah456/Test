<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chapayev — Quotes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #11100e;
    --surface: #1a1916;
    --surface2: #222019;
    --border: #302e28;
    --border2: #3e3b33;
    --gold: #c9a96e;
    --gold2: #e8cfa0;
    --blue: #7aa3c4;
    --red: #c47a7a;
    --text: #ddd8ce;
    --muted: #857f74;
    --dim: #524e46;
    --active-bg: #1e1c17;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  .site-header {
    background: var(--surface);
    border-bottom: 2px solid var(--gold);
    padding: 28px 40px 22px;
    display: flex;
    align-items: flex-end;
    gap: 32px;
    flex-wrap: wrap;
  }

  .site-header h1 {
    font-size: 2.4rem;
    font-weight: normal;
    letter-spacing: 0.04em;
    color: var(--gold2);
    line-height: 1;
  }

  .site-header .sub {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .header-meta {
    margin-left: auto;
    text-align: right;
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.8;
  }

  .header-meta strong {
    display: block;
    color: var(--gold);
    font-size: 1.2rem;
    font-weight: normal;
  }

  /* ── LANG SWITCHER ── */
  .lang-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 40px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .lang-bar span {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-right: 10px;
  }

  .lang-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 16px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .lang-btn:hover { border-color: var(--gold); color: var(--gold2); }
  .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: bold; }

  /* ── NOW PLAYING ── */
  #np-bar {
    position: sticky;
    top: 0;
    z-index: 200;
    background: rgba(17,16,14,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gold);
    padding: 10px 40px;
    display: none;
    align-items: center;
    gap: 16px;
  }

  #np-bar.on { display: flex; }

  .np-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    animation: blink 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  #np-label {
    flex: 1;
    font-size: 0.82rem;
    color: var(--gold2);
  }

  #np-label small { color: var(--muted); font-size: 0.72rem; margin-left: 8px; }

  #np-stop {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 4px 12px;
    cursor: pointer;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
    border-radius: 2px;
    transition: all 0.15s;
  }
  #np-stop:hover { border-color: var(--red); color: var(--red); }

  /* ── MAIN LAYOUT ── */
  .page {
    max-width: 1080px;
    margin: 0 auto;
    padding: 36px 40px 80px;
  }

  /* ── SKIN SECTION ── */
  .skin-block {
    margin-bottom: 52px;
  }

  .skin-heading {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .skin-heading h2 {
    font-size: 1.15rem;
    font-weight: normal;
    color: var(--gold2);
    letter-spacing: 0.03em;
  }

  .skin-count {
    font-size: 0.68rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: auto;
  }

  /* ── TABLE ── */
  .qt {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .qt colgroup col:nth-child(1) { width: 180px; }
  .qt colgroup col:nth-child(2) { width: 52px; }
  .qt colgroup col:nth-child(3) { width: auto; }

  .qt thead th {
    padding: 7px 12px;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    text-align: left;
    font-weight: normal;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .qt tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }

  .qt tbody tr:hover { background: var(--active-bg); }
  .qt tbody tr.playing { background: var(--active-bg); }
  .qt tbody tr.playing td.ev-cell { color: var(--gold); }

  .qt td {
    padding: 10px 12px;
    vertical-align: top;
  }

  td.ev-cell {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding-top: 13px;
    transition: color 0.15s;
    word-break: break-word;
  }

  td.play-cell {
    text-align: center;
    padding-top: 8px;
  }

  a.play-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    color: var(--muted);
    text-decoration: none;
    font-size: 10px;
    transition: all 0.15s;
    cursor: pointer;
  }

  a.play-link:hover,
  tr.playing a.play-link {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bg);
  }

  /* play / pause icon swap */
  a.play-link .ico-play { display: inline; }
  a.play-link .ico-pause { display: none; }
  tr.playing a.play-link .ico-play { display: none; }
  tr.playing a.play-link .ico-pause { display: inline; }

  .no-audio {
    display: inline-block;
    width: 30px;
    text-align: center;
    color: var(--border2);
    font-size: 12px;
  }

  td.text-cell {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text);
  }

  td.text-cell .lang-text {
    display: none;
  }

  td.text-cell .lang-text.visible {
    display: block;
  }

  td.text-cell .lang-text em {
    color: var(--dim);
    font-style: italic;
    font-size: 0.82rem;
  }

  /* ── FOOTER ── */
  footer {
    border-top: 1px solid var(--border);
    padding: 24px 40px;
    font-size: 0.72rem;
    color: var(--dim);
    text-align: center;
    letter-spacing: 0.06em;
  }

  footer a { color: var(--blue); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  /* ── DOWNLOAD BUTTON ── */
  .dl-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 16px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    border-radius: 2px;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .dl-btn:hover { border-color: var(--gold); color: var(--gold2); }
  .dl-btn svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }

  /* individual row download */
  a.dl-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    color: var(--muted);
    text-decoration: none;
    font-size: 9px;
    transition: all 0.15s;
    cursor: pointer;
    margin-left: 4px;
    flex-shrink: 0;
  }
  a.dl-link:hover { border-color: var(--blue); color: var(--blue); }
  a.dl-link svg { width: 10px; height: 10px; fill: currentColor; }

  td.play-cell {
    display: flex;
    align-items: center;
    gap: 0;
    padding-top: 8px;
  }

  @media (max-width: 640px) {
    .site-header, .lang-bar, .page { padding-left: 16px; padding-right: 16px; }
    #np-bar { padding: 10px 16px; }
    .qt colgroup col:nth-child(1) { width: 110px; }
    .qt colgroup col:nth-child(2) { width: 40px; }
  }
</style>
</head>

<script>
const DATA = [{"skin": "Default Skin", "lines": [{"event": "Ship Description", "url": "", "en": "Chapayev-class cruiser – Chapayev.", "cn": "恰巴耶夫级轻巡洋舰—恰巴耶夫Chapayev class Light Cruiser - Chapayev.", "jp": "チャパエフ級巡洋艦――チャパエフ"}, {"event": "Self Introduction", "url": "https://azurlane.netojuu.com/images/1/1a/Chapayev_SelfIntroJP.ogg", "en": "I am the name ship of Project 68-K, also known as the Chapayev-class. I was meant to participate in the war, but due to a series of delays, I was not completed in time. I didn't really do anything. Too bad. Hehehe.", "cn": "我是68-k型，恰巴耶夫级命名舰，恰巴耶夫哦。本应在大战中发挥作用，却因各种各样的原因而迟迟没能完全完工，结果并没有什么活跃…多少有些遗憾呢，呵呵I am the named ship of Project 68-K, the name sake of the class known as the Chapayev-class. I was meant to participate in the great war, but due to various reasons was delayed and wasn't completed fully. In the end did not do much... I do have some regrets about that, hehe.", "jp": "68-k型、つまりチャパエフ級のネームシップよ。かの大戦に参加できるはずだったけど、色々あって遅れて完成したわ。あまり活躍できなかったの、少し残念ね。ふふふ"}, {"event": "Acquisition", "url": "https://azurlane.netojuu.com/images/3/3b/Chapayev_IntroJP.ogg", "en": "So you're the Commander? Hehe, I like what I see... Ah, excuse me. I'm Chapayev, a light cruiser from the Northern Parliament. Let's get along~", "cn": "你就是指挥官呀~呼呼…真是不错……啊，失礼了。我是北方联合的轻巡洋舰恰巴耶夫，以后请多指教You are the Commander huh~ Fufu... that isn't bad at all... Ah, my apologies. I am a light cruiser of the Northern Parliament, Chapayev, I will be in your care now on.", "jp": "貴方が指揮官ね。ふふ、これはなかなか……あ、失礼。私は北方連合所属・軽巡洋艦チャパエフよ。これからよろしく頼むわ"}, {"event": "Login", "url": "https://azurlane.netojuu.com/images/8/87/Chapayev_LogJP.ogg", "en": "Welcome, Commander. So this is your office...? Aha, of course, it's OUR office, isn't it?", "cn": "欢迎你，指挥官。这里是指挥室？…呵呵，是“我们两人的指挥室”，才对吧？Welcome, Commander. This is the Command Room? ... Hehe, it's the \"Command Room for the two of us\", right?", "jp": "いらっしゃい指揮官。ふふ、ここは執務室って？…ええ、分かってるわ。「私たち二人の執務室」、でしょ？"}, {"event": "Details", "url": "https://azurlane.netojuu.com/images/e/e7/Chapayev_DetailsJP.ogg", "en": "Commander, let's chat a bit? It's important that we get to know each other... don't you think?", "cn": "指挥官，来聊聊天吧？互相了解才是最重要的，不是吗？Let's converse a little, Commander? Knowing each other is the most important, isn't it?", "jp": "指揮官、少しお喋りでもどう？お互いを分かることに越したことない――そう思わなくて？"}, {"event": "Secretary (Idle) 1", "url": "https://azurlane.netojuu.com/images/2/20/Chapayev_SecIdle1JP.ogg", "en": "Are you jealous of my little friend here, Commander...? Oh, you're not? Hmm.", "cn": "指挥官也想像这孩子一样吗？…哎呀？不想吗~？Does Commander want to be the same as this child? ... Ara? No~~?", "jp": "指揮官もこの子のようになりたいのかしら？…あら、違うの？ふーん"}, {"event": "Secretary (Idle) 2", "url": "https://azurlane.netojuu.com/images/7/7c/Chapayev_SecIdle2JP.ogg", "en": "I'm actually very strong... Or at least, I was designed to be. I guess I would need you to check and make sure I actually turned out that way, Commander.", "cn": "我其实是很强的哦…至少在设计之初是这样的。至于现在，就要由指挥官来亲·自·确·认了呢~I am actually the strongest you know... at least that was how I was designed initially. As for now, it'll have to be for Commander to.personally.determine~", "jp": "私は強いわ。……少なくとも、設計された当初ではね。今はどうなのか、それは指揮官に確かめてもらうしかないけど"}, {"event": "Secretary (Idle) 3", "url": "https://azurlane.netojuu.com/images/4/41/Chapayev_SecIdle3JP.ogg", "en": "If you're worried those you trust will betray you, you just have to keep them close. Either rope or chains will do the trick... right?", "cn": "如果害怕信赖被辜负，只要牢牢抓紧对方就好。无论是用绳子还是链锁都可以…对吧？", "jp": "信頼しても裏切られるのが怖いようでしたら、こう手綱をしっかり握りしめればいいわ。縄でも鎖でも、なんでも……ね？"}, {"event": "Secretary (Touch)", "url": "https://azurlane.netojuu.com/images/6/60/Chapayev_Sec1JP.ogg", "en": "You want to feel? Ah, not this little guy. I mean me. Hehehe.", "cn": "想摸摸看？啊，不是说这孩子，而是我啊，呵呵呵~Do you want to touch these? Ara, are you talking about \"this\" instead of me right? Fufufu~", "jp": "お触り？あ、この子じゃなくて私のほうね。ふふふ"}, {"event": "Secretary (Special Touch)", "url": "https://azurlane.netojuu.com/images/7/70/Chapayev_Sec2JP.ogg", "en": "Hehehe... Commander, naughty naughty~", "cn": "呵呵呵…指挥官，真是坏孩子呢Ehehe... Commander, you are such a bad child huh.", "jp": "ふふふ、指揮官、悪い子ね"}, {"event": "Task", "url": "https://azurlane.netojuu.com/images/3/3c/Chapayev_TaskJP.ogg", "en": "All these unfinished tasks... Wouldn't it be better if I helped you take care of them?", "cn": "未完成的任务…是不是由我来帮指挥官完成比较好呢Incomplete missions... should I help Commander to complete them, I wonder.", "jp": "未完了の任務は…私がちょっと代わりにやっておいたほうが良さそうね"}, {"event": "Task Complete", "url": "https://azurlane.netojuu.com/images/e/e2/Chapayev_TaskCJP.ogg", "en": "Wow, you completed that mission all by yourself! Hehe, were you hoping I'd give you a reward?", "cn": "哎呀，好好完成任务了呢，真棒。呵呵，想要我给你什么样的夸奖呢，指挥官~？Ara, you completed missions properly huh, that's great. Hehe, what reward do you want me to give you then, Commander~", "jp": "あら、任務をこなせて偉いね。ふふ、ご褒美はどんなのがいいの？"}, {"event": "Mail", "url": "https://azurlane.netojuu.com/images/d/da/Chapayev_MailJP.ogg", "en": "I sorted the mail for you. Don't forget to look it over.", "cn": "新的信件已经整理好了，不要忘了确认哦New mail has been sorted, don't forget to go through them alright?", "jp": "新しい手紙を整理したわ。確認を忘れないようにね"}, {"event": "Return From Mission", "url": "https://azurlane.netojuu.com/images/3/3a/Chapayev_MissionFinJP.ogg", "en": "What do you think of my food? Is this the kind of thing you like to eat?", "cn": "我做的菜不知道味道如何？如果能合指挥官胃口就好了呢How does the food that I make taste? If it is palatable to Commander, it'll be great.", "jp": "私の手料理はどうだった？お口に合うと嬉しいわ"}, {"event": "Commission", "url": "https://azurlane.netojuu.com/images/b/b3/Chapayev_CommissionJP.ogg", "en": "Commander, the girls you sent out on commission are back. Are you ready?", "cn": "指挥官，执行委托的孩子们刚刚回来了哦，请做好准备前去迎接吧Commander, the others who went for commissions have returned just now, please make your preparations to greet them.", "jp": "指揮官、委託に出た子たちが戻ってきたわよ。準備をお願いね"}, {"event": "Strengthening", "url": "https://azurlane.netojuu.com/images/f/f3/Chapayev_StrJP.ogg", "en": "Keep strengthening my equipment. I know you can do it.", "cn": "继续强化舰装吧~我相信指挥官一定可以的~Continue upgrading my rigging~ I trust Commander would definitely be able to do so~", "jp": "どんどん兵装をつけてちょうだい。あなたのことは信頼してるわ"}, {"event": "Start Mission", "url": "https://azurlane.netojuu.com/images/d/d7/Chapayev_MissionStartJP.ogg", "en": "I can handle these girls just fine! Hiyah!", "cn": "这孩子我也是能够驾驭的哦，出发吧~I can ride on this child too you know. Let's head off~", "jp": "この子も乗りこなしてみせるわよ！そら！"}, {"event": "MVP", "url": "https://azurlane.netojuu.com/images/0/07/Chapayev_MVPJP.ogg", "en": "Hah... that seems about right.", "cn": "呼…差不多是这样吧Whew... that does seem to be how it is to be done.", "jp": "ふぅ…こんな感じかしらね"}, {"event": "Defeat", "url": "https://azurlane.netojuu.com/images/a/af/Chapayev_DefeatJP.ogg", "en": "Hah... I can do better.", "cn": "呼…看来还要加油呢Whew... looks like I have to work harder.", "jp": "ふぅ…まだまだ頑張らないとね"}, {"event": "Skill Activation", "url": "https://azurlane.netojuu.com/images/d/d5/Chapayev_SkillActivationJP.ogg", "en": "Scorched earth!", "cn": "蹂躏一切吧！Let us crush everything then!", "jp": "蹂躙する！"}, {"event": "Low HP", "url": "https://azurlane.netojuu.com/images/5/56/Chapayev_LowHPJP.ogg", "en": "Gah... was I unprepared...?", "cn": "呜…有点大意了啊…Ugh... was I too careless...", "jp": "くっ…少し油断したかしら…"}, {"event": "Affinity (Disappointed)", "url": "https://azurlane.netojuu.com/images/e/ee/Chapayev_Affinity0JP.ogg", "en": "You may need some stricter training. Hm. Worrying...", "cn": "是不是给指挥官一些更严厉的“教育”比较好呢…嗯…真难办啊…Would it better if I give Commander some \"stern\" education huh.. mm... this is hard...", "jp": "きつく躾けたほうがいいのかしら、悩ましいわね…"}, {"event": "Affinity (Stranger)", "url": "https://azurlane.netojuu.com/images/6/62/Chapayev_Affinity1JP.ogg", "en": "Commander, did you have something to talk about? Or are you just here for a little chat? With this fleet, we could go on and on. Hehehe.", "cn": "指挥官，想和我说什么？只是陪你聊聊也可以哦？这个舰队，看来能一直待很久呢。呵呵呵Commander, what do you wish to tell me? Just talking is fine huh? This fleet, looks like it will sustain for a long time huh. Hehehe.", "jp": "指揮官、何か相談？お喋りならお付き合いするわよ？この艦隊、きっと先が長いものね。ふふふ"}, {"event": "Affinity (Friendly)", "url": "https://azurlane.netojuu.com/images/e/e7/Chapayev_Affinity2JP.ogg", "en": "Fraternizing with subordinates...? Yes, these among comrades who put our lives in each other's hands, trust is the most important thing. I hope you trust in me, Commander, the same way I trust in you.", "cn": "和部下的交流吗…没错，对于彼此托付性命的同伴来说，信赖是最重要的。希望指挥官能像我信赖你一样地信赖我呢Socializing with those under your command huh... That's right, for other comrades whom our lives depend on, trust is the most important. I hope Commander can rely on me, just like how I rely on you.", "jp": "部下とのコミュニケーションねぇ…ええ、命を預ける相手を信頼するのが一番大事よ。私が指揮官を信じているように、指揮官にも私のことを信頼してほしいわ"}, {"event": "Affinity (Like)", "url": "https://azurlane.netojuu.com/images/2/2f/Chapayev_Affinity3JP.ogg", "en": "A pet? I wonder... I've never had one before. The one I love and cherish is always right here with me, after all. Say, Commander... Do you need more affection?", "cn": "宠物？我没有养过呢。毕竟自己喜欢宠着的东西总在身边啊~莫非指挥官…想找个人宠着你吗？Pets? I don't have any. As the thing that I love to dote on is always by my side~ Don't tell me... Commander wants someone to dote on you?", "jp": "ペット？どうかしら…飼ったことがないから正直わからないわ。だって愛でる相手ならずっと身近にいるもの。それとも指揮官…もしかして、もっと愛でられたいの？"}, {"event": "Affinity (Love)", "url": "https://azurlane.netojuu.com/images/9/94/Chapayev_Affinity4JP.ogg", "en": "Oh my... that looks serious. You really do need someone you love and cherish by your side... Commander, let me be here for you. I'll take care of all your worries for you.", "cn": "原来如此…看起来似乎病得不轻呢。果然得一个完全信赖的人在身边才行呢…指挥官，把一切交给我吧，我会把你的烦恼全部解决的~I see... looks like this is quite the illness huh. As expected, it requires someone whom one can fully rely on by one's side huh. Commander, leave everything to me, I will solve all the problems in your mind~", "jp": "なるほど…それはちょっと重症ね。やっぱり心を預ける相手がそばにいないと…指揮官、いっそ私に任せてくれない？あなたの悩み、全部解決してあげるわ"}, {"event": "Pledge", "url": "https://azurlane.netojuu.com/images/5/5d/Chapayev_PledgeJP.ogg", "en": "To get such a ring... such a beautiful gift, it's wonderful. So let me give you this bridle in return... Hehe, it fits perfectly. Now it's like we're always connected, wherever we might be... Don't you love it?", "cn": "能从指挥官那里收到这么重要的戒指，我很高兴哦~作为交换…就把这个项圈送给指挥官吧—呵呵，很合适呢~这种彼此一直联系在一起的感觉…指挥官也很喜欢吧？To be able to receive such an important ring from Commander, I am very happy alright~ In exchange... let's give this collar to Commander then- Hehe, it's very compatible huh~ The feeling of being linked together... Commander like it too right?", "jp": "私はこの指輪を――こんなに綺麗なものを預けてくれるなんて嬉しいわ。ではあなたにはこの首輪を――ふふ、こっちも似合っているわ。こうして常につながってるの…好きでしょう？"}, {"event": "Gift Description Valentine's 2021", "url": "", "en": "Seems like a promising Valentine's Day, doesn't it, Commander? Who are you expecting to get chocolates from today? ...My, I'm the first one today? Is that so. Considering that we're bound together, as if by chains, the first one definitely should be me. Hehehe.", "cn": "", "jp": ""}, {"event": "Gift Description Valentine's 2022", "url": "", "en": "Hyah, hyah! ...Here you go, Commander, your Valentine's chocolate. Hehe, how'd I know that you were here? Because I'm the one holding the reins, of course. So, how about it? Shall we ride around the port?", "cn": "驾，驾…指挥官，给，情人节巧克力。为什么知道你在这里？因为我握着缰绳所以肯定知道呀。如何？一起乘着这孩子在港区转一圈吧？", "jp": "どう、どう…指揮官、はい、バレンタインのチョコよ。ふふ、どうしてここにいるのが分かったかって？手綱を握っているから当然じゃない。どう？一緒にこの子に乗って母港でも一周してみる？"}, {"event": "Gift Description Valentine's 2023", "url": "", "en": "Oh? Commander, what's the matter? You weren't waiting here because you wanted Valentine's chocolate, were you? Aww, look at you just begging for it. I'll bring your chocolate, so hold on just a little longer, okay? Or... would you like to come to my room with me? Heehee, it's your choice, Commander.", "cn": "怎么了，指挥官？你是在这里等我的情人节巧克力吗？能向我乞求，真是个好孩子啊。那么能再忍耐一下，坚持到我拿过来吗？还是想一起来我的房间？呵呵呵，指挥官，你想怎么样做？", "jp": "あら？指揮官どうしたの？もしかしてバレンタインのチョコがほしくて待っていたのかしら？うんうん、おねだりしてくるなんていい子ね。取ってくるからもうちょっと我慢する？それとも部屋まで一緒に来る？ふふふ、指揮官、どうする？"}, {"event": "Gift Description Valentine's 2024", "url": "", "en": "Hahaha, yes, the box I left here DOES contain my Valentine's chocolate. Look at you being patient and not opening it, Commander♡ But... It is Valentine's Day, so I don't think you need to wait any longer – oh, but no taking off that bridle, got it?♪", "cn": "呵呵呵，没错，这个盒子里装的就是巧克力，已经提前放在这里很久了～能一直好好忍耐住自己的渴望，不打开它，真不愧是指挥官呢。不过既然是情人节，或许今天不需要忍耐也可以——啊，项圈可不能摘掉哦？", "jp": "ふふふ、そう、予めここに置いといた箱には私からのバレンタインチョコが入っているわ。さすが指揮官、開けずによく我慢したわね♡でもぉ…せっかくのバレンタインだから、もう今日はこれ以上我慢しなくても——もう、その首輪は外しちゃダメよ？♪"}, {"event": "Gift Description Valentine's 2025", "url": "", "en": "Oh my, Commander. I didn't think you'd show up in front of me like this, collar ready-to-go and everything. Did you want to be \"pampered\" so badly? Heehee. Such an obedient, well-behaved Commander deserves to be rewarded as well. And I have plenty of \"rewards\" ready for you, not just chocolate... Shall I use them on you, one by one?", "cn": "哎呀，指挥官主动戴好项圈来找我，是想在今天被好好宠爱一番吗？呵呵，对于这么听话的指挥官，我当然会好好奖励你哦。除了巧克力之外，还准备了很多很多奖励……就让我一件一件地慢慢用在你身上吧？", "jp": "あら？自ら首輪を付けたままやってくるだなんて、さては今日という日は、チャパエフにたっぷりと可愛がられたい…そんなところかしら？ふふふ、そんな良い子ちゃんな指揮官には、たっぷりとご褒美をあげないとね♪もちろんチョコだけじゃなく……ひとつひとつ、指揮官に「味あわせて」あげましょう♡"}]}, {"skin": "Default Skin (Post-Oath)", "lines": [{"event": "Login", "url": "https://azurlane.netojuu.com/images/d/dd/Chapayev_LogBasePostPledgeJP.ogg", "en": "Welcome, Commander. Time for another day of hard work. By the way... Have you been wearing your bridle like we talked about?", "cn": "欢迎你，指挥官。 今天也要好好工作呢。啊，说起来…项圈，有一直好好戴着吗？Welcome, Commander, we have to work hard today too. Ah, speaking of which... the collar, have you worn it well all this time?", "jp": "いらっしゃい指揮官。今日もお仕事なのね。ところで…首輪、ずっとつけててくれてるの？"}, {"event": "Details", "url": "https://azurlane.netojuu.com/images/6/6e/Chapayev_DetailsBasePostPledgeJP.ogg", "en": "Commander, are you hungry? Well, you'll just have to wait. Once I say 'okay,' then you can eat.", "cn": "指挥官，肚子饿了吗？要忍耐哦，忍到我说“可以了”为止才行…呵呵~Commander, are you hungry? You have to hold it in, until I say \"You are allowed to\" you know... hehe~", "jp": "指揮官、お腹すいた？まだ我慢よ。私がいいと言うまでは我慢してちょうだい"}, {"event": "Secretary (Idle) 1", "url": "https://azurlane.netojuu.com/images/1/17/Chapayev_SecIdle1BasePostPledgeJP.ogg", "en": "Commander, what's wrong? I'm here, and I'm not going anywhere.", "cn": "指挥官，怎么了？我就在这里，哪里也不会去哦Commander, what is it? I am here, I will not go anywhere at all.", "jp": "指揮官、なに？私はここよ、どこにも行かないわ"}, {"event": "Secretary (Idle) 2", "url": "https://azurlane.netojuu.com/images/3/36/Chapayev_SecIdle2BasePostPledgeJP.ogg", "en": "It's a big responsibility to have someone trust you so much. But don't worry, I'm holding your reins tightly.", "cn": "对于托付性命的对象，得好好重视才行呢。放心吧，我会一直牢牢地抓紧指挥官的缰绳的To the party that one entrusts their life with, you have to value them after all. Do not worry, I will always securely hold on to Commander's leash.", "jp": "命を預かっている相手のことは大事にしないとね。安心して、貴方の手綱はしっかり握っているわ"}, {"event": "Secretary (Idle) 3", "url": "https://azurlane.netojuu.com/images/6/63/Chapayev_SecIdle3BasePostPledgeJP.ogg", "en": "Just let me know when you'd like to talk to another girl. You'd be very embarrassed to be seen like this, hm? Hehe, I think it's fine if somebody sees, actually.", "cn": "想和其他女孩子说话的时候，跟我说一声哦。被人看到这个会很不好意思的吧？呵呵，要是指挥官觉得被看到也没关系的话，我也不会介意的哦~？", "jp": "他の子と話したい時は私に言ってね。流石に見られると恥ずかしいでしょう？ふふ、見られちゃってもいいなら別に私はいいけど？"}, {"event": "Secretary (Touch)", "url": "https://azurlane.netojuu.com/images/b/b5/Chapayev_Sec1BasePostPledgeJP.ogg", "en": "Hehe, I think I want to touch you too, Commander.", "cn": "呵呵，我也想摸摸指挥官呢Hehe, I want to pet the Commander too.", "jp": "ふふ、私も指揮官を触りたくなちゃったわ"}, {"event": "Secretary (Special Touch)", "url": "https://azurlane.netojuu.com/images/f/f6/Chapayev_Sec2BasePostPledgeJP.ogg", "en": "Hehe, I'll join you in a minute, okay?", "cn": "呵呵，一会再陪你，好吗？Hehe, I will accompany you in a bit, alright?", "jp": "ふふ、相手してあげるのはまたあとで、ね？"}, {"event": "Return From Mission", "url": "https://azurlane.netojuu.com/images/1/1c/Chapayev_MissionFinBasePostPledgeJP.ogg", "en": "You did so well on that sortie... Now you just let me take care of everything.", "cn": "出击的时候有好好坚持住了呢…好孩子好孩子，接下来的就交给我吧~You have held it in properly while I was on sortie huh... Good boy, good boy, leave the rest to me then~", "jp": "出撃中よく我慢したわね…いい子いい子。私に全部任せて"}, {"event": "Start Mission", "url": "https://azurlane.netojuu.com/images/7/71/Chapayev_MissionStartBasePostPledgeJP.ogg", "en": "Полный ход!&#91;BasePostPledgeEN 1&#93;", "cn": "Полный ход(全速前进)！Полный ход (Full speed ahead)！", "jp": "Полный ход （ポーンリィホート）！"}, {"event": "MVP", "url": "https://azurlane.netojuu.com/images/3/3a/Chapayev_MVPBasePostPledgeJP.ogg", "en": "Hehehe, I'm happy if you are.", "cn": "呵呵，能让指挥官满意就好~Hehe, as long as Commander is satisfied~", "jp": "ふふふ、もっと喜んでくれると嬉しいわ"}, {"event": "Affinity (Love)", "url": "https://azurlane.netojuu.com/images/9/97/Chapayev_Affinity4BasePostPledgeJP.ogg", "en": "Still feeling a little uneasy? Just wait a bit longer. You need to stay bound to me like this for now, but sooner or later you won't have to think anymore, you won't have to worry, and you can forget all that pain.", "cn": "还是有些不安吗？还要再忍忍哦。虽然现在指挥官还需要这样和我联系在一起，不过很快…总有一天，你就可以什么都不用想，也不会有烦恼和痛苦了…——Are you still a little uneasy? You have to hold it in you know. Although Commander do still need to stay in communication with me like this, but soon... one day, you can don't need to dwell on this, and you won't have any worries or pain... -", "jp": "まだ不安になるの？我慢よ。今はこうやって貴方の全てをつなぎとめてるけど、そのうち何も考えられなくして、悩みも苦しみも何もかも忘れさせてあげるわよ"}]}, {"skin": "The Captive Cavalier", "lines": [{"event": "Ship Description", "url": "", "en": "Commander, what's going on? Did I... do something wrong...? This was all just... meant to be an exercise, right?", "cn": "指挥官，这究竟是要做什么？难道…我做错了什么吗…？这应该…只是单纯的演习吧？Commander, what is this for? Don't tell me... I did something wrong? This... is just a simple exercise right?", "jp": "指揮官、これは一体どういうこと？まさか私、何か悪いことでもしたの…？これってただの演習なの…？"}, {"event": "Acquisition", "url": "https://azurlane.netojuu.com/images/a/af/Chapayev_IntroSkin1JP.ogg", "en": "Commander, what's going on? Did I... do something wrong...? This was all just... meant to be an exercise, right?", "cn": "指挥官，这究竟是要做什么？难道…我做错了什么吗…？这应该…只是单纯的演习吧？Commander, what is this for? Don't tell me... I did something wrong? This... is just a simple exercise right?", "jp": "指揮官、これは一体どういうこと？まさか私、何か悪いことでもしたの…？これってただの演習なの…？"}, {"event": "Login", "url": "https://azurlane.netojuu.com/images/d/d7/Chapayev_LogSkin1JP.ogg", "en": "*Pant*... *pant*... Commander, what should we start with today?", "cn": "哈啊…哈啊…指挥官，今天要先做什么呢？Haah... Haah... Commander, what shall we do first?", "jp": "はぁ…はぁ…指揮官、今日は何から始めるの？"}, {"event": "Details", "url": "https://azurlane.netojuu.com/images/d/de/Chapayev_DetailsSkin1JP.ogg", "en": "I could leave whenever I want, so why do I stay... Commander? N- nothing, it's nothing...", "cn": "明明随时都能出去，为什么我还要留在这……指挥官？没、没什么，我什么都没说…I can head out any time usually, why must I stay here. ... Commander? N-Nothing... I didn't say anything.", "jp": "いつでも出られるっていうけど、なぜ私はまだここに……指揮官？い、いいえ、なんでもないわ…"}, {"event": "Secretary (Idle) 1", "url": "https://azurlane.netojuu.com/images/0/00/Chapayev_SecIdle1Skin1JP.ogg", "en": "You know, this room might rub some people the wrong way...", "cn": "这个房间，甚至让人感到有点恶趣味了呢…This room, it does let one feel that it's out of taste.", "jp": "この空間は正直、悪趣味に思うわね…"}, {"event": "Secretary (Idle) 2", "url": "https://azurlane.netojuu.com/images/6/60/Chapayev_SecIdle2Skin1JP.ogg", "en": "Commander, are you okay? Please answer me if you're okay. You can't keep me waiting...", "cn": "指挥官，没事吧？没事的话能回答一下吗？我有点…担心…Commander, are you fine? If you are fine please reply? I... am a little worried.", "jp": "指揮官、大丈夫？大丈夫なら返事してちょうだい？私、ちょっと焦っちゃうわ…"}, {"event": "Secretary (Idle) 3", "url": "https://azurlane.netojuu.com/images/5/50/Chapayev_SecIdle3Skin1JP.ogg", "en": "If I'm here too long, you know Tashkent will start to worry...", "cn": "在这里待太久的话，塔什干她们会担心的吧…", "jp": "ここに長くいると、流石にタシュケントたちが心配するわね…"}, {"event": "Secretary (Touch)", "url": "https://azurlane.netojuu.com/images/9/9a/Chapayev_Sec1Skin1JP.ogg", "en": "I- I have to keep this around my neck?", "cn": "要、要把这个套在我脖子上吗？Y-You want to put this around my neck?", "jp": "こ、これを私の首につける気？"}, {"event": "Secretary (Special Touch)", "url": "https://azurlane.netojuu.com/images/0/0c/Chapayev_Sec2Skin1JP.ogg", "en": "Hyah?! Commander, that's not what I meant...!", "cn": "呀？！指挥官，我其实没有这意思…！Kya?! Commander, I actually don't mind this.", "jp": "きゃっ？！指揮官、私別にそんな気は……！"}, {"event": "Task", "url": "https://azurlane.netojuu.com/images/f/fd/Chapayev_TaskSkin1JP.ogg", "en": "There's an unfinished mission. I have all the details here.", "cn": "有未完成的任务。资料我已经让人拿来了哦There's incomplete missions. I've asked for the list to be brought over.", "jp": "未完了の任務があるわ。資料なら取っておいてもらったわよ"}, {"event": "Task Complete", "url": "https://azurlane.netojuu.com/images/e/ed/Chapayev_TaskCSkin1JP.ogg", "en": "Mission complete. What should we do now...?", "cn": "任务完成了。接下来该做什么呢…Missions are complete. What shall we do next...", "jp": "任務完了ね。ここから何をすればいいのかしら…"}, {"event": "Mail", "url": "https://azurlane.netojuu.com/images/5/5d/Chapayev_MailSkin1JP.ogg", "en": "Mail's here... I think you should read it...", "cn": "信…希望指挥官能快点看看呢…Mail... hope Commander can hurry and read them...", "jp": "お手紙は…早く読んでくれないかしら…"}, {"event": "Return From Mission", "url": "https://azurlane.netojuu.com/images/c/ca/Chapayev_MissionFinSkin1JP.ogg", "en": "I really wish there was a kitchen in here. Are you going to feed me, Commander...?", "cn": "这边没有厨房还真是遗憾呢。指挥官要喂我吃吗…？Having no kitchen here is a shame. Does Commander want to feed me...?", "jp": "ここに調理場がないのは残念ね。食べさせてくれるの…？"}, {"event": "Commission", "url": "https://azurlane.netojuu.com/images/8/8d/Chapayev_CommissionSkin1JP.ogg", "en": "The commission girls just got back. You have to get out there and bring them in...", "cn": "指挥官，执行委托的孩子们刚刚回来了哦。得快点去迎接她们才行呢…Commander, the others who went for commissions are back. You have to hurry and welcome them after all.", "jp": "委託に出た子たちが戻ってきたわ。早く出迎えに行かないと…"}, {"event": "Strengthening", "url": "https://azurlane.netojuu.com/images/9/99/Chapayev_StrSkin1JP.ogg", "en": "I have to try harder, right?", "cn": "还得再努力些才行呢Will have to work harder huh.", "jp": "もっと頑張らなきゃ、ね"}, {"event": "Start Mission", "url": "https://azurlane.netojuu.com/images/4/47/Chapayev_MissionStartSkin1JP.ogg", "en": "I fight with all my heart!", "cn": "我会认真战斗的！I will properly battle!", "jp": "真面目に戦うわ！"}, {"event": "MVP", "url": "https://azurlane.netojuu.com/images/b/b7/Chapayev_MVPSkin1JP.ogg", "en": "I guess I can relax a little...", "cn": "这样就能稍微放松些了…With this we can relax a little...", "jp": "これで少しは解放されるのね…"}, {"event": "Defeat", "url": "https://azurlane.netojuu.com/images/8/89/Chapayev_DefeatSkin1JP.ogg", "en": "Commander, I'm sorry...", "cn": "指挥官，对不起……Commander, I am sorry...", "jp": "指揮官、ごめんなさい……っ"}, {"event": "Affinity (Disappointed)", "url": "https://azurlane.netojuu.com/images/d/da/Chapayev_Affinity0Skin1JP.ogg", "en": "I think you need some training in this area, Commander...", "cn": "指挥官才是需要在这边受训的人呢…Commander is the one that should be punished here...", "jp": "ここで訓練すべきなのは指揮官の方ね…"}, {"event": "Affinity (Love)", "url": "https://azurlane.netojuu.com/images/0/00/Chapayev_Affinity4Skin1JP.ogg", "en": "I get that you wanted to be alone with me, and that's fine, but I just think we're missing something... If only we could... hold each other's hands tightly or... Ahhn?! D- don't pull on that!", "cn": "像这样和指挥官“单独相处”虽然不错，果然还是觉得缺了点什么…还是是要更能够…紧握住彼此双手的感觉比较…呀啊！？请、请不要拉这个可以吗！To be able to be \"alone\" with Commander, as expected it isn't bad at all, but it does seem to be lacking something... being able to... hold each other's hands tightly would feel better... Kya!? Could you p-please don't tug this!", "jp": "こうして指揮官と「二人っきり」になるの、悪くないけど、やっぱりなにか足りない気がするわね…もっとこう、しっかり手に握りしめるものというか…ひゃぅ？！そ、それを引っ張らないでぇ！"}]}, {"skin": "White Cavalier's Respite", "lines": [{"event": "Ship Description", "url": "", "en": "Phew... Oh my, Commander, I'm sorry I didn't welcome you at the door. You don't have to be so tense - I already know not to try doing anything weird with you. Hehe~", "cn": "呼…啊，指挥官，没能出门迎接真是不好意思。…放松点，不用那么拘谨，我知道你不会做什么奇怪的事情的，呵呵~", "jp": "ふは…あら指揮官、ごめんなさい出迎えそびれちゃったわ。そこまでかしこまらなくていいわよ、あなたなら変なことをしないってことはもう分かっているわ。ふふ"}, {"event": "Acquisition", "url": "https://azurlane.netojuu.com/images/1/15/Chapayev_IntroSkin2JP.ogg", "en": "Phew... Oh my, Commander, I'm sorry I didn't welcome you at the door. You don't have to be so tense - I already know not to try doing anything weird with you. Hehe~", "cn": "呼…啊，指挥官，没能出门迎接真是不好意思。…放松点，不用那么拘谨，我知道你不会做什么奇怪的事情的，呵呵~", "jp": "ふは…あら指揮官、ごめんなさい出迎えそびれちゃったわ。そこまでかしこまらなくていいわよ、あなたなら変なことをしないってことはもう分かっているわ。ふふ"}, {"event": "Login", "url": "https://azurlane.netojuu.com/images/6/60/Chapayev_LogSkin2JP.ogg", "en": "Welcome, Commander. Working today, like always? Well, keep at it.", "cn": "欢迎你，指挥官。今天也要工作？真是努力呢~", "jp": "いらっしゃい指揮官。今日もお仕事なの？頑張ってるわね"}, {"event": "Secretary (Idle) 1", "url": "https://azurlane.netojuu.com/images/b/ba/Chapayev_SecIdle1Skin2JP.ogg", "en": "Mmmgh~ You ought to stretch a little, Commander. Sitting down all the time leads to back and shoulder problems, and all other sorts of bad things.", "cn": "嗯~…指挥官要不要也伸伸懒腰？一直坐着的话腰和肩膀都会很酸的哦？呵呵~", "jp": "んんん～…指揮官も体を伸ばしてみない？ずっと座りっぱなしだと腰とか肩とか色々こるわよ？ふふふ♡"}, {"event": "Secretary (Idle) 2", "url": "https://azurlane.netojuu.com/images/3/32/Chapayev_SecIdle2Skin2JP.ogg", "en": "This book? I picked it up on Belorussiya's recommendation. It might be a bit too hard for you, though. ...Unlikely, you say? Read me a few pages, then.", "cn": "这本书？啊，贝拉罗斯推荐给我的书啊，对指挥官你来说可能有点难呢。…嗯？这么有自信~那就念给我听听吧？", "jp": "この本？ええ、ベラルーシアに薦められた本よ。指揮官にはもしかしてちょっと難しいかもしれないわ？…あら、大した自信ね。なら解釈を教えてもらっても？"}, {"event": "Secretary (Idle) 3", "url": "https://azurlane.netojuu.com/images/6/60/Chapayev_SecIdle3Skin2JP.ogg", "en": "There we go... This lotion is sticky, but it's good for the skin. You should get into the habit of using skincare products too, Commander.", "cn": "这里再涂下…嗯…涂完这个感觉全身都变光滑了呢…指挥官，也稍微关注下皮肤状况比较好哦？", "jp": "よいっしょ…これをつけるとぬめっとしちゃうわね。……指揮官も肌には気をつけたほうがいいわよ？"}, {"event": "Secretary (Touch)", "url": "https://azurlane.netojuu.com/images/7/73/Chapayev_Sec1Skin2JP.ogg", "en": "Do you want me to oil you up?", "cn": "想让我帮你涂这个吗？", "jp": "つけてほしいの？"}, {"event": "Secretary (Special Touch)", "url": "https://azurlane.netojuu.com/images/0/0d/Chapayev_Sec2Skin2JP.ogg", "en": "Heehee, I might have used too much lotion.", "cn": "呵呵，是不是变得有点太滑溜溜的了呢？", "jp": "ふふ、ぬるっとしすぎちゃったかしら"}, {"event": "Return From Mission", "url": "https://azurlane.netojuu.com/images/e/e6/Chapayev_MissionFinSkin2JP.ogg", "en": "You must be tired. How about a sweet refreshment to clear away the fatigue? Here you are, sweetheart. Just don't have too much, now.", "cn": "出击辛苦了~来点甜的饮料回复下体力吧？…真听话~注意不可以喝太多哦~", "jp": "お疲れ様。疲労回復に何か甘い飲み物でもどうかしら？…いい子いい子、飲むのはほどほどにね"}, {"event": "Start Mission", "url": "https://azurlane.netojuu.com/images/b/b8/Chapayev_MissionStartSkin2JP.ogg", "en": "I'll disrupt the enemy line!", "cn": "冲垮敌阵！", "jp": "敵陣を蹴散らす…！"}, {"event": "Secretary (Headpat)", "url": "https://azurlane.netojuu.com/images/f/f4/Chapayev_HeadpatSkin2JP.ogg", "en": "", "cn": "", "jp": "あっ……///"}]}, {"skin": "Indigo & Lantern-Lit Summer Night", "lines": [{"event": "Ship Description", "url": "", "en": "You've been looking for me? Heehee, sorry if I made you worry, I just had to feel the night breeze in my hair for a bit. Why don't you stay and enjoy it with me?", "cn": "是来找我的吗…？呵呵，抱歉让你担心了。只是想出来沐浴下清凉的晚风而已…可以的话，要不要一起？", "jp": "私を探しに…？うふふ、心配させちゃってごめんなさい。少し涼しい夜風を浴びたくて…よかったら一緒にどう？"}, {"event": "Acquisition", "url": "https://azurlane.netojuu.com/images/9/9e/Chapayev_IntroSkin3JP.ogg", "en": "You've been looking for me? Heehee, sorry if I made you worry, I just had to feel the night breeze in my hair for a bit. Why don't you stay and enjoy it with me?", "cn": "是来找我的吗…？呵呵，抱歉让你担心了。只是想出来沐浴下清凉的晚风而已…可以的话，要不要一起？", "jp": "私を探しに…？うふふ、心配させちゃってごめんなさい。少し涼しい夜風を浴びたくて…よかったら一緒にどう？"}, {"event": "Login", "url": "https://azurlane.netojuu.com/images/d/dd/Chapayev_LogSkin3JP.ogg", "en": "Ooh, this water is nice and cold... Heehee. Perfect for cooling off in.", "cn": "清清凉凉的水…呵呵，正好适合有点发热的皮肤呢。", "jp": "ひんやりとした水…ふふ、火照った肌にちょうどいいわ"}, {"event": "Secretary (Idle) 1", "url": "https://azurlane.netojuu.com/images/f/f9/Chapayev_SecIdle1Skin3JP.ogg", "en": "I hope Soyuz will pay this place a visit someday. Lord knows she deserves a good refresher.", "cn": "希望苏维埃也能来体验一次，这对她来说也是个转换心情的好方法吧。", "jp": "ソユーズにも一度来てみてほしいわね。あの人にとってもいい気分転換になれるもの"}, {"event": "Secretary (Idle) 2", "url": "https://azurlane.netojuu.com/images/e/ef/Chapayev_SecIdle2Skin3JP.ogg", "en": "This yukata feels lovely on my skin. It's like I'm dressed tip to toe in silk.", "cn": "浴衣的质感非常舒服，穿着它就像穿着丝绸一样呢。", "jp": "浴衣、とてもいい肌触りよ。まるでシルクのような着心地で気持ちいいわ"}, {"event": "Secretary (Idle) 3", "url": "https://azurlane.netojuu.com/images/e/e4/Chapayev_SecIdle3Skin3JP.ogg", "en": "Doesn't vacationing make you feel like the leash has come off? ...You don't get the analogy? Hmm, well, fair enough...", "cn": "旅行，有一种给饲养的马儿放青的感觉呢。不大明白？嗯，这样……", "jp": "旅行って放し飼いの子の気分になれるわ。…よくわからない？まあ、うん、そうかしら…"}, {"event": "Secretary (Touch)", "url": "https://azurlane.netojuu.com/images/1/1e/Chapayev_Sec1Skin3JP.ogg", "en": "We can hold hands if you're scared of getting separated. Unless... you'd rather be led along by a pair of reins?", "cn": "要是怕走散的话，我牵着你的手吧？还是说…牵着缰绳更好呢？呵呵呵~", "jp": "はぐれるのが怖いなら、手をつないであげようか？それとも…手綱のほうがいいの？ふふふ"}, {"event": "Secretary (Special Touch)", "url": "https://azurlane.netojuu.com/images/5/55/Chapayev_Sec2Skin3JP.ogg", "en": "Heehee. Doesn't that feel nice?", "cn": "呵呵，摸着很舒服吧？", "jp": "ふふ、いい肌触りでしょ？"}, {"event": "Task Complete", "url": "https://azurlane.netojuu.com/images/a/af/Chapayev_TaskCSkin3JP.ogg", "en": "Hey, great job on that mission. Heehee, how does a hot bath sound for a reward?", "cn": "完成任务了呢，好孩子。呵呵，奖励嘛，让我想想……再去泡下温泉如何？", "jp": "あら、任務をこなせて偉いね。ふふ、ご褒美は…そうね。お湯にもう一度入ってみる？"}, {"event": "Return From Mission", "url": "https://azurlane.netojuu.com/images/5/59/Chapayev_MissionFinSkin3JP.ogg", "en": "Why don't we go watch how artisans dye clothes blue?", "cn": "要去参观下蓝染工艺吗？", "jp": "藍染めの見学でも行きましょうか？"}, {"event": "MVP", "url": "https://azurlane.netojuu.com/images/c/c9/Chapayev_MVPSkin3JP.ogg", "en": "I suppose this is one way to de-stress.", "cn": "这也是转换心情的一种方法吗？", "jp": "これも一つの気分転換…かしら？"}, {"event": "Affinity (Love)", "url": "https://azurlane.netojuu.com/images/d/d1/Chapayev_Affinity4Skin3JP.ogg", "en": "You've no reason to worry. The bond between us is so strong that no matter which of us pulls the reins, our feelings are clear to us both. Like this – if I just pull your hand towards me... you can hear the beating of my heart, no?", "cn": "不用担心哦。联系你我之间的纽带非常牢固，无论是哪一方牵动缰绳，另一方都能察觉到对方的心思。比如像这样把你的手牵起来……就能听见互相的心跳声对吧？", "jp": "心配いらないわ。貴方と私は固い絆で結ばれ、お互いいつ手綱を引いても自分の気持ちを相手に気づかせられる仲よ。例えば貴方の手を引き寄せて……お互いの心の音、ちゃんと聞こえるでしょ？"}]}, {"skin": "Melody of the White Cavalier", "lines": [{"event": "Ship Description", "url": "", "en": "Why are you here... Oh, that was rude of me to ask. Maybe you just wanted a change of scenery, or you were drawn by the music. Or maybe my feelings have reached you... I think I like the sound of that one the most. Hehehe.", "cn": "为什么会来这里…这么问就显得有点不解风情了吧。或许是想换个心情，或许是被声音吸引，亦或是指挥官和我心有灵犀……这么一想就很开心呢，呵呵。", "jp": "どうしてこんなところまで？って、理由を聞くのは無粋ね。気分転換かもしれないし、音に引き寄せられたのかもしれないし、指揮官と私の想いが通じた……と思うとなんだか嬉しい気持ちになれるわね。ふふふ"}, {"event": "Acquisition", "url": "https://azurlane.netojuu.com/images/7/71/Chapayev_IntroSkin4JP.ogg", "en": "Why are you here... Oh, that was rude of me to ask. Maybe you just wanted a change of scenery, or you were drawn by the music. Or maybe my feelings have reached you... I think I like the sound of that one the most. Hehehe.", "cn": "为什么会来这里…这么问就显得有点不解风情了吧。或许是想换个心情，或许是被声音吸引，亦或是指挥官和我心有灵犀……这么一想就很开心呢，呵呵。", "jp": "どうしてこんなところまで？って、理由を聞くのは無粋ね。気分転換かもしれないし、音に引き寄せられたのかもしれないし、指揮官と私の想いが通じた……と思うとなんだか嬉しい気持ちにな : "Secretary (Special Touch)", "url": "https://azurlane.netojuu.com/images/8/8c/Chapayev_Sec2Skin4JP.ogg", "en": "What exactly are you asking me to play with? This, or...?", "cn": "你希望我演奏的……是哪个？", "jp": "弾いてほしいのは……どっち？"}, {"event": "Mail", "url": "https://azurlane.netojuu.com/images/a/aa/Chapayev_MailSkin4JP.ogg", "en": "You have a letter. Make sure you check it later, okay?", "cn": "来了封信呢。稍后记得确认哦？", "jp": "手紙があるわよ。あとでチェックしておいて？"}, {"event": "Return From Mission", "url": "https://azurlane.netojuu.com/images/8/80/Chapayev_MissionFinSkin4JP.ogg", "en": "I thought you'd be coming soon. What do you think happens next...? Hahaha, not like that. I'm asking if you'd like to go back to the party, or if you'd like to rest here for a moment.", "cn": "我想你也该回来了。要选哪一边？呵呵，是问你想回到会场，还是要在这里稍作休息的意思哦？", "jp": "そろそろ戻ってくる頃だと思ってたわ。どっちにする？ふふふ、会場に戻るか、ここで少し休憩するかってことよ"}, {"event": "Commission", "url": "https://azurlane.netojuu.com/images/7/75/Chapayev_CommissionSkin4JP.ogg", "en": "Kursk? ...Oh, so the commission team has returned. Come and enjoy the party for a while, would you?", "cn": "库尔斯克？…啊呀，委托组的大家好像回来了。你也在派对上露个脸如何？", "jp": "クルスク？…あら、委託の子が戻ってきたようね。あなたも一度ぐらいはパーティーに顔を出してみれば？"}, {"event": "MVP", "url": "https://azurlane.netojuu.com/images/8/87/Chapayev_MVPSkin4JP.ogg", "en": "For an improv performance, I think I did pretty well!♪", "cn": "以即兴表演来说，我这算是很不错了呢♪", "jp": "即興にしては上出来ね。私♪"}]}];

const aud = document.getElementById('aud');
const npBar = document.getElementById('np-bar');
const npLabel = document.getElementById('np-label');
const npStop = document.getElementById('np-stop');
const main = document.getElementById('main');

let activeTr = null;
let currentLang = 'en';

function stopAll() {
  aud.pause();
  aud.src = '';
  if (activeTr) { activeTr.classList.remove('playing'); activeTr = null; }
  npBar.classList.remove('on');
}

npStop.addEventListener('click', stopAll);
aud.addEventListener('ended', stopAll);

// Lang switch
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    document.querySelectorAll('.lang-text').forEach(el => {
      el.classList.toggle('visible', el.dataset.lang === currentLang);
    });
  });
});

// Build DOM
let audioCount = 0;

DATA.forEach(skin => {
  const block = document.createElement('div');
  block.className = 'skin-block';

  const withAudio = skin.lines.filter(l => l.url).length;
  if (withAudio > 0) audioCount += withAudio;

  block.innerHTML = `
    <div class="skin-heading">
      <h2>${skin.skin}</h2>
      <span class="skin-count">${withAudio} audio · ${skin.lines.length} lines</span>
    </div>`;

  const table = document.createElement('table');
  table.className = 'qt';
  table.innerHTML = `
    <colgroup><col><col><col></colgroup>
    <thead><tr><th>Event</th><th>▶</th><th>Transcription</th></tr></thead>`;

  const tbody = document.createElement('tbody');

  skin.lines.forEach(line => {
    const tr = document.createElement('tr');

    // Play cell
    const playCell = line.url
      ? `<td class="play-cell">
          <a class="play-link" href="${line.url}" title="${line.url.split('/').pop()}" data-event="${line.event}" data-skin="${skin.skin}">
            <span class="ico-play">&#9654;</span>
            <span class="ico-pause">&#9646;&#9646;</span>
          </a>
          <a class="dl-link" href="${line.url}" download="${line.url.split('/').pop()}" title="Download ${line.url.split('/').pop()}">
            <svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 12l-5-5h3V1h4v6h3L8 12zm-6 2h12v1H2v-1z"/></svg>
          </a>
        </td>`
      : `<td class="play-cell"><span class="no-audio">—</span></td>`;

    // Text cell — all 3 langs
    const enText = line.en || '';
    const cnText = line.cn || '';
    const jpText = line.jp || '';

    tr.innerHTML = `
      <td class="ev-cell">${line.event}</td>
      ${playCell}
      <td class="text-cell">
        <span class="lang-text${currentLang==='en' ? ' visible' : ''}" data-lang="en">${enText || '<em>—</em>'}</span>
        <span class="lang-text${currentLang==='cn' ? ' visible' : ''}" data-lang="cn">${cnText || '<em>—</em>'}</span>
        <span class="lang-text${currentLang==='jp' ? ' visible' : ''}" data-lang="jp">${jpText || '<em>—</em>'}</span>
      </td>`;

    // Play logic
    if (line.url) {
      const a = tr.querySelector('a.play-link');
      a.addEventListener('click', e => {
        e.preventDefault();
        if (activeTr === tr) { stopAll(); return; }
        if (activeTr) activeTr.classList.remove('playing');
        activeTr = tr;
        tr.classList.add('playing');
        aud.src = line.url;
        aud.play();
        npBar.classList.add('on');
        npLabel.innerHTML = `${line.event} <small>${skin.skin}</small>`;
      });
    }

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  block.appendChild(table);
  main.appendChild(block);
});

document.getElementById('total-n').textContent = audioCount;

// ── DOWNLOAD ALL ──
document.getElementById('dl-all-btn').addEventListener('click', async () => {
  const btn = document.getElementById('dl-all-btn');
  const allUrls = DATA.flatMap(skin => skin.lines.filter(l => l.url).map(l => ({ url: l.url, name: l.url.split('/').pop() })));

  btn.textContent = 'Starting downloads…';
  btn.disabled = true;

  let i = 0;
  for (const { url, name } of allUrls) {
    try {
      const resp = await fetch(url);
      const blob = await resp.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    } catch(e) {
      console.warn('Failed to download', url, e);
    }
    i++;
    btn.textContent = `Downloading… ${i}/${allUrls.length}`;
    await new Promise(r => setTimeout(r, 350));
  }

  btn.textContent = '✓ Done!';
  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = '<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 12l-5-5h3V1h4v6h3L8 12zm-6 2h12v1H2v-1z"/></svg> Download All Audio';
  }, 2000);
});
</script>
</body>
</html>
