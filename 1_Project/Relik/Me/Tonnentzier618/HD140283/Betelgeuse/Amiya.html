<html lang="en">
<head>

<title>Amiya — Quotes</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0f14;
    --surface: #131720;
    --surface2: #181d29;
    --border: #262d3e;
    --border2: #313a52;
    --gold: #7aabcc;
    --gold2: #a8d4f0;
    --blue: #7aa3c4;
    --red: #c47a7a;
    --text: #cdd8e3;
    --muted: #6b7d8f;
    --dim: #3e4f60;
    --active-bg: #141c2a;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Georgia', serif;
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  .site-header {
    background: var(--surface);
    border-bottom: 2px solid var(--gold);
    padding: 28px 40px 22px;
    display: flex;
    align-items: flex-end;
    gap: 32px;
    flex-wrap: wrap;
  }

  .site-header h1 {
    font-size: 2.4rem;
    font-weight: normal;
    letter-spacing: 0.04em;
    color: var(--gold2);
    line-height: 1;
  }

  .site-header .sub {
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .header-meta {
    margin-left: auto;
    text-align: right;
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.8;
  }

  .header-meta strong {
    display: block;
    color: var(--gold);
    font-size: 1.2rem;
    font-weight: normal;
  }

  .lang-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 40px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .lang-bar span {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-right: 10px;
  }

  .lang-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 16px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    border-radius: 2px;
    transition: all 0.15s;
  }

  .lang-btn:hover { border-color: var(--gold); color: var(--gold2); }
  .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: bold; }

  #np-bar {
    position: sticky;
    top: 0;
    z-index: 200;
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gold);
    padding: 10px 40px;
    display: none;
    align-items: center;
    gap: 16px;
  }

  #np-bar.on { display: flex; }

  .np-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    animation: blink 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  #np-label {
    flex: 1;
    font-size: 0.82rem;
    color: var(--gold2);
  }

  #np-label small { color: var(--muted); font-size: 0.72rem; margin-left: 8px; }

  #np-stop {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 4px 12px;
    cursor: pointer;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-family: 'Georgia', serif;
    border-radius: 2px;
    transition: all 0.15s;
  }
  #np-stop:hover { border-color: var(--red); color: var(--red); }

  .page {
    max-width: 1080px;
    margin: 0 auto;
    padding: 36px 40px 80px;
  }

  .skin-block { margin-bottom: 52px; }

  .skin-heading {
    display: flex;
    align-items: baseline;
    gap: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }

  .skin-heading h2 {
    font-size: 1.15rem;
    font-weight: normal;
    color: var(--gold2);
    letter-spacing: 0.03em;
  }

  .skin-count {
    font-size: 0.68rem;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: auto;
  }

  .qt {
    width: 100%;
    border-collapse: collapse;
    table-layout: fixed;
  }

  .qt colgroup col:nth-child(1) { width: 200px; }
  .qt colgroup col:nth-child(2) { width: 110px; }
  .qt colgroup col:nth-child(3) { width: auto; }

  .qt thead th {
    padding: 7px 12px;
    font-size: 0.65rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    text-align: left;
    font-weight: normal;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .qt tbody tr {
    border-bottom: 1px solid var(--border);
    transition: background 0.12s;
  }

  .qt tbody tr:hover { background: var(--active-bg); }
  .qt tbody tr.playing { background: var(--active-bg); }
  .qt tbody tr.playing td.ev-cell { color: var(--gold); }

  .qt td {
    padding: 10px 12px;
    vertical-align: top;
  }

  td.ev-cell {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding-top: 13px;
    transition: color 0.15s;
    word-break: break-word;
  }

  td.play-cell {
    padding-top: 8px;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    gap: 4px;
  }

  .lang-group {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .lang-label {
    font-size: 0.58rem;
    color: var(--dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    line-height: 1;
  }

  .lang-group.active-lang .lang-label { color: var(--gold); }

  a.play-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    color: var(--muted);
    text-decoration: none;
    font-size: 9px;
    transition: all 0.15s;
    cursor: pointer;
  }

  a.play-link:hover { background: var(--gold); border-color: var(--gold); color: var(--bg); }
  tr.playing a.play-link.active { background: var(--gold); border-color: var(--gold); color: var(--bg); }

  a.play-link .ico-play { display: inline; }
  a.play-link .ico-pause { display: none; }
  a.play-link.playing .ico-play { display: none; }
  a.play-link.playing .ico-pause { display: inline; }

  .no-audio {
    display: inline-block;
    width: 28px;
    text-align: center;
    color: var(--border2);
    font-size: 12px;
  }

  td.text-cell {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text);
  }

  .dl-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 16px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    border-radius: 2px;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .dl-btn:hover { border-color: var(--gold); color: var(--gold2); }
  .dl-btn svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }

  a.dl-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    color: var(--muted);
    text-decoration: none;
    font-size: 8px;
    transition: all 0.15s;
    cursor: pointer;
    flex-shrink: 0;
  }
  a.dl-link:hover { border-color: var(--blue); color: var(--blue); }
  a.dl-link svg { width: 9px; height: 9px; fill: currentColor; }

  footer {
    border-top: 1px solid var(--border);
    padding: 24px 40px;
    font-size: 0.72rem;
    color: var(--dim);
    text-align: center;
    letter-spacing: 0.06em;
  }

  footer a { color: var(--blue); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .site-header, .lang-bar, .page { padding-left: 16px; padding-right: 16px; }
    #np-bar { padding: 10px 16px; }
    .qt colgroup col:nth-child(1) { width: 110px; }
    .qt colgroup col:nth-child(2) { width: 90px; }
  }
</style>
</head>

const LANGS = ['JP', 'CN', 'EN', 'KR'];
let currentLang = 'JP';
let activeLink = null;

const aud = document.getElementById('aud');
const npBar = document.getElementById('np-bar');
const npLabel = document.getElementById('np-label');
const npStop = document.getElementById('np-stop');
const main = document.getElementById('main');

function stopAll() {
  aud.pause();
  aud.src = '';
  if (activeLink) { activeLink.classList.remove('playing'); activeLink = null; }
  npBar.classList.remove('on');
}

npStop.addEventListener('click', stopAll);
aud.addEventListener('ended', stopAll);

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    // Highlight active lang group
    document.querySelectorAll('.lang-group').forEach(g => {
      g.classList.toggle('active-lang', g.dataset.lang === currentLang);
    });
  });
});

const DL_SVG = `<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 12l-5-5h3V1h4v6h3L8 12zm-6 2h12v1H2v-1z"/></svg>`;

// Group lines into sections
const sections = [
  { name: 'General', events: ['Appointed as Assistant','Talk 1','Talk 2','Talk 3','Talk after Promotion 1','Talk after Promotion 2','Talk after Trust Increase 1','Talk after Trust Increase 2','Talk after Trust Increase 3','Idle','Onboard','Watching Battle Record','Promotion 1','Promotion 2'] },
  { name: 'Deployment', events: ['Added to Squad','Appointed as Squad Leader','Depart','Begin Operation','Selecting Operator 1','Selecting Operator 2','Deployment 1','Deployment 2','In Battle 1','In Battle 2','In Battle 3','In Battle 4','4-star Result','3-star Result','Sub 3-star Result','Operation Failure'] },
  { name: 'Base & Interaction', events: ['Assigned to Facility','Tap','Trust Tap','Greeting','Title'] },
  { name: 'Special', events: ['Anniversary Celebration','New Year Wishes','Birthday'] },
];

let audioCount = 0;

sections.forEach(section => {
  const sectionLines = DATA.filter(l => section.events.includes(l.event));
  if (!sectionLines.length) return;

  const withAudio = sectionLines.filter(l => l.urls && Object.keys(l.urls).length > 0).length;
  audioCount += withAudio;

  const block = document.createElement('div');
  block.className = 'skin-block';
  block.innerHTML = `
    <div class="skin-heading">
      <h2>${section.name}</h2>
      <span class="skin-count">${withAudio} audio · ${sectionLines.length} lines</span>
    </div>`;

  const table = document.createElement('table');
  table.className = 'qt';
  table.innerHTML = `
    <colgroup><col><col><col></colgroup>
    <thead><tr><th>Event</th><th>▶ Voice</th><th>Transcription (EN)</th></tr></thead>`;

  const tbody = document.createElement('tbody');

  sectionLines.forEach(line => {
    const tr = document.createElement('tr');

    // Build play cell with JP/CN/EN/KR buttons
    let playHtml = '<td class="play-cell">';
    LANGS.forEach(lang => {
      const url = line.urls && line.urls[lang];
      const isActive = lang === currentLang;
      if (url) {
        playHtml += `<div class="lang-group${isActive ? ' active-lang' : ''}" data-lang="${lang}">
          <span class="lang-label">${lang}</span>
          <a class="play-link" href="${url}" data-lang="${lang}" data-event="${line.event}">
            <span class="ico-play">▶</span><span class="ico-pause">⏸</span>
          </a>
        </div>`;
      } else {
        playHtml += `<div class="lang-group${isActive ? ' active-lang' : ''}" data-lang="${lang}">
          <span class="lang-label">${lang}</span>
          <span class="no-audio">—</span>
        </div>`;
      }
    });
    playHtml += '</td>';

    tr.innerHTML = `
      <td class="ev-cell">${line.event}</td>
      ${playHtml}
      <td class="text-cell">${line.text || '<em style="color:var(--dim)">—</em>'}</td>`;

    // Attach play events
    tr.querySelectorAll('a.play-link').forEach(a => {
      a.addEventListener('click', e => {
        e.preventDefault();
        const url = a.href;
        if (activeLink === a) { stopAll(); return; }
        if (activeLink) activeLink.classList.remove('playing');
        activeLink = a;
        a.classList.add('playing');
        aud.src = url;
        aud.play();
        npBar.classList.add('on');
        npLabel.innerHTML = `${line.event} <small>${a.dataset.lang}</small>`;
      });
    });

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  block.appendChild(table);
  main.appendChild(block);
});

document.getElementById('total-n').textContent = audioCount;

// Download All (current lang)
document.getElementById('dl-all-btn').addEventListener('click', async () => {
  const btn = document.getElementById('dl-all-btn');
  const allUrls = DATA
    .filter(l => l.urls && l.urls[currentLang])
    .map(l => ({ url: l.urls[currentLang], name: l.urls[currentLang].split('/').pop() }));
  btn.textContent = `Downloading ${currentLang}…`;
  btn.disabled = true;
  let i = 0;
  for (const { url, name } of allUrls) {
    try {
      const resp = await fetch(url);
      const blob = await resp.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    } catch(e) { console.warn('Failed:', url, e); }
    i++;
    btn.textContent = `Downloading… ${i}/${allUrls.length}`;
    await new Promise(r => setTimeout(r, 350));
  }
  btn.textContent = '✓ Done!';
  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = `${DL_SVG} Download All Audio`;
  }, 2000);
});
</script>
