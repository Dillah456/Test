<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RJ01229253 Player</title>

<style>
body{
    background:#0f1115;
    color:#e4e6eb;
    font-family:Segoe UI, Arial, sans-serif;
}

h3{
    color:#ffffff;
    border-left:4px solid #4da3ff;
    padding-left:12px;
    margin-top:30px;
}

audio{
    width:100%;
    max-width:500px;
    margin:10px 0;
    border-radius:8px;
    padding:5px;
}

button{
    margin:5px;
    padding:8px 12px;
    background:#1a1d24;
    color:#fff;
    border:1px solid #4da3ff;
    border-radius:6px;
    cursor:pointer;
}

button:hover{
    background:#4da3ff;
}

table{
    width:100%;
    max-width:900px;
    border-collapse:collapse;
    margin-top:20px;
    background:#151922;
}

th, td{
    border:1px solid #2a2f3a;
    padding:10px;
}

th{
    background:#1f2633;
    color:#4da3ff;
}

tr:hover{
    background:#1a1d24;
    cursor:pointer;
}
</style>
</head>

<body>

<div>
    <h3>Track Player</h3>

    <audio id="player" controls>
        <source src="RJ01229253.mp3" type="audio/mpeg">
    </audio>

    <!-- Skip -->
    <div>
        <button onclick="skipTime(-10)">⏪ -10s</button>
        <button onclick="skipTime(10)">⏩ +10s</button>
    </div>

    <!-- Quick Jump -->
    <div>
        <button onclick="jumpTime('00:00')">Title</button>
        <button onclick="jumpTime('00:06')">Track 1</button>
        <button onclick="jumpTime('07:54')">Track 2</button>
        <button onclick="jumpTime('26:02')">Track 3</button>
        <button onclick="jumpTime('52:14')">Track 4</button>
    </div>

    <h3>Track List</h3>

    <table>
        <thead>
            <tr>
                <th>No</th>
                <th>Japanese</th>
                <th>Translation</th>
                <th>Duration</th>
                <th>Start</th>
            </tr>
        </thead>
        <tbody>
            <tr onclick="jumpTime('00:00')">
                <td>01</td>
                <td>『タイトルコール』</td>
                <td>Title Call</td>
                <td>00:06</td>
                <td>00:00</td>
            </tr>
            <tr onclick="jumpTime('00:06')">
                <td>02</td>
                <td>『電話口の声色』</td>
                <td>Voice over the phone</td>
                <td>07:48</td>
                <td>00:06</td>
            </tr>
            <tr onclick="jumpTime('07:54')">
                <td>03</td>
                <td>『書記としてのお仕事』</td>
                <td>Work as a secretary</td>
                <td>18:08</td>
                <td>07:54</td>
            </tr>
            <tr onclick="jumpTime('26:02')">
                <td>04</td>
                <td>『ご褒美のお時間』</td>
                <td>Reward time</td>
                <td>26:12</td>
                <td>26:02</td>
            </tr>
            <tr onclick="jumpTime('52:14')">
                <td>05</td>
                <td>『運動のお手伝い』</td>
                <td>Helping with exercise</td>
                <td>11:25</td>
                <td>52:14</td>
            </tr>
        </tbody>
    </table>

</div>

<script>
function jumpTime(timeString){
    const audio = document.getElementById("player");
    const parts = timeString.split(":");
    const seconds = (parseInt(parts[0]) * 60) + parseInt(parts[1]);

    audio.currentTime = seconds;
    audio.play();
}

function skipTime(offset){
    const audio = document.getElementById("player");

    let newTime = audio.currentTime + offset;

    if(newTime < 0) newTime = 0;
    if(newTime > audio.duration) newTime = audio.duration;

    audio.currentTime = newTime;
}
</script>

</body>
</html>
