    letter-spacing: 0.04em;
    color: var(--gold2);

  }

    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-top: 6px;
  }

  .header-meta {
    margin-left: auto;
    text-align: right;
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.8;
  }

  .header-meta strong {
    display: block;
    color: var(--gold);
    font-size: 1.2rem;
    font-weight: normal;
  }

  .lang-bar {
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    padding: 10px 40px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .lang-bar span {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-right: 10px;
  }

  .lang-btn {

    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 16px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 0.78rem;

  .lang-btn.active { background: var(--gold); border-color: var(--gold); color: var(--bg); font-weight: bold; }

  #np-bar {
    position: sticky;
    top: 0;
    z-index: 200;
    background: rgba(13,15,20,0.95);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--gold);
    padding: 10px 40px;
    display: none;
    align-items: center;
    gap: 16px;
  }

  #np-bar.on { display: flex; }

  .np-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--gold);
    animation: blink 1.2s ease-in-out infinite;
    flex-shrink: 0;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.2; }
  }

  #np-label {
    flex: 1;
    font-size: 0.82rem;
    color: var(--gold2);
  }

  #np-label small { color: var(--muted); font-size: 0.72rem; margin-left: 8px; }

  #np-stop {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 4px 12px;
    cursor: pointer;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;

    border-radius: 2px;
    transition: all 0.15s;
  }

    max-width: 1080px;
    margin: 0 auto;
    padding: 36px 40px 80px;
  }

  .skin-block {
    margin-bottom: 52px;
  }

  .skin-heading {

    align-items: baseline;
    gap: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;

    font-weight: normal;
    color: var(--gold2);
    letter-spacing: 0.03em;

    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-left: auto;

    table-layout: fixed;

  .qt colgroup col:nth-child(2) { width: 60px; }
  .qt colgroup col:nth-child(3) { width: auto; }

    padding: 7px 12px;

    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--dim);
    text-align: left;
    font-weight: normal;
    border-bottom: 1px solid var(--border);

    vertical-align: top;

    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding-top: 13px;
    transition: color 0.15s;
    word-break: break-word;
  }

  td.play-cell {
    text-align: center;
    padding-top: 8px;
    display: flex;
    align-items: center;
    gap: 0;
  }

  a.play-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 30px; height: 30px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    color: var(--muted);
    text-decoration: none;
    font-size: 10px;
    transition: all 0.15s;
    cursor: pointer;
  }

  a.play-link:hover,
  tr.playing a.play-link {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--bg);
  }

  a.play-link .ico-play { display: inline; }
  a.play-link .ico-pause { display: none; }
  tr.playing a.play-link .ico-play { display: none; }
  tr.playing a.play-link .ico-pause { display: inline; }

  .no-audio {
    display: inline-block;
    width: 30px;
    text-align: center;
    color: var(--border2);
    font-size: 12px;
  }

  td.text-cell {
    font-size: 0.9rem;
    line-height: 1.65;
    color: var(--text);
  }

  td.text-cell .lang-text { display: none; }
  td.text-cell .lang-text.visible { display: block; }

  td.text-cell .lang-text em {
    color: var(--dim);
    font-style: italic;
    font-size: 0.82rem;
  }

  .dl-btn {
    background: none;
    border: 1px solid var(--border2);
    color: var(--muted);
    padding: 5px 16px;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    border-radius: 2px;
    transition: all 0.15s;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .dl-btn:hover { border-color: var(--gold); color: var(--gold2); }
  .dl-btn svg { width: 11px; height: 11px; fill: currentColor; flex-shrink: 0; }

  a.dl-link {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    width: 24px; height: 24px;
    border-radius: 50%;
    border: 1px solid var(--border2);
    color: var(--muted);
    text-decoration: none;
    font-size: 9px;
    transition: all 0.15s;
    cursor: pointer;
    margin-left: 4px;
    flex-shrink: 0;
  }
  a.dl-link:hover { border-color: var(--blue); color: var(--blue); }
  a.dl-link svg { width: 10px; height: 10px; fill: currentColor; }

  footer {
    border-top: 1px solid var(--border);
    padding: 24px 40px;
    font-size: 0.72rem;
    color: var(--dim);
    text-align: center;

  @media (max-width: 640px) {

    .qt colgroup col:nth-child(1) { width: 110px; }
    .qt colgroup col:nth-child(2) { width: 50px; }
  }
</style>
</head>

const aud = document.getElementById('aud');
const npBar = document.getElementById('np-bar');
const npLabel = document.getElementById('np-label');
const npStop = document.getElementById('np-stop');
const main = document.getElementById('main');

let activeTr = null;
let currentLang = 'en';

function stopAll() {
  aud.pause();
  aud.src = '';
  if (activeTr) { activeTr.classList.remove('playing'); activeTr = null; }
  npBar.classList.remove('on');
}

npStop.addEventListener('click', stopAll);
aud.addEventListener('ended', stopAll);

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    document.querySelectorAll('.lang-text').forEach(el => {
      el.classList.toggle('visible', el.dataset.lang === currentLang);
    });
  });
});

let audioCount = 0;
const DL_SVG = `<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 12l-5-5h3V1h4v6h3L8 12zm-6 2h12v1H2v-1z"/></svg>`;

DATA.forEach(skin => {
  const block = document.createElement('div');
  block.className = 'skin-block';

  const withAudio = skin.lines.filter(l => l.url).length;
  if (withAudio > 0) audioCount += withAudio;

  block.innerHTML = `
    <div class="skin-heading">
      <h2>${skin.skin}</h2>
      <span class="skin-count">${withAudio} audio · ${skin.lines.length} lines</span>
    </div>`;

  const table = document.createElement('table');
  table.className = 'qt';
  table.innerHTML = `
    <colgroup><col><col><col></colgroup>
    <thead><tr><th>Event</th><th>▶</th><th>Transcription</th></tr></thead>`;

  const tbody = document.createElement('tbody');

  skin.lines.forEach(line => {
    const tr = document.createElement('tr');

    const playCell = line.url
      ? `<td class="play-cell">
          <a class="play-link" href="${line.url}" data-event="${line.event}" data-skin="${skin.skin}">
            <span class="ico-play">▶</span>
            <span class="ico-pause">⏸</span>
          </a>
          <a class="dl-link" href="${line.url}" download="${line.url.split('/').pop()}" title="Download ${line.url.split('/').pop()}">${DL_SVG}</a>
        </td>`
      : `<td class="play-cell"><span class="no-audio">—</span></td>`;

    const enText = line.en || '';
    const cnText = line.cn || '';
    const jpText = line.jp || '';

    tr.innerHTML = `
      <td class="ev-cell">${line.event}</td>
      ${playCell}
      <td class="text-cell">
        <span class="lang-text${currentLang==='en' ? ' visible' : ''}" data-lang="en">${enText || '<em>—</em>'}</span>
        <span class="lang-text${currentLang==='cn' ? ' visible' : ''}" data-lang="cn">${cnText || '<em>—</em>'}</span>
        <span class="lang-text${currentLang==='jp' ? ' visible' : ''}" data-lang="jp">${jpText || '<em>—</em>'}</span>
      </td>`;

    if (line.url) {
      const a = tr.querySelector('a.play-link');
      a.addEventListener('click', e => {
        e.preventDefault();
        if (activeTr === tr) { stopAll(); return; }
        if (activeTr) activeTr.classList.remove('playing');
        activeTr = tr;
        tr.classList.add('playing');
        aud.src = line.url;
        aud.play();
        npBar.classList.add('on');
        npLabel.innerHTML = `${line.event} <small>${skin.skin}</small>`;
      });
    }

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  block.appendChild(table);
  main.appendChild(block);
});

document.getElementById('total-n').textContent = audioCount;

// Download All Audio
document.getElementById('dl-all-btn').addEventListener('click', async () => {
  const btn = document.getElementById('dl-all-btn');
  const allUrls = DATA.flatMap(skin => skin.lines.filter(l => l.url).map(l => ({ url: l.url, name: l.url.split('/').pop() })));
  btn.textContent = 'Starting downloads…';
  btn.disabled = true;
  let i = 0;
  for (const { url, name } of allUrls) {
    try {
      const resp = await fetch(url);
      const blob = await resp.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    } catch(e) { console.warn('Failed:', url, e); }
    i++;
    btn.textContent = `Downloading… ${i}/${allUrls.length}`;
    await new Promise(r => setTimeout(r, 350));
  }
  btn.textContent = '✓ Done!';
  setTimeout(() => {
    btn.disabled = false;
    btn.innerHTML = `${DL_SVG} Download All Audio`;
  }, 2000);
});
