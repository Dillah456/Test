<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hunt — Gather Input</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@400;700&display=swap');

  :root {
    --bg: #080e1a;
    --surface: #0f1e35;
    --border: #1e3a5a;
    --accent: #00cfff;
    --accent2: #ff5e5b;
    --text: #cde4f5;
    --muted: #4a7a9b;
    --state-color: #34d399;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 32px 20px;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: 2rem;
    font-weight: 700;
    text-align: center;
    letter-spacing: 0.1em;
    color: var(--state-color);
    text-shadow: 0 0 24px #34d39955;
    margin-bottom: 4px;
  }

  .subtitle {
    text-align: center;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  /* ── FORM CARD ── */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px 28px;
    margin-bottom: 24px;
    max-width: 680px;
    margin-left: auto;
    margin-right: auto;
  }

  .form-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    color: var(--state-color);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .form-group {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .form-group.full {
    grid-column: 1 / -1;
  }

  label {
    font-size: 0.72rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  input, select, textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.84rem;
    padding: 10px 14px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }

  input:focus, select:focus, textarea:focus {
    border-color: var(--state-color);
    box-shadow: 0 0 0 2px #34d39922;
  }

  input::placeholder, textarea::placeholder {
    color: var(--muted);
    opacity: 0.6;
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  select option {
    background: var(--bg);
  }

  /* ── ACTIONS ── */
  .form-actions {
    display: flex;
    gap: 12px;
    justify-content: flex-end;
    margin-top: 20px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }

  .btn-reset {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    padding: 9px 22px;
    border-radius: 6px;
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s;
  }
  .btn-reset:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  .btn-submit {
    background: var(--state-color);
    color: #080e1a;
    border: none;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.88rem;
    padding: 9px 28px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .btn-submit:hover {
    background: #6ee7b7;
    box-shadow: 0 0 14px #34d39966;
  }
  .btn-submit:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 28px;
    right: 28px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 20px;
    font-size: 0.84rem;
    color: var(--text);
    box-shadow: 0 4px 24px #00000055;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none;
    z-index: 999;
    max-width: 320px;
  }
  #toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  #toast.success { border-color: var(--state-color); color: var(--state-color); }
  #toast.error   { border-color: var(--accent2); color: var(--accent2); }

  /* ── RECENT LOG ── */
  .log-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 20px 24px;
    max-width: 680px;
    margin: 0 auto;
  }

  .log-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .log-empty {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: center;
    padding: 16px 0;
  }

  .log-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.8rem;
    animation: fadeIn 0.3s ease;
  }
  .log-item:last-child { border-bottom: none; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .log-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--state-color);
    flex-shrink: 0;
    box-shadow: 0 0 6px #34d39988;
  }

  .log-name { color: var(--text); font-weight: 600; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .log-meta { color: var(--muted); font-size: 0.73rem; white-space: nowrap; }

  .badge-district {
    display: inline-block;
    background: #00cfff18;
    color: var(--accent);
    border: 1px solid #00cfff44;
    border-radius: 4px;
    padding: 2px 8px;
    font-size: 0.73rem;
    flex-shrink: 0;
  }

  /* ── RESPONSIVE ── */
  @media (max-width: 520px) {
    .form-grid { grid-template-columns: 1fr; }
    .form-group.full { grid-column: 1; }
    .form-actions { flex-direction: column; }
    .btn-reset, .btn-submit { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<h1>🌿 GATHER</h1>
<p class="subtitle">State: Gather — Input Data</p>

<div class="form-card">
  <h2>+ Tambah Entry Baru</h2>
  <div class="form-grid">

    <div class="form-group">
      <label for="fDistrict">District</label>
      <input type="number" id="fDistrict" placeholder="e.g. 3" min="1">
    </div>

    <div class="form-group">
      <label for="fName">Name</label>
      <input type="text" id="fName" placeholder="Nama target...">
    </div>

    <div class="form-group full">
      <label for="fSites">Sites</label>
      <input type="text" id="fSites" placeholder="Nama / deskripsi situs...">
    </div>

    <div class="form-group full">
      <label for="fPath">Path / URL</label>
      <input type="url" id="fPath" placeholder="https://...">
    </div>

  </div>

  <div class="form-actions">
    <button class="btn-reset" onclick="resetForm()">Reset</button>
    <button class="btn-submit" id="btnSubmit" onclick="submitData()">Submit →</button>
  </div>
</div>

<!-- Recent Log -->
<div class="log-card">
  <h2>Recent Submissions</h2>
  <div id="logList"><p class="log-empty">Belum ada submission sesi ini.</p></div>
</div>

<div id="toast"></div>

<script>
const API_URL  = "https://x8ki-letl-twmt.n7.xano.io/api:X6h8irt0/hunt";
const LOG_MAX  = 5;
let sessionLog = [];

/* ── SUBMIT ── */
async function submitData() {
  const district = document.getElementById("fDistrict").value.trim();
  const name     = document.getElementById("fName").value.trim();
  const sites    = document.getElementById("fSites").value.trim();
  const path     = document.getElementById("fPath").value.trim();

  if (!district || !name) {
    showToast("⚠ District dan Name wajib diisi.", "error");
    return;
  }

  const btn = document.getElementById("btnSubmit");
  btn.disabled = true;
  btn.innerText = "Sending...";

  const payload = {
    District: parseInt(district),
    Name: name,
    Sites: sites || null,
    Path: path || null,
    State: "Gather"
  };

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    });

    if (!res.ok) throw new Error(`HTTP ${res.status}`);

    const data = await res.json();
    showToast("✓ Data berhasil disimpan!", "success");
    addToLog({ district, name, sites, id: data.id });
    resetForm();
  } catch (err) {
    console.error(err);
    showToast("✗ Gagal menyimpan data.", "error");
  } finally {
    btn.disabled = false;
    btn.innerText = "Submit →";
  }
}

/* ── RESET ── */
function resetForm() {
  ["fDistrict","fName","fSites","fPath"].forEach(id => {
    document.getElementById(id).value = "";
  });
}

/* ── LOG ── */
function addToLog(entry) {
  sessionLog.unshift(entry);
  if (sessionLog.length > LOG_MAX) sessionLog.pop();
  renderLog();
}

function renderLog() {
  const list = document.getElementById("logList");
  if (sessionLog.length === 0) {
    list.innerHTML = '<p class="log-empty">Belum ada submission sesi ini.</p>';
    return;
  }
  list.innerHTML = sessionLog.map(e => `
    <div class="log-item">
      <div class="log-dot"></div>
      <span class="log-name">${escHtml(e.name)}</span>
      <span class="badge-district">D-${escHtml(String(e.district))}</span>
      <span class="log-meta">${e.sites ? escHtml(e.sites) : "—"}</span>
    </div>
  `).join("");
}

function escHtml(str) {
  return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

/* ── TOAST ── */
let toastTimer;
function showToast(msg, type = "success") {
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    t.className = "";
  }, 3000);
}

/* ── ENTER KEY ── */
document.addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey && document.activeElement.tagName !== "TEXTAREA") {
    submitData();
  }
});
</script>
</body>
</html>
