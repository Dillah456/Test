<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@300;500;700&display=swap');

    /* =====================================================
       THEME
       ===================================================== */
    :root {
      --bg:        #080c14;
      --panel:     #0d1525;
      --border:    #1a2f52;
      --accent:    #00d4ff;
      --accent2:   #00ff99;
      --gold:      #ffd166;
      --text:      #c8ddf0;
      --muted:     #4a6a8a;
      --danger:    #ff4757;
      --flash-col: rgba(0,255,153,0.18);
      --grid-col:  rgba(0,212,255,0.03);
      --bar-bg:    rgba(0,0,0,0.4);
      --particle:  #00ff99;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Chakra Petch', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid-col) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-col) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridDrift {
      0%   { transform: translate(0,0); }
      100% { transform: translate(40px,40px); }
    }

    /* =====================================================
       CARD
       ===================================================== */
    .container { position: relative; width: 460px; max-width: 95vw; z-index: 2; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 36px 34px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    }

    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,212,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .corner-tl, .corner-br {
      position: absolute; width: 16px; height: 16px;
      border-color: var(--accent); border-style: solid;
    }
    .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* =====================================================
       RECEIPT HEADER
       ===================================================== */
    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--accent);
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 8px;
    }
    .badge::before {
      content: ''; width: 6px; height: 6px;
      background: var(--accent); border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.3; transform:scale(0.6); }
    }

    /* =====================================================
       TRANSFER FLOW
       ===================================================== */
    .transfer-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 28px;
    }

    .party {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      padding: 14px 16px;
      border-radius: 2px;
    }

    .party-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 6px;
    }

    .party-name {
      font-size: 15px; font-weight: 700;
      color: #fff; line-height: 1.2;
    }

    .arrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px; color: var(--accent);
      flex-shrink: 0;
      text-shadow: 0 0 8px var(--accent);
      animation: arrowPulse 1.2s ease-in-out infinite;
    }
    @keyframes arrowPulse {
      0%,100% { opacity:1; transform: translateX(0); }
      50%      { opacity:0.5; transform: translateX(4px); }
    }

    /* =====================================================
       DETAILS ROW
       ===================================================== */
    .details {
      display: flex; gap: 12px; margin-bottom: 28px;
    }

    .detail-box {
      flex: 1;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border);
      padding: 12px 14px; border-radius: 2px;
    }

    .detail-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 6px;
    }

    .detail-value {
      font-size: 13px; font-weight: 600; color: var(--text);
    }

    .nominal-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 28px; font-weight: 400;
      color: var(--gold); letter-spacing: -1px;
      line-height: 1;
    }

    /* =====================================================
       SALDO DISPLAY
       ===================================================== */
    .saldo-section { margin-bottom: 28px; }

    .saldo-label {
      font-size: 9px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 10px;
      font-family: 'Share Tech Mono', monospace;
    }

    .saldo-track {
      background: var(--bar-bg);
      border: 1px solid var(--border);
      border-radius: 2px; height: 6px;
      margin-bottom: 12px; overflow: hidden;
    }

    .saldo-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px; width: 0%;
      transition: width 1.8s cubic-bezier(0.22,1,0.36,1);
      position: relative;
    }

    .saldo-fill::after {
      content: '';
      position: absolute; right: 0; top: 0;
      width: 40px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
      animation: shimmer 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { opacity:0; } 50% { opacity:1; } 100% { opacity:0; }
    }

    .saldo-numbers { display:flex; align-items:flex-end; gap:10px; }

    .saldo-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 46px; line-height: 1;
      color: #fff; letter-spacing: -2px;
      transition: color .3s, text-shadow .3s;
    }
    .saldo-value.increasing {
      color: var(--accent2);
      text-shadow: 0 0 30px rgba(0,255,153,0.5);
    }

    .saldo-delta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px; color: var(--accent2);
      margin-bottom: 6px;
      opacity: 0; transform: translateY(10px);
      transition: all .4s ease;
    }
    .saldo-delta.show { opacity:1; transform:translateY(0); }

    /* =====================================================
       PARTICLES
       ===================================================== */
    .particle {
      position: fixed;
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px; color: var(--particle);
      text-shadow: 0 0 8px var(--particle);
      pointer-events: none;
      animation: floatUp 1.4s ease-out forwards;
      z-index: 999;
    }
    @keyframes floatUp {
      0%   { opacity:1; transform:translateY(0) scale(1); }
      100% { opacity:0; transform:translateY(-110px) scale(1.3); }
    }

    /* =====================================================
       STATUS LOG
       ===================================================== */
    .status-log {
      border-top: 1px solid var(--border);
      padding-top: 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--muted);
      min-height: 56px;
    }

    .log-line {
      display: flex; gap: 10px; margin-bottom: 5px;
      opacity: 0; transform: translateX(-8px);
      animation: logIn .3s ease forwards;
    }
    @keyframes logIn { to { opacity:1; transform:translateX(0); } }
    .log-time { color: var(--accent); }
    .log-ok   { color: var(--accent2); }
    .log-err  { color: var(--danger); }

    /* =====================================================
       REDIRECT BAR
       ===================================================== */
    .redirect-bar { margin-top: 18px; display: none; }
    .redirect-bar.show { display: block; }

    .redirect-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--muted);
      margin-bottom: 7px;
      display: flex; justify-content: space-between;
    }
    .redirect-countdown { color: var(--gold); }

    .redirect-track {
      background: rgba(255,209,102,0.1);
      border: 1px solid rgba(255,209,102,0.3);
      border-radius: 2px; height: 4px; overflow: hidden;
    }
    .redirect-fill {
      height: 100%; background: var(--gold);
      width: 100%; transform-origin: left;
    }
    @keyframes drain {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* =====================================================
       SCANLINES + FLASH
       ===================================================== */
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none; z-index: 10;
    }
    .flash {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,255,153,0.18) 0%, transparent 70%);
      opacity: 0; pointer-events: none; z-index: 5;
      transition: opacity .1s;
    }
    .flash.active { opacity: 1; }
  </style>
</head>
<body>
<div class="scanlines"></div>
<div class="flash" id="flash"></div>

<div class="container">
  <div class="card">
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="badge">KWITANSI // SINGLE TRANSACTION</div>

    <div class="transfer-row">
      <div class="party">
        <div class="party-label">FROM · PENGIRIM</div>
        <div class="party-name" id="namaPengirim">—</div>
      </div>
      <div class="arrow">→</div>
      <div class="party">
        <div class="party-label">TO · PENERIMA</div>
        <div class="party-name" id="namaPenerima">—</div>
      </div>
    </div>

    <div class="details">
      <div class="detail-box">
        <div class="detail-label">KETERANGAN</div>
        <div class="detail-value" id="keterangan">—</div>
      </div>
      <div class="detail-box" style="flex:0 0 auto; min-width:110px;">
        <div class="detail-label">NOMINAL</div>
        <div class="nominal-value" id="nominal">—</div>
      </div>
    </div>

    <div class="saldo-section">
      <div class="saldo-label">SALDO PENERIMA</div>
      <div class="saldo-track">
        <div class="saldo-fill" id="saldoFill"></div>
      </div>
      <div class="saldo-numbers">
        <div class="saldo-value" id="saldoDisplay">—</div>
        <div class="saldo-delta" id="saldoDelta"></div>
      </div>
    </div>

    <div class="status-log" id="statusLog"></div>

    <div class="redirect-bar" id="redirectBar">
      <div class="redirect-label">
        <span>TRANSACTION COMPLETE — REDIRECTING</span>
        <span class="redirect-countdown" id="countdown">3s</span>
      </div>
      <div class="redirect-track">
        <div class="redirect-fill" id="redirectFill"></div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ==========================================================
     ▌ CONFIGURATION — edit only this block
     ========================================================== */
  const CONFIG = {
    // ── APIs ────────────────────────────────────────────────
    apiSaldo:    'https://x8ki-letl-twmt.n7.xano.io/api:X6h8irt0/formalhault',
    apiKwitansi: 'https://x8ki-letl-twmt.n7.xano.io/api:ZBg3zfDx/kwitansi',

    // ── Transaction details ──────────────────────────────────
    pengirimNama:   'Iwatani Naofumi',  // sender name (default)
    penerimaId:     4,                  // receiver's formalhault record ID (Iwatani Naofumi = 4)
    penerimaName:   'Iwatani Naofumi',  // receiver display name
    nominal:        10,                 // amount to transfer
    keterangan:     'Self-Actualization', // transaction note

    // ── Redirect ─────────────────────────────────────────────
    redirectUrl:   'https://www.google.com',
    redirectDelay: 3,

    // ── Bar scaling ──────────────────────────────────────────
    barMax: 100,   // saldo value = 100% bar fill
  };
  /* ========================================================== */


  /* ----------------------------------------------------------
     DOM refs
  ---------------------------------------------------------- */
  const els = {
    namaPengirim: document.getElementById('namaPengirim'),
    namaPenerima: document.getElementById('namaPenerima'),
    keterangan:   document.getElementById('keterangan'),
    nominal:      document.getElementById('nominal'),
    saldoDisplay: document.getElementById('saldoDisplay'),
    saldoDelta:   document.getElementById('saldoDelta'),
    saldoFill:    document.getElementById('saldoFill'),
    statusLog:    document.getElementById('statusLog'),
    redirectBar:  document.getElementById('redirectBar'),
    countdown:    document.getElementById('countdown'),
    redirectFill: document.getElementById('redirectFill'),
    flash:        document.getElementById('flash'),
  };

  /* ----------------------------------------------------------
     Utilities
  ---------------------------------------------------------- */
  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function log(msg, type = '') {
    const ts   = new Date().toTimeString().slice(0,8);
    const line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">[${ts}]</span><span class="${type}">${msg}</span>`;
    els.statusLog.appendChild(line);
  }

  function animateCounter(el, from, to, duration = 1800) {
    const start = performance.now();
    (function tick(now) {
      const t    = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 4);
      el.textContent = Math.round(from + (to - from) * ease);
      if (t < 1) requestAnimationFrame(tick);
      else el.textContent = to;
    })(performance.now());
  }

  function spawnParticles(x, y, amount, count = 8) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className   = 'particle';
      p.textContent = `+${Math.ceil(amount / count)}`;
      p.style.left           = (x + (Math.random()-0.5)*110) + 'px';
      p.style.top            = (y + (Math.random()-0.5)*40)  + 'px';
      p.style.animationDelay = (Math.random()*0.4) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }
  }

  function startRedirect() {
    els.redirectBar.classList.add('show');
    els.redirectFill.style.animation = `drain ${CONFIG.redirectDelay}s linear forwards`;
    let sec = CONFIG.redirectDelay;
    els.countdown.textContent = sec + 's';
    const iv = setInterval(() => {
      sec--;
      els.countdown.textContent = sec + 's';
      if (sec <= 0) { clearInterval(iv); window.location.href = CONFIG.redirectUrl; }
    }, 1000);
  }

  /* ----------------------------------------------------------
     API calls
  ---------------------------------------------------------- */
  async function postKwitansi() {
    const res = await fetch(CONFIG.apiKwitansi, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        Nama_Pengirim: CONFIG.pengirimNama,
        Nama_Penerima: CONFIG.penerimaName,
        Keterangan:    CONFIG.keterangan,
        Nominal:       CONFIG.nominal,
      }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function fetchRecord(id) {
    const res = await fetch(`${CONFIG.apiSaldo}/${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function patchSaldo(id, newSaldo) {
    const res = await fetch(`${CONFIG.apiSaldo}/${id}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ Saldo: newSaldo }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  /* ----------------------------------------------------------
     Main flow
  ---------------------------------------------------------- */
  async function run() {
    // Populate static UI
    els.namaPengirim.textContent = CONFIG.pengirimNama;
    els.namaPenerima.textContent = CONFIG.penerimaName;
    els.keterangan.textContent   = CONFIG.keterangan;
    els.nominal.textContent      = CONFIG.nominal;

    log('Initializing transaction...');
    await wait(500);

    // ── Step 1: Create Kwitansi log ─────────────────────────
    log(`Creating kwitansi log: ${CONFIG.pengirimNama} → ${CONFIG.penerimaName}...`);
    let kwitansi;
    try {
      kwitansi = await postKwitansi();
    } catch(e) {
      log(`KWITANSI ERROR: ${e.message}`, 'log-err'); return;
    }
    log(`Kwitansi #${kwitansi.id || '—'} recorded.`, 'log-ok');
    await wait(400);

    // ── Step 2: Fetch receiver's current saldo ───────────────
    log(`Fetching saldo for ID ${CONFIG.penerimaId}...`);
    let record;
    try {
      record = await fetchRecord(CONFIG.penerimaId);
    } catch(e) {
      log(`FETCH ERROR: ${e.message}`, 'log-err'); return;
    }

    const oldSaldo = record.Saldo;
    const newSaldo = oldSaldo + CONFIG.nominal;

    els.saldoDisplay.textContent = oldSaldo;
    els.saldoFill.style.width    = Math.min(oldSaldo / CONFIG.barMax * 100, 100) + '%';
    log(`Current saldo: ${oldSaldo} → Applying +${CONFIG.nominal}...`);
    await wait(500);

    // ── Step 3: Patch saldo ──────────────────────────────────
    try {
      await patchSaldo(CONFIG.penerimaId, newSaldo);
    } catch(e) {
      log(`SALDO UPDATE ERROR: ${e.message}`, 'log-err'); return;
    }

    log('Saldo updated.', 'log-ok');
    await wait(200);

    // ── Step 4: Animate ──────────────────────────────────────
    const rect = els.saldoDisplay.getBoundingClientRect();
    spawnParticles(rect.left + rect.width/2, rect.top, CONFIG.nominal);

    els.saldoDisplay.classList.add('increasing');
    els.saldoDelta.textContent = `+${CONFIG.nominal}`;
    els.saldoDelta.classList.add('show');

    animateCounter(els.saldoDisplay, oldSaldo, newSaldo, 1800);
    els.saldoFill.style.width = Math.min(newSaldo / CONFIG.barMax * 100, 100) + '%';

    await wait(400);
    els.flash.classList.add('active');
    setTimeout(() => els.flash.classList.remove('active'), 350);

    await wait(1800);
    log(`Transaction complete: ${oldSaldo} → ${newSaldo}`, 'log-ok');
    log('Preparing redirect...');
    els.saldoDisplay.classList.remove('increasing');

    await wait(500);
    startRedirect();
  }

  run();
</script>
</body>
</html>
