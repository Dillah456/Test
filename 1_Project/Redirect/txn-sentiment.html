<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sentiment Survey + Transaction</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@300;500;700&display=swap');

    /* =====================================================
       THEME
       ===================================================== */
    :root {
      --bg:        #080c14;
      --panel:     #0d1525;
      --border:    #1a2f52;
      --accent:    #00d4ff;
      --accent2:   #00ff99;
      --gold:      #ffd166;
      --text:      #c8ddf0;
      --muted:     #4a6a8a;
      --danger:    #ff4757;
      --joy:       #fbbf24;
      --sad:       #60a5fa;
      --grief:     #a78bfa;
      --flash-col: rgba(0,255,153,0.18);
      --grid-col:  rgba(0,212,255,0.03);
      --bar-bg:    rgba(0,0,0,0.4);
      --particle:  #00ff99;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Chakra Petch', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid-col) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-col) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridDrift {
      0%   { transform: translate(0,0); }
      100% { transform: translate(40px,40px); }
    }

    /* =====================================================
       SCREENS (survey vs result)
       ===================================================== */
    .screen {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      transition: opacity .5s ease, transform .5s ease;
    }
    .screen.hidden {
      opacity: 0; pointer-events: none;
      transform: scale(0.97);
    }

    /* =====================================================
       CARD
       ===================================================== */
    .container { position: relative; width: 460px; max-width: 95vw; z-index: 2; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 36px 34px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    }

    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,212,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    .corner-tl, .corner-br {
      position: absolute; width: 16px; height: 16px;
      border-color: var(--accent); border-style: solid;
    }
    .corner-tl { top:-1px; left:-1px; border-width: 2px 0 0 2px; }
    .corner-br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }

    /* =====================================================
       BADGE
       ===================================================== */
    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--accent);
      letter-spacing: 3px; text-transform: uppercase;
      margin-bottom: 24px;
      display: flex; align-items: center; gap: 8px;
    }
    .badge::before {
      content: ''; width: 6px; height: 6px;
      background: var(--accent); border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.3; transform:scale(0.6); }
    }

    /* =====================================================
       SURVEY SCREEN
       ===================================================== */
    .survey-title {
      font-size: 20px; font-weight: 700;
      color: #fff; margin-bottom: 6px; letter-spacing: 0.5px;
    }
    .survey-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; color: var(--muted);
      letter-spacing: 1px; margin-bottom: 30px;
    }

    /* Slider rows */
    .scale-row {
      margin-bottom: 22px;
    }

    .scale-header {
      display: flex; justify-content: space-between;
      align-items: baseline; margin-bottom: 10px;
    }

    .scale-name {
      font-size: 13px; font-weight: 700;
      letter-spacing: 1px;
    }
    .scale-name.joy   { color: var(--joy); }
    .scale-name.sad   { color: var(--sad); }
    .scale-name.grief { color: var(--grief); }

    .scale-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px; min-width: 24px;
      text-align: right; font-weight: 400;
      transition: color .2s;
    }
    .scale-val.joy   { color: var(--joy); }
    .scale-val.sad   { color: var(--sad); }
    .scale-val.grief { color: var(--grief); }

    /* Custom slider track */
    .slider-wrap {
      position: relative; height: 32px;
      display: flex; align-items: center;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100%; height: 6px;
      background: transparent;
      outline: none;
      cursor: pointer;
      position: relative; z-index: 2;
    }

    input[type=range]::-webkit-slider-runnable-track {
      height: 6px; border-radius: 3px;
      background: var(--border);
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 20px; height: 20px; border-radius: 50%;
      margin-top: -7px;
      border: 2px solid;
      cursor: pointer;
      transition: transform .15s;
    }
    input[type=range]::-webkit-slider-thumb:hover { transform: scale(1.2); }

    input.joy::-webkit-slider-thumb   { background: var(--joy);   border-color: var(--joy);   box-shadow: 0 0 8px var(--joy); }
    input.sad::-webkit-slider-thumb   { background: var(--sad);   border-color: var(--sad);   box-shadow: 0 0 8px var(--sad); }
    input.grief::-webkit-slider-thumb { background: var(--grief); border-color: var(--grief); box-shadow: 0 0 8px var(--grief); }

    input.joy::-webkit-slider-runnable-track   { background: linear-gradient(90deg, rgba(251,191,36,.3), rgba(251,191,36,.05)); }
    input.sad::-webkit-slider-runnable-track   { background: linear-gradient(90deg, rgba(96,165,250,.3), rgba(96,165,250,.05)); }
    input.grief::-webkit-slider-runnable-track { background: linear-gradient(90deg, rgba(167,139,250,.3), rgba(167,139,250,.05)); }

    .tick-row {
      display: flex; justify-content: space-between;
      padding: 0 2px;
      margin-top: 2px;
    }
    .tick {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px; color: var(--muted);
    }

    /* Submit button */
    .submit-btn {
      width: 100%; margin-top: 28px;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Chakra Petch', sans-serif;
      font-size: 13px; font-weight: 700;
      letter-spacing: 3px; text-transform: uppercase;
      cursor: pointer;
      clip-path: polygon(0 0, calc(100% - 12px) 0, 100% 12px, 100% 100%, 12px 100%, 0 calc(100% - 12px));
      transition: background .2s, color .2s;
      position: relative;
    }
    .submit-btn::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--accent);
      opacity: 0; transition: opacity .2s;
    }
    .submit-btn:hover::before { opacity: 0.1; }
    .submit-btn:active { transform: scale(0.98); }

    /* =====================================================
       RESULT SCREEN (transaction)
       ===================================================== */
    .sentiment-summary {
      display: flex; gap: 10px; margin-bottom: 24px;
    }

    .sent-chip {
      flex: 1; text-align: center;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      padding: 10px 8px; border-radius: 2px;
    }
    .sent-chip-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px; letter-spacing: 2px;
      text-transform: uppercase; margin-bottom: 6px;
    }
    .sent-chip-label.joy   { color: var(--joy); }
    .sent-chip-label.sad   { color: var(--sad); }
    .sent-chip-label.grief { color: var(--grief); }

    .sent-chip-val {
      font-family: 'Share Tech Mono', monospace;
      font-size: 22px; color: #fff; line-height: 1;
    }
    .sent-chip-val.joy   { color: var(--joy); }
    .sent-chip-val.sad   { color: var(--sad); }
    .sent-chip-val.grief { color: var(--grief); }

    /* Transfer row */
    .transfer-row {
      display: flex; align-items: center; gap: 12px; margin-bottom: 22px;
    }
    .party { flex: 1; background: rgba(0,0,0,0.3); border: 1px solid var(--border); padding: 12px 14px; border-radius: 2px; }
    .party-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .party-name  { font-size: 14px; font-weight: 700; color: #fff; line-height: 1.2; }
    .arrow { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--accent); flex-shrink: 0; text-shadow: 0 0 8px var(--accent); animation: arrowPulse 1.2s ease-in-out infinite; }
    @keyframes arrowPulse { 0%,100% { opacity:1; transform:translateX(0); } 50% { opacity:0.5; transform:translateX(4px); } }

    .details { display: flex; gap: 10px; margin-bottom: 22px; }
    .detail-box { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--border); padding: 10px 12px; border-radius: 2px; }
    .detail-label { font-family: 'Share Tech Mono', monospace; font-size: 9px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 5px; }
    .detail-value { font-size: 12px; font-weight: 600; color: var(--text); }
    .nominal-value { font-family: 'Share Tech Mono', monospace; font-size: 24px; color: var(--gold); letter-spacing: -0.5px; line-height: 1; }

    /* Saldo */
    .saldo-section { margin-bottom: 22px; }
    .saldo-label { font-size: 9px; letter-spacing: 3px; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; font-family: 'Share Tech Mono', monospace; }
    .saldo-track { background: var(--bar-bg); border: 1px solid var(--border); border-radius: 2px; height: 6px; margin-bottom: 10px; overflow: hidden; }
    .saldo-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; width: 0%; transition: width 1.8s cubic-bezier(0.22,1,0.36,1); position: relative; }
    .saldo-fill::after { content: ''; position: absolute; right: 0; top: 0; width: 40px; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6)); animation: shimmer 1.5s ease-in-out infinite; }
    @keyframes shimmer { 0%   { opacity:0; } 50% { opacity:1; } 100% { opacity:0; } }
    .saldo-numbers { display: flex; align-items: flex-end; gap: 10px; }
    .saldo-value { font-family: 'Share Tech Mono', monospace; font-size: 44px; line-height: 1; color: #fff; letter-spacing: -2px; transition: color .3s, text-shadow .3s; }
    .saldo-value.increasing { color: var(--accent2); text-shadow: 0 0 30px rgba(0,255,153,0.5); }
    .saldo-delta { font-family: 'Share Tech Mono', monospace; font-size: 15px; color: var(--accent2); margin-bottom: 6px; opacity: 0; transform: translateY(10px); transition: all .4s ease; }
    .saldo-delta.show { opacity:1; transform:translateY(0); }

    /* Particle */
    .particle { position: fixed; font-family: 'Share Tech Mono', monospace; font-size: 15px; color: var(--particle); text-shadow: 0 0 8px var(--particle); pointer-events: none; animation: floatUp 1.4s ease-out forwards; z-index: 999; }
    @keyframes floatUp { 0% { opacity:1; transform:translateY(0) scale(1); } 100% { opacity:0; transform:translateY(-110px) scale(1.3); } }

    /* Log */
    .status-log { border-top: 1px solid var(--border); padding-top: 16px; font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); min-height: 52px; }
    .log-line { display: flex; gap: 10px; margin-bottom: 4px; opacity: 0; transform: translateX(-8px); animation: logIn .3s ease forwards; }
    @keyframes logIn { to { opacity:1; transform:translateX(0); } }
    .log-time { color: var(--accent); }
    .log-ok   { color: var(--accent2); }
    .log-err  { color: var(--danger); }

    /* Redirect */
    .redirect-bar { margin-top: 16px; display: none; }
    .redirect-bar.show { display: block; }
    .redirect-label { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--muted); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .redirect-countdown { color: var(--gold); }
    .redirect-track { background: rgba(255,209,102,0.1); border: 1px solid rgba(255,209,102,0.3); border-radius: 2px; height: 4px; overflow: hidden; }
    .redirect-fill { height: 100%; background: var(--gold); width: 100%; transform-origin: left; }
    @keyframes drain { from { transform: scaleX(1); } to { transform: scaleX(0); } }

    /* Misc */
    .scanlines { position: fixed; inset: 0; background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px); pointer-events: none; z-index: 10; }
    .flash { position: fixed; inset: 0; background: radial-gradient(ellipse at center, rgba(0,255,153,0.18) 0%, transparent 70%); opacity: 0; pointer-events: none; z-index: 5; transition: opacity .1s; }
    .flash.active { opacity:1; }
  </style>
</head>
<body>
<div class="scanlines"></div>
<div class="flash" id="flash"></div>

<!-- ═══════════════════════════════════════════════
     SCREEN 1 — Sentiment Survey
     ═══════════════════════════════════════════════ -->
<div class="screen" id="screenSurvey">
  <div class="container">
    <div class="card">
      <div class="corner-tl"></div>
      <div class="corner-br"></div>

      <div class="badge">ORIGINIUM // SENTIMENT SURVEY</div>

      <div class="survey-title">How are you feeling?</div>
      <div class="survey-sub">RATE EACH SCALE · 0 – 10</div>

      <!-- Joy -->
      <div class="scale-row">
        <div class="scale-header">
          <span class="scale-name joy">✦ JOY</span>
          <span class="scale-val joy" id="valJoy">5</span>
        </div>
        <div class="slider-wrap">
          <input type="range" class="joy" id="slJoy" min="0" max="10" value="5" />
        </div>
        <div class="tick-row">
          <span class="tick">0</span><span class="tick">5</span><span class="tick">10</span>
        </div>
      </div>

      <!-- Sad -->
      <div class="scale-row">
        <div class="scale-header">
          <span class="scale-name sad">✦ SADNESS</span>
          <span class="scale-val sad" id="valSad">0</span>
        </div>
        <div class="slider-wrap">
          <input type="range" class="sad" id="slSad" min="0" max="10" value="0" />
        </div>
        <div class="tick-row">
          <span class="tick">0</span><span class="tick">5</span><span class="tick">10</span>
        </div>
      </div>

      <!-- Grief -->
      <div class="scale-row">
        <div class="scale-header">
          <span class="scale-name grief">✦ GRIEF</span>
          <span class="scale-val grief" id="valGrief">0</span>
        </div>
        <div class="slider-wrap">
          <input type="range" class="grief" id="slGrief" min="0" max="10" value="0" />
        </div>
        <div class="tick-row">
          <span class="tick">0</span><span class="tick">5</span><span class="tick">10</span>
        </div>
      </div>

      <button class="submit-btn" id="submitBtn">SUBMIT &amp; PROCEED →</button>
    </div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════
     SCREEN 2 — Transaction Result
     ═══════════════════════════════════════════════ -->
<div class="screen hidden" id="screenResult">
  <div class="container">
    <div class="card">
      <div class="corner-tl"></div>
      <div class="corner-br"></div>

      <div class="badge">KWITANSI // TRANSACTION</div>

      <!-- Sentiment recap -->
      <div class="sentiment-summary">
        <div class="sent-chip">
          <div class="sent-chip-label joy">JOY</div>
          <div class="sent-chip-val joy" id="recapJoy">—</div>
        </div>
        <div class="sent-chip">
          <div class="sent-chip-label sad">SADNESS</div>
          <div class="sent-chip-val sad" id="recapSad">—</div>
        </div>
        <div class="sent-chip">
          <div class="sent-chip-label grief">GRIEF</div>
          <div class="sent-chip-val grief" id="recapGrief">—</div>
        </div>
      </div>

      <!-- Transfer -->
      <div class="transfer-row">
        <div class="party">
          <div class="party-label">FROM · PENGIRIM</div>
          <div class="party-name" id="namaPengirim">—</div>
        </div>
        <div class="arrow">→</div>
        <div class="party">
          <div class="party-label">TO · PENERIMA</div>
          <div class="party-name" id="namaPenerima">—</div>
        </div>
      </div>

      <div class="details">
        <div class="detail-box">
          <div class="detail-label">KETERANGAN</div>
          <div class="detail-value" id="keterangan">—</div>
        </div>
        <div class="detail-box" style="flex:0 0 auto; min-width:100px;">
          <div class="detail-label">NOMINAL</div>
          <div class="nominal-value" id="nominal">—</div>
        </div>
      </div>

      <div class="saldo-section">
        <div class="saldo-label">SALDO PENERIMA</div>
        <div class="saldo-track">
          <div class="saldo-fill" id="saldoFill"></div>
        </div>
        <div class="saldo-numbers">
          <div class="saldo-value" id="saldoDisplay">—</div>
          <div class="saldo-delta" id="saldoDelta"></div>
        </div>
      </div>

      <div class="status-log" id="statusLog"></div>

      <div class="redirect-bar" id="redirectBar">
        <div class="redirect-label">
          <span>COMPLETE — REDIRECTING</span>
          <span class="redirect-countdown" id="countdown">3s</span>
        </div>
        <div class="redirect-track">
          <div class="redirect-fill" id="redirectFill"></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  /* ==========================================================
     ▌ CONFIGURATION — edit only this block
     ========================================================== */
  const CONFIG = {
    // ── APIs ─────────────────────────────────────────────────
    apiOriginium: 'https://x8ki-letl-twmt.n7.xano.io/api:X6h8irt0/originium',
    apiKwitansi:  'https://x8ki-letl-twmt.n7.xano.io/api:ZBg3zfDx/kwitansi',
    apiSaldo:     'https://x8ki-letl-twmt.n7.xano.io/api:X6h8irt0/formalhault',

    // ── Originium record to update ───────────────────────────
    originiumId: 1,

    // ── Transaction details ──────────────────────────────────
    pengirimNama: 'Iwatani Naofumi',    // sender (default)
    penerimaId:   4,                    // receiver formalhault ID
    penerimaName: 'Iwatani Naofumi',    // receiver display name
    nominal:      10,
    keterangan:   'Self-Actualization',

    // ── Redirect ─────────────────────────────────────────────
    redirectUrl:   'https://www.google.com',
    redirectDelay: 3,

    // ── Bar ──────────────────────────────────────────────────
    barMax: 100,
  };
  /* ========================================================== */


  /* ----------------------------------------------------------
     Survey wiring
  ---------------------------------------------------------- */
  const slJoy   = document.getElementById('slJoy');
  const slSad   = document.getElementById('slSad');
  const slGrief = document.getElementById('slGrief');

  slJoy.addEventListener('input',   () => document.getElementById('valJoy').textContent   = slJoy.value);
  slSad.addEventListener('input',   () => document.getElementById('valSad').textContent   = slSad.value);
  slGrief.addEventListener('input', () => document.getElementById('valGrief').textContent = slGrief.value);

  document.getElementById('submitBtn').addEventListener('click', () => {
    const scores = {
      joy:   parseInt(slJoy.value),
      sad:   parseInt(slSad.value),
      grief: parseInt(slGrief.value),
    };
    startResultFlow(scores);
  });

  /* ----------------------------------------------------------
     Utilities
  ---------------------------------------------------------- */
  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function log(msg, type = '') {
    const ts   = new Date().toTimeString().slice(0,8);
    const line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">[${ts}]</span><span class="${type}">${msg}</span>`;
    document.getElementById('statusLog').appendChild(line);
  }

  function animateCounter(el, from, to, duration = 1800) {
    const start = performance.now();
    (function tick(now) {
      const t    = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 4);
      el.textContent = Math.round(from + (to - from) * ease);
      if (t < 1) requestAnimationFrame(tick);
      else el.textContent = to;
    })(performance.now());
  }

  function spawnParticles(x, y, amount, count = 8) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className   = 'particle';
      p.textContent = `+${Math.ceil(amount / count)}`;
      p.style.left           = (x + (Math.random()-0.5)*110) + 'px';
      p.style.top            = (y + (Math.random()-0.5)*40)  + 'px';
      p.style.animationDelay = (Math.random()*0.4) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }
  }

  function startRedirect() {
    const bar  = document.getElementById('redirectBar');
    const fill = document.getElementById('redirectFill');
    const cd   = document.getElementById('countdown');
    bar.classList.add('show');
    fill.style.animation = `drain ${CONFIG.redirectDelay}s linear forwards`;
    let sec = CONFIG.redirectDelay;
    cd.textContent = sec + 's';
    const iv = setInterval(() => {
      sec--; cd.textContent = sec + 's';
      if (sec <= 0) { clearInterval(iv); window.location.href = CONFIG.redirectUrl; }
    }, 1000);
  }

  /* ----------------------------------------------------------
     API helpers
  ---------------------------------------------------------- */
  async function patchOriginium(scores) {
    const res = await fetch(`${CONFIG.apiOriginium}/${CONFIG.originiumId}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        Scale_Joy:   scores.joy,
        Scale_Sad:   scores.sad,
        Scale_Grief: scores.grief,
      }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function postKwitansi() {
    const res = await fetch(CONFIG.apiKwitansi, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        Nama_Pengirim: CONFIG.pengirimNama,
        Nama_Penerima: CONFIG.penerimaName,
        Keterangan:    CONFIG.keterangan,
        Nominal:       CONFIG.nominal,
      }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function fetchRecord(id) {
    const res = await fetch(`${CONFIG.apiSaldo}/${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function patchSaldo(id, newSaldo) {
    const res = await fetch(`${CONFIG.apiSaldo}/${id}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ Saldo: newSaldo }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  /* ----------------------------------------------------------
     Main result flow (after survey submit)
  ---------------------------------------------------------- */
  async function startResultFlow(scores) {
    // Transition screens
    document.getElementById('screenSurvey').classList.add('hidden');
    document.getElementById('screenResult').classList.remove('hidden');

    // Populate recap chips
    document.getElementById('recapJoy').textContent   = scores.joy;
    document.getElementById('recapSad').textContent   = scores.sad;
    document.getElementById('recapGrief').textContent = scores.grief;

    // Populate transaction fields
    document.getElementById('namaPengirim').textContent = CONFIG.pengirimNama;
    document.getElementById('namaPenerima').textContent = CONFIG.penerimaName;
    document.getElementById('keterangan').textContent   = CONFIG.keterangan;
    document.getElementById('nominal').textContent      = CONFIG.nominal;

    log('Survey submitted. Processing...');
    await wait(500);

    // ── Step 1: Patch Originium ─────────────────────────────
    log(`Saving sentiment to Originium ID ${CONFIG.originiumId}...`);
    try {
      await patchOriginium(scores);
    } catch(e) {
      log(`ORIGINIUM ERROR: ${e.message}`, 'log-err'); return;
    }
    log(`Originium updated — Joy:${scores.joy} Sad:${scores.sad} Grief:${scores.grief}`, 'log-ok');
    await wait(400);

    // ── Step 2: Post Kwitansi ───────────────────────────────
    log(`Creating kwitansi: ${CONFIG.pengirimNama} → ${CONFIG.penerimaName}...`);
    let kwitansi;
    try {
      kwitansi = await postKwitansi();
    } catch(e) {
      log(`KWITANSI ERROR: ${e.message}`, 'log-err'); return;
    }
    log(`Kwitansi #${kwitansi.id || '—'} recorded.`, 'log-ok');
    await wait(400);

    // ── Step 3: Fetch saldo ─────────────────────────────────
    log(`Fetching saldo for ID ${CONFIG.penerimaId}...`);
    let record;
    try {
      record = await fetchRecord(CONFIG.penerimaId);
    } catch(e) {
      log(`FETCH ERROR: ${e.message}`, 'log-err'); return;
    }

    const oldSaldo = record.Saldo;
    const newSaldo = oldSaldo + CONFIG.nominal;

    const saldoDisplay = document.getElementById('saldoDisplay');
    const saldoFill    = document.getElementById('saldoFill');
    const saldoDelta   = document.getElementById('saldoDelta');
    const flash        = document.getElementById('flash');

    saldoDisplay.textContent = oldSaldo;
    saldoFill.style.width    = Math.min(oldSaldo / CONFIG.barMax * 100, 100) + '%';
    log(`Current saldo: ${oldSaldo} → Applying +${CONFIG.nominal}...`);
    await wait(500);

    // ── Step 4: Patch saldo ─────────────────────────────────
    try {
      await patchSaldo(CONFIG.penerimaId, newSaldo);
    } catch(e) {
      log(`SALDO ERROR: ${e.message}`, 'log-err'); return;
    }
    log('Saldo updated.', 'log-ok');
    await wait(200);

    // ── Step 5: Animate ─────────────────────────────────────
    const rect = saldoDisplay.getBoundingClientRect();
    spawnParticles(rect.left + rect.width/2, rect.top, CONFIG.nominal);

    saldoDisplay.classList.add('increasing');
    saldoDelta.textContent = `+${CONFIG.nominal}`;
    saldoDelta.classList.add('show');

    animateCounter(saldoDisplay, oldSaldo, newSaldo, 1800);
    saldoFill.style.width = Math.min(newSaldo / CONFIG.barMax * 100, 100) + '%';

    await wait(400);
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 350);

    await wait(1800);
    log(`All done: Originium + Kwitansi + Saldo (${oldSaldo} → ${newSaldo})`, 'log-ok');
    log('Preparing redirect...');
    saldoDisplay.classList.remove('increasing');

    await wait(500);
    startRedirect();
  }
</script>
