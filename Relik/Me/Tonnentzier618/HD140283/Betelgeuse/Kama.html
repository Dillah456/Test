const aud = document.getElementById('aud');
const npBar = document.getElementById('np-bar');
const npLabel = document.getElementById('np-label');
const npStop = document.getElementById('np-stop');
const mainEl = document.getElementById('main');
const DL_SVG = `<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 12l-5-5h3V1h4v6h3L8 12zm-6 2h12v1H2v-1z"/></svg>`;

let activeTr = null;
let currentLang = 'jp';
let currentStage = 0;

function stopAll() {
  aud.pause(); aud.src = '';
  if (activeTr) { activeTr.classList.remove('playing'); activeTr = null; }
  npBar.classList.remove('on');
}
npStop.addEventListener('click', stopAll);
aud.addEventListener('ended', stopAll);

// Stage tabs
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    stopAll();
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentStage = parseInt(btn.dataset.stage);
    document.querySelectorAll('.stage-panel').forEach((p, i) => {
      p.classList.toggle('active', i === currentStage);
    });
  });
});

// Lang toggle
document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    document.querySelectorAll('.lang-text').forEach(el => {
      el.classList.toggle('visible', el.dataset.lang === currentLang);
    });
  });
});

let totalAudio = 0;

DATA.forEach((stage, stageIdx) => {
  const panel = document.createElement('div');
  panel.className = 'stage-panel' + (stageIdx === 0 ? ' active' : '');

  stage.groups.forEach(group => {
    const withAudio = group.lines.filter(l => l.url).length;
    totalAudio += withAudio;

    const block = document.createElement('div');
    block.className = 'group-block';
    block.innerHTML = `
      <div class="group-heading">
        <h2>${group.section}</h2>
        <span class="group-count">${withAudio} audio · ${group.lines.length} lines</span>
      </div>`;

    const table = document.createElement('table');
    table.className = 'qt';
    table.innerHTML = `<colgroup><col><col><col></colgroup>
      <thead><tr><th>Occasion</th><th>▶</th><th>Transcription</th></tr></thead>`;
    const tbody = document.createElement('tbody');

    group.lines.forEach(line => {
      const tr = document.createElement('tr');
      const playCell = line.url
        ? `<td class="play-cell">
            <a class="play-link" href="${line.url}"><span class="ico-play">▶</span><span class="ico-pause">⏸</span></a>
            <a class="dl-link" href="${line.url}" download="${line.url.split('/').pop()}" title="Download">${DL_SVG}</a>
          </td>`
        : `<td class="play-cell"><span class="no-audio">—</span></td>`;

      tr.innerHTML = `
        <td class="ev-cell">${line.event}</td>
        ${playCell}
        <td class="text-cell">
          <span class="lang-text${currentLang==='jp' ? ' visible' : ''}" data-lang="jp">${line.jp || '<em>—</em>'}</span>
          <span class="lang-text${currentLang==='en' ? ' visible' : ''}" data-lang="en">${line.en || '<em>—</em>'}</span>
        </td>`;

      if (line.url) {
        tr.querySelector('a.play-link').addEventListener('click', e => {
          e.preventDefault();
          if (activeTr === tr) { stopAll(); return; }
          if (activeTr) activeTr.classList.remove('playing');
          activeTr = tr; tr.classList.add('playing');
          aud.src = line.url; aud.play();
          npBar.classList.add('on');
          npLabel.innerHTML = `${line.event} <small>${group.section} · ${stage.stage}</small>`;
        });
      }
      tbody.appendChild(tr);
    });

    table.appendChild(tbody);
    block.appendChild(table);
    panel.appendChild(block);
  });

  mainEl.appendChild(panel);
});

document.getElementById('total-n').textContent = totalAudio;

document.getElementById('dl-all-btn').addEventListener('click', async () => {
  const btn = document.getElementById('dl-all-btn');
  const stage = DATA[currentStage];
  const allUrls = stage.groups.flatMap(g => g.lines.filter(l => l.url).map(l => ({ url: l.url, name: l.url.split('/').pop() })));
  btn.textContent = `Downloading ${stage.stage}…`;
  btn.disabled = true;
  let i = 0;
  for (const { url, name } of allUrls) {
    try {
      const resp = await fetch(url);
      const blob = await resp.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob); a.download = name;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    } catch(e) { console.warn('Failed:', url, e); }
    i++;
    btn.textContent = `Downloading… ${i}/${allUrls.length}`;
    await new Promise(r => setTimeout(r, 350));
  }
  btn.textContent = '✓ Done!';
  setTimeout(() => { btn.disabled = false; btn.innerHTML = `${DL_SVG} Download All Audio`; }, 2000);
});
</script>
</body>
