        "jp": "……あ！！（わ、私は……なにを……！？）",
        "en": "*gasp*!(Wh-What was I...thinking...?!)"
      },
      {
        "event": "MemorialLobby_6",
        "url": "https://static.wikitide.net/bluearchivewiki/4/45/Rio_%28Battle%29_MemorialLobby_6_1.ogg",
        "jp": "こ、これは わざとじゃないの……！ ごめんなさい……！わ、私はもう、 大丈夫だから……！",
        "en": "Th-This wasn't intentional...! I'm sorry...!I-I'm okay now, so...!"
      }

  },
  {

    "lines": [
      {

        "jp": "",
        "en": ""
      }
    ]

  {
    "section": "Tactics and growth",
    "lines": [
      {
        "event": "",
        "url": "",

];

const aud = document.getElementById('aud');
const npBar = document.getElementById('np-bar');
const npLabel = document.getElementById('np-label');
const npStop = document.getElementById('np-stop');
const main = document.getElementById('main');

let activeTr = null;
let currentLang = 'jp';

function stopAll() {
  aud.pause(); aud.src = '';
  if (activeTr) { activeTr.classList.remove('playing'); activeTr = null; }
  npBar.classList.remove('on');
}

npStop.addEventListener('click', stopAll);
aud.addEventListener('ended', stopAll);

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentLang = btn.dataset.lang;
    document.querySelectorAll('.lang-text').forEach(el => {
      el.classList.toggle('visible', el.dataset.lang === currentLang);
    });
  });
});

let audioCount = 0;
const DL_SVG = `<svg viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg"><path d="M8 12l-5-5h3V1h4v6h3L8 12zm-6 2h12v1H2v-1z"/></svg>`;

DATA.forEach(section => {
  const withAudio = section.lines.filter(l => l.url).length;
  audioCount += withAudio;

  const block = document.createElement('div');
  block.className = 'skin-block';
  block.innerHTML = `
    <div class="skin-heading">
      <h2>${section.section}</h2>
      <span class="skin-count">${withAudio} audio · ${section.lines.length} lines</span>
    </div>`;

  const table = document.createElement('table');
  table.className = 'qt';
  table.innerHTML = `
    <colgroup><col><col><col></colgroup>
    <thead><tr><th>Event</th><th>▶</th><th>Transcription</th></tr></thead>`;

  const tbody = document.createElement('tbody');

  section.lines.forEach(line => {
    const tr = document.createElement('tr');

    const playCell = line.url
      ? `<td class="play-cell">
          <a class="play-link" href="${line.url}">
            <span class="ico-play">▶</span><span class="ico-pause">⏸</span>
          </a>
          <a class="dl-link" href="${line.url}" download="${line.url.split('/').pop()}" title="Download">${DL_SVG}</a>
        </td>`
      : `<td class="play-cell"><span class="no-audio">—</span></td>`;

    tr.innerHTML = `
      <td class="ev-cell">${line.event}</td>
      ${playCell}
      <td class="text-cell">
        <span class="lang-text${currentLang==='jp' ? ' visible' : ''}" data-lang="jp">${line.jp || '<em>—</em>'}</span>
        <span class="lang-text${currentLang==='en' ? ' visible' : ''}" data-lang="en">${line.en || '<em>—</em>'}</span>
      </td>`;

    if (line.url) {
      const a = tr.querySelector('a.play-link');
      a.addEventListener('click', e => {
        e.preventDefault();
        if (activeTr === tr) { stopAll(); return; }
        if (activeTr) activeTr.classList.remove('playing');
        activeTr = tr;
        tr.classList.add('playing');
        aud.src = line.url;
        aud.play();
        npBar.classList.add('on');
        npLabel.innerHTML = `${line.event} <small>${section.section}</small>`;
      });
    }

    tbody.appendChild(tr);
  });

  table.appendChild(tbody);
  block.appendChild(table);
  main.appendChild(block);
});

document.getElementById('total-n').textContent = audioCount;

document.getElementById('dl-all-btn').addEventListener('click', async () => {
  const btn = document.getElementById('dl-all-btn');
  const allUrls = DATA.flatMap(s => s.lines.filter(l => l.url).map(l => ({ url: l.url, name: l.url.split('/').pop() })));
  btn.textContent = 'Starting downloads…';
  btn.disabled = true;
  let i = 0;
  for (const { url, name } of allUrls) {
    try {
      const resp = await fetch(url);
      const blob = await resp.blob();
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = name;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(a.href), 5000);
    } catch(e) { console.warn('Failed:', url, e); }
    i++;
    btn.textContent = `Downloading… ${i}/${allUrls.length}`;
    await new Promise(r => setTimeout(r, 350));
  }
  btn.textContent = '✓ Done!';
  setTimeout(() => { btn.disabled = false; btn.innerHTML = `${DL_SVG} Download All Audio`; }, 2000);
});
</script>
