<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Formalhault Transfer</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root{
    --bg:#0d0f14;
    --surf:#151820;
    --surf2:#1c2030;
    --border:#272c3d;

    --accent:#5b7cfa;
    --green:#22d3a0;
    --red:#f43f5e;
    --yellow:#eab308;
    --blue:#60a5fa;
    --purple:#a78bfa;

    --text:#e8eaf2;
    --muted:#6b7591;

    --r:14px;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:'Syne',sans-serif;
    min-height:100vh;
}

.wrap{
    max-width:1200px;
    margin:auto;
    padding:30px 20px;
}

.header{
    margin-bottom:25px;
}

.header .tag{
    color:var(--green);
    font-family:'DM Mono',monospace;
    font-size:11px;
    letter-spacing:2px;
    margin-bottom:8px;
}

.header h1{
    font-size:34px;
    font-weight:800;
}

.header h1 span{
    color:var(--accent);
}

.card{
    background:var(--surf);
    border:1px solid var(--border);
    border-radius:var(--r);
    padding:24px;
    margin-bottom:20px;
}

.card h2{
    margin-bottom:18px;
    font-size:15px;
}

.grid2{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:20px;
}

@media(max-width:900px){
    .grid2{
        grid-template-columns:1fr;
    }
}

.form-group{
    margin-bottom:16px;
}

.field-label{
    display:block;
    margin-bottom:8px;

    font-size:11px;
    letter-spacing:1px;

    color:var(--muted);

    text-transform:uppercase;
    font-family:'DM Mono',monospace;
}

select,
input[type=range]{
    width:100%;
}

select{
    background:var(--surf2);
    border:1px solid var(--border);
    border-radius:8px;

    color:var(--text);

    padding:12px;
}

.range-val{
    margin-top:6px;
    font-family:'DM Mono',monospace;
    color:var(--green);
}

.preview{
    margin-top:20px;

    background:var(--surf2);
    border:1px dashed var(--border);

    border-radius:10px;

    padding:14px;

    line-height:2;
    font-size:13px;

    font-family:'DM Mono',monospace;
}

.btn{
    width:100%;
    margin-top:18px;

    border:none;
    border-radius:10px;

    padding:14px;

    background:var(--accent);

    color:white;

    font-size:15px;
    font-weight:700;

    cursor:pointer;
}

.btn:hover{
    opacity:.9;
}

.alert{
    margin-bottom:20px;

    padding:14px 18px;

    border-radius:12px;

    display:none;
}

.alert.ok{
    background:rgba(34,211,160,.1);
    border:1px solid rgba(34,211,160,.3);
    color:var(--green);
}

.alert.err{
    background:rgba(244,63,94,.1);
    border:1px solid rgba(244,63,94,.3);
    color:var(--red);
}

.table-wrap{
    overflow:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    text-align:left;

    padding:10px;

    color:var(--muted);

    font-size:11px;

    font-family:'DM Mono',monospace;
    letter-spacing:1px;
}

td{
    padding:12px 10px;
    border-top:1px solid var(--border);
    font-size:13px;
}

.badge{
    display:inline-block;

    padding:4px 10px;

    border-radius:999px;

    background:rgba(91,124,250,.15);

    color:var(--accent);

    font-family:'DM Mono',monospace;
    font-size:11px;
}
</style>
</head>
<body>

<div class="wrap">

    <div class="header">
        <div class="tag">■ FORMALHAULT SYSTEM</div>
        <h1>Transfer <span>Dashboard</span></h1>
    </div>

    <div class="alert" id="alertBox"></div>

    <div class="grid2">

        <!-- FORM -->
        <div class="card">

            <h2>🔁 Transfer Point</h2>

            <div class="form-group">
                <label class="field-label">Pengirim</label>
                <select id="sel_pengirim">
                    <option value="">Memuat...</option>
                </select>
            </div>

            <div class="form-group">
                <label class="field-label">Penerima</label>
                <select id="sel_penerima">
                    <option value="">Memuat...</option>
                </select>
            </div>

            <div class="form-group">
                <label class="field-label">Keterangan</label>
                <select id="sel_keterangan">
                    <option value="">Pilih</option>
                    <option value="Kelelahan">Kelelahan</option>
                    <option value="Afeksi">Afeksi</option>
                    <option value="Self-Actualization">Self-Actualization</option>
                    <option value="Represion">Represion</option>
                    <option value="Distract / Brainfog">Distract / Brainfog</option>
                </select>
            </div>

            <div class="form-group">
                <label class="field-label">
                    Nominal —
                    <span id="nominalDisplay">10</span> pt
                </label>

                <input
                    type="range"
                    id="inp_nominal"
                    min="10"
                    max="100"
                    step="10"
                    value="10"
                >

                <div class="range-val">
                    <span id="nominalVal">10</span> pt
                </div>
            </div>

            <hr style="margin:18px 0;border-color:var(--border);">

            <div class="form-group">
                <label class="field-label">
                    Joy —
                    <span style="color:var(--yellow)" id="joyDisplay">0</span>
                </label>

                <input type="range" id="or_joy" min="0" max="10" value="0">

                <div class="range-val" style="color:var(--yellow)">
                    <span id="joyVal">0</span>
                </div>
            </div>

            <div class="form-group">
                <label class="field-label">
                    Sad —
                    <span style="color:var(--blue)" id="sadDisplay">0</span>
                </label>

                <input type="range" id="or_sad" min="0" max="10" value="0">

                <div class="range-val" style="color:var(--blue)">
                    <span id="sadVal">0</span>
                </div>
            </div>

            <div class="form-group">
                <label class="field-label">
                    Grief —
                    <span style="color:var(--purple)" id="griefDisplay">0</span>
                </label>

                <input type="range" id="or_grief" min="0" max="10" value="0">

                <div class="range-val" style="color:var(--purple)">
                    <span id="griefVal">0</span>
                </div>
            </div>

            <div class="preview" id="previewBox">
                Menunggu input...
            </div>

            <button class="btn" id="btnSubmit">
                Kirim Transfer
            </button>

        </div>

        <!-- SALDO -->
        <div class="card">

            <h2>💰 Saldo Formalhault</h2>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>Nama</th>
                            <th>Saldo</th>
                        </tr>
                    </thead>

                    <tbody id="saldoBody">
                        <tr>
                            <td colspan="2">
                                Memuat...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>

    </div>

</div>

<script>
const FORMALHAULT_API =
'https://x8ki-letl-twmt.n7.xano.io/api:X6h8irt0/formalhault';

const KWITANSI_API =
'https://x8ki-letl-twmt.n7.xano.io/api:ZBg3zfDx/kwitansi';

const ORIGINIUM_API =
'https://x8ki-letl-twmt.n7.xano.io/api:X6h8irt0/originium';

let formalData = [];

// ─────────────────────────────────────────────

function showAlert(msg, ok=true){

    const box = document.getElementById('alertBox');

    box.innerHTML = msg;

    box.className =
        'alert ' + (ok ? 'ok' : 'err');

    box.style.display = 'block';

    setTimeout(()=>{
        box.style.display='none';
    },6000);
}

// ─────────────────────────────────────────────

function bindRange(id,valId,displayId){

    const input =
        document.getElementById(id);

    const val =
        document.getElementById(valId);

    const display =
        document.getElementById(displayId);

    const sync = ()=>{

        val.textContent =
            input.value;

        display.textContent =
            input.value;

        updatePreview();
    };

    input.addEventListener('input',sync);

    sync();
}

// ─────────────────────────────────────────────

async function loadFormalhault(){

    const res =
        await fetch(FORMALHAULT_API);

    formalData =
        await res.json();

    formalData.sort((a,b)=>
        a.Nama.localeCompare(b.Nama)
    );

    populateSelects();

    renderSaldo();
}

// ─────────────────────────────────────────────

function populateSelects(){

    ['sel_pengirim','sel_penerima']
    .forEach(id=>{

        const sel =
            document.getElementById(id);

        sel.innerHTML =
            '<option value="">Pilih Nama</option>';

        formalData.forEach(r=>{

            const opt =
                document.createElement('option');

            opt.value =
                r.Nama;

            opt.textContent =
                `${r.Nama} (${r.Saldo} pt)`;

            sel.appendChild(opt);
        });
    });
}

// ─────────────────────────────────────────────

function renderSaldo(){

    const tbody =
        document.getElementById('saldoBody');

    tbody.innerHTML =
        formalData.map(r=>`
            <tr>
                <td>${r.Nama}</td>
                <td>
                    <span class="badge">
                        ${r.Saldo} pt
                    </span>
                </td>
            </tr>
        `).join('');
}

// ─────────────────────────────────────────────

function updatePreview(){

    const p =
        document.getElementById('sel_pengirim').value;

    const r =
        document.getElementById('sel_penerima').value;

    const ket =
        document.getElementById('sel_keterangan').value;

    const nominal =
        document.getElementById('inp_nominal').value;

    const joy =
        document.getElementById('or_joy').value;

    const sad =
        document.getElementById('or_sad').value;

    const grief =
        document.getElementById('or_grief').value;

    document.getElementById('previewBox').innerHTML = `
        Pengirim : ${p || '-'}<br>
        Penerima : ${r || '-'}<br>
        Keterangan : ${ket || '-'}<br>
        Nominal : ${nominal} pt<br><br>

        Joy=${joy}
        Sad=${sad}
        Grief=${grief}
    `;
}

// ─────────────────────────────────────────────

async function updateSaldo(id,newSaldo){

    const res =
        await fetch(`${FORMALHAULT_API}/${id}`,{
            method:'PATCH',
            headers:{
                'Content-Type':'application/json'
            },
            body:JSON.stringify({
                Saldo:newSaldo
            })
        });

    if(!res.ok){

        throw new Error(
            'Gagal update saldo'
        );
    }

    return await res.json();
}

// ─────────────────────────────────────────────

document
.getElementById('btnSubmit')
.addEventListener('click',async()=>{

    const pengirim =
        document.getElementById('sel_pengirim').value;

    const penerima =
        document.getElementById('sel_penerima').value;

    const keterangan =
        document.getElementById('sel_keterangan').value;

    const nominal =
        Number(
            document.getElementById('inp_nominal').value
        );

    const joy =
        Number(
            document.getElementById('or_joy').value
        );

    const sad =
        Number(
            document.getElementById('or_sad').value
        );

    const grief =
        Number(
            document.getElementById('or_grief').value
        );

    try{

        if(!pengirim || !penerima){

            throw new Error(
                'Pilih pengirim dan penerima.'
            );
        }

        if(pengirim === penerima){

            throw new Error(
                'Pengirim dan penerima sama.'
            );
        }

        const sender =
            formalData.find(x=>
                x.Nama === pengirim
            );

        const receiver =
            formalData.find(x=>
                x.Nama === penerima
            );

        if(!sender || !receiver){

            throw new Error(
                'Data Formalhault tidak ditemukan.'
            );
        }

        if(Number(sender.Saldo) < nominal){

            throw new Error(
                `Saldo ${pengirim} tidak cukup.`
            );
        }

        const senderSaldo =
            Number(sender.Saldo) - nominal;

        const receiverSaldo =
            Number(receiver.Saldo) + nominal;

        // ── POST KWITANSI ──
        const kwRes =
            await fetch(KWITANSI_API,{
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({
                    Nama_Pengirim:pengirim,
                    Nama_Penerima:penerima,
                    Keterangan:keterangan,
                    Nominal:nominal
                })
            });

        if(!kwRes.ok){

            throw new Error(
                'POST kwitansi gagal.'
            );
        }

        // ── POST ORIGINIUM ──
        const orRes =
            await fetch(ORIGINIUM_API,{
                method:'POST',
                headers:{
                    'Content-Type':'application/json'
                },
                body:JSON.stringify({
                    Scale_Joy:joy,
                    Scale_Sad:sad,
                    Scale_Grief:grief
                })
            });

        if(!orRes.ok){

            throw new Error(
                'POST originium gagal.'
            );
        }

        // ── UPDATE SALDO ──
        await updateSaldo(
            sender.id,
            senderSaldo
        );

        await updateSaldo(
            receiver.id,
            receiverSaldo
        );

        showAlert(`
            ✅ Transfer berhasil.<br><br>

            ${pengirim}
            →
            ${penerima}<br>

            ${nominal} pt<br><br>

            Saldo Baru:<br>

            ${pengirim}
            =
            ${senderSaldo} pt<br>

            ${penerima}
            =
            ${receiverSaldo} pt
        `,true);

        // reload
        await loadFormalhault();

    }catch(err){

        showAlert(
            '❌ ' + err.message,
            false
        );
    }
});

// ─────────────────────────────────────────────

[
    ['inp_nominal','nominalVal','nominalDisplay'],
    ['or_joy','joyVal','joyDisplay'],
    ['or_sad','sadVal','sadDisplay'],
    ['or_grief','griefVal','griefDisplay']
]
.forEach(r=>bindRange(...r));

[
    'sel_pengirim',
    'sel_penerima',
    'sel_keterangan'
]
.forEach(id=>{
    document
    .getElementById(id)
    .addEventListener('change',updatePreview);
});

loadFormalhault();
</script>

</body>
</html>
