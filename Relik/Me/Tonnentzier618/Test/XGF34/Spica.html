    <script>
        // Fetch Nama list from database
        fetch('get_nama_list.php')
            .then(response => response.json())
            .then(data => {
                const terimaSelect = document.getElementById('terima-select');
                const dariSelect = document.getElementById('dari-select');
                
                // Populate Terima and Dari dropdowns
                data.forEach(nama => {
                    const option1 = document.createElement('option');
                    option1.value = nama;
                    option1.textContent = nama;
                    terimaSelect.appendChild(option1);
                    
                    const option2 = document.createElement('option');
                    option2.value = nama;
                    option2.textContent = nama;
                    dariSelect.appendChild(option2);
                });
            })
            .catch(error => {
                console.error('Error fetching nama list:', error);
            });

        // Validation function
        function validateDropdowns() {
            const terima = document.getElementById('terima-select').value;
            const dari = document.getElementById('dari-select').value;
            const errorDiv = document.getElementById('validation-error');
            const submitBtn = document.querySelector('input[type="submit"]');
            
            if (terima && dari && terima === dari) {
                errorDiv.style.display = 'block';
                submitBtn.disabled = true;
                submitBtn.style.opacity = '0.5';
                submitBtn.style.cursor = 'not-allowed';
                return false;
            } else {
                errorDiv.style.display = 'none';
                submitBtn.disabled = false;
                submitBtn.style.opacity = '1';
                submitBtn.style.cursor = 'pointer';
                return true;
            }
        }

        // Add event listeners
        document.addEventListener('DOMContentLoaded', function() {
            const terimaSelect = document.getElementById('terima-select');
            const dariSelect = document.getElementById('dari-select');
            const form = document.querySelector('form');
            
            terimaSelect.addEventListener('change', validateDropdowns);
            dariSelect.addEventListener('change', validateDropdowns);
            
            // Prevent form submission if validation fails
            form.addEventListener('submit', function(e) {
                if (!validateDropdowns()) {
                    e.preventDefault();
                    return false;
                }
            });
        });
    </script>
