<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Saldo Update</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@300;500;700&display=swap');

    :root {
      --bg: #080c14;
      --panel: #0d1525;
      --border: #1a2f52;
      --accent: #00d4ff;
      --accent2: #00ff99;
      --gold: #ffd166;
      --text: #c8ddf0;
      --muted: #4a6a8a;
      --danger: #ff4757;
      --glow: 0 0 20px rgba(0, 212, 255, 0.4);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Chakra Petch', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridDrift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    .container {
      position: relative;
      width: 420px;
      max-width: 95vw;
    }

    /* Corner decorations */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 40px 36px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 20px) 0, 100% 20px, 100% 100%, 20px 100%, 0 calc(100% - 20px));
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 4px;
      background: linear-gradient(135deg, rgba(0,212,255,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* Corner accent */
    .corner-tl, .corner-br {
      position: absolute;
      width: 16px;
      height: 16px;
      border-color: var(--accent);
      border-style: solid;
    }
    .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .badge::before {
      content: '';
      width: 6px; height: 6px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .ship-name {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      margin-bottom: 4px;
      line-height: 1.1;
    }

    .reg-no {
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: var(--muted);
      letter-spacing: 2px;
      margin-bottom: 36px;
    }

    /* Saldo display */
    .saldo-section {
      margin-bottom: 36px;
    }

    .saldo-label {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 12px;
      font-family: 'Share Tech Mono', monospace;
    }

    .saldo-track {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--border);
      border-radius: 2px;
      height: 8px;
      margin-bottom: 16px;
      overflow: hidden;
      position: relative;
    }

    .saldo-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      width: 0%;
      transition: width 1.8s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }

    .saldo-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0;
      width: 40px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
      animation: shimmer 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }

    .saldo-numbers {
      display: flex;
      align-items: flex-end;
      gap: 10px;
    }

    .saldo-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 52px;
      font-weight: 400;
      line-height: 1;
      color: #fff;
      letter-spacing: -2px;
      transition: color 0.3s;
    }

    .saldo-value.increasing {
      color: var(--accent2);
      text-shadow: 0 0 30px rgba(0,255,153,0.5);
    }

    .saldo-delta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 18px;
      color: var(--accent2);
      margin-bottom: 8px;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.4s ease;
    }

    .saldo-delta.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* Floating +N particles */
    .particle {
      position: fixed;
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px;
      color: var(--accent2);
      text-shadow: 0 0 10px var(--accent2);
      pointer-events: none;
      animation: floatUp 1.4s ease-out forwards;
      z-index: 999;
    }

    @keyframes floatUp {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-120px) scale(1.4); }
    }

    /* Status line */
    .status-log {
      border-top: 1px solid var(--border);
      padding-top: 20px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      min-height: 60px;
    }

    .log-line {
      display: flex;
      gap: 10px;
      margin-bottom: 6px;
      opacity: 0;
      transform: translateX(-8px);
      animation: logIn 0.3s ease forwards;
    }

    @keyframes logIn {
      to { opacity: 1; transform: translateX(0); }
    }

    .log-time { color: var(--accent); }
    .log-ok { color: var(--accent2); }
    .log-err { color: var(--danger); }

    /* Redirect countdown */
    .redirect-bar {
      margin-top: 20px;
      display: none;
    }

    .redirect-bar.show { display: block; }

    .redirect-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      margin-bottom: 8px;
      display: flex;
      justify-content: space-between;
    }

    .redirect-countdown {
      color: var(--gold);
    }

    .redirect-track {
      background: rgba(255,209,102,0.1);
      border: 1px solid rgba(255,209,102,0.3);
      border-radius: 2px;
      height: 4px;
      overflow: hidden;
    }

    .redirect-fill {
      height: 100%;
      background: var(--gold);
      width: 100%;
      transform-origin: left;
      animation: drain 3s linear forwards;
    }

    @keyframes drain {
      from { transform: scaleX(1); }
      to { transform: scaleX(0); }
    }

    /* Scanline overlay */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Big flash on complete */
    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,255,153,0.2) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.1s;
    }

    .flash.active { opacity: 1; }
  </style>
</head>
<body>

<div class="scanlines"></div>
<div class="flash" id="flash"></div>

<div class="container">
  <div class="card">
    <div class="corner-tl"></div>
    <div class="corner-br"></div>

    <div class="badge">REGISTRY UPDATE // LIVE</div>

    <div class="ship-name" id="shipName">—</div>
    <div class="reg-no" id="regNo">REG NO. —</div>

    <div class="saldo-section">
      <div class="saldo-label">SALDO</div>
      <div class="saldo-track">
        <div class="saldo-fill" id="saldoFill"></div>
      </div>
      <div class="saldo-numbers">
        <div class="saldo-value" id="saldoDisplay">0</div>
        <div class="saldo-delta" id="saldoDelta"></div>
      </div>
    </div>

    <div class="status-log" id="statusLog"></div>

    <div class="redirect-bar" id="redirectBar">
      <div class="redirect-label">
        <span>REDIRECTING TO EXTERNAL HOST</span>
        <span class="redirect-countdown" id="countdown">3s</span>
      </div>
      <div class="redirect-track">
        <div class="redirect-fill" id="redirectFill"></div>
      </div>
    </div>
  </div>
</div>

<script>
  // ✅ API Xano dilepas — sekarang pakai endpoint lokal dari server.js + data.json
  const API_BASE = '/api/formalhault';
  const TARGET_ID = 7;   // HMS Javelin
  const SALDO_INCREMENT = 10;  // Amount to add each visit

  const logEl = document.getElementById('statusLog');
  const shipNameEl = document.getElementById('shipName');
  const regNoEl = document.getElementById('regNo');
  const saldoDisplayEl = document.getElementById('saldoDisplay');
  const saldoDeltaEl = document.getElementById('saldoDelta');
  const saldoFillEl = document.getElementById('saldoFill');
  const redirectBar = document.getElementById('redirectBar');
  const countdownEl = document.getElementById('countdown');
  const flashEl = document.getElementById('flash');

  function log(msg, type = '') {
    const line = document.createElement('div');
    line.className = 'log-line';
    const now = new Date();
    const ts = now.toTimeString().slice(0,8);
    line.innerHTML = `<span class="log-time">[${ts}]</span><span class="${type}">${msg}</span>`;
    logEl.appendChild(line);
  }

  function spawnParticles(x, y, count = 6) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.textContent = `+${Math.ceil(SALDO_INCREMENT / count)}`;
      p.style.left = (x + (Math.random() - 0.5) * 100) + 'px';
      p.style.top = (y + (Math.random() - 0.5) * 40) + 'px';
      p.style.animationDelay = (Math.random() * 0.4) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }
  }

  function animateCounter(el, from, to, duration = 1800) {
    const start = performance.now();
    const update = (now) => {
      const t = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 4);
      el.textContent = Math.round(from + (to - from) * ease);
      if (t < 1) requestAnimationFrame(update);
      else el.textContent = to;
    };
    requestAnimationFrame(update);
  }

  function startRedirect() {
    redirectBar.classList.add('show');
    let sec = 3;
    countdownEl.textContent = sec + 's';
    const iv = setInterval(() => {
      sec--;
      countdownEl.textContent = sec + 's';
      if (sec <= 0) {
        clearInterval(iv);
        window.location.href = 'https://www.google.com';
      }
    }, 1000);
  }

  async function run() {
    log('Initializing registry connection...');

    await new Promise(r => setTimeout(r, 500));

    // 1. Fetch current record
    log(`Fetching record ID ${TARGET_ID}...`);
    let record;
    try {
      const res = await fetch(`${API_BASE}/${TARGET_ID}`);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      record = await res.json();
    } catch (e) {
      log(`FETCH ERROR: ${e.message}`, 'log-err');
      return;
    }

    log(`Record acquired — ${record.Nama}`, 'log-ok');

    // Populate UI
    shipNameEl.textContent = record.Nama;
    regNoEl.textContent = `REG NO. ${String(record.RegNo).padStart(3, '0')}`;

    const oldSaldo = record.Saldo;
    const newSaldo = oldSaldo + SALDO_INCREMENT;

    // Show current saldo instantly
    saldoDisplayEl.textContent = oldSaldo;
    saldoFillEl.style.width = Math.min(oldSaldo, 100) + '%';

    await new Promise(r => setTimeout(r, 600));
    log(`Current saldo: ${oldSaldo} → Updating to ${newSaldo}...`);

    // 2. Patch update
    let updated;
    try {
      const res = await fetch(`${API_BASE}/${TARGET_ID}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ Saldo: newSaldo })
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      updated = await res.json();
    } catch (e) {
      log(`UPDATE ERROR: ${e.message}`, 'log-err');
      return;
    }

    log('API acknowledged write.', 'log-ok');

    await new Promise(r => setTimeout(r, 200));

    // 3. Animation
    const rect = saldoDisplayEl.getBoundingClientRect();
    spawnParticles(rect.left + rect.width / 2, rect.top, 8);

    saldoDisplayEl.classList.add('increasing');
    saldoDeltaEl.textContent = `+${SALDO_INCREMENT}`;
    saldoDeltaEl.classList.add('show');

    animateCounter(saldoDisplayEl, oldSaldo, newSaldo, 1800);
    saldoFillEl.style.width = Math.min(newSaldo, 100) + '%';

    // Flash
    await new Promise(r => setTimeout(r, 400));
    flashEl.classList.add('active');
    setTimeout(() => flashEl.classList.remove('active'), 300);

    await new Promise(r => setTimeout(r, 1800));

    log(`Saldo updated: ${oldSaldo} → ${newSaldo}`, 'log-ok');
    log('Preparing handoff to external host...');

    saldoDisplayEl.classList.remove('increasing');

    await new Promise(r => setTimeout(r, 500));

    // 4. Redirect countdown
    startRedirect();
  }

  run();
</script>
</body>
</html>
