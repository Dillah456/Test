<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>House 5</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@300;500;700&display=swap');

    /* =====================================================
       THEME — Dark (original navy)
       ===================================================== */
    :root {
      --bg:        #080c14;
      --panel:     #0d1525;
      --border:    #1a2f52;
      --accent:    #00d4ff;
      --accent2:   #00ff99;
      --gold:      #ffd166;
      --text:      #c8ddf0;
      --muted:     #4a6a8a;
      --danger:    #ff4757;
      --flash-col: rgba(0,255,153,0.18);
      --grid-col:  rgba(0,212,255,0.03);
      --bar-bg:    rgba(0,0,0,0.4);
      --particle:  #00ff99;
    }

    /* =====================================================
       RESET & BASE
       ===================================================== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Chakra Petch', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      padding: 24px 16px;
      gap: 0;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--grid-col) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-col) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }

    @keyframes gridDrift {
      0%   { transform: translate(0, 0); }
      100% { transform: translate(40px, 40px); }
    }

    /* =====================================================
       PAGE HEADER
       ===================================================== */
    .page-header {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      position: relative;
      z-index: 2;
    }

    .page-header::before {
      content: '';
      width: 8px; height: 8px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%       { opacity: 0.3; transform: scale(0.6); }
    }

    /* =====================================================
       GRID OF CARDS
       ===================================================== */
    .cards-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      justify-content: center;
      position: relative;
      z-index: 2;
      width: 100%;
      max-width: 960px;
    }

    /* =====================================================
       INDIVIDUAL CARD
       ===================================================== */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 28px 26px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
      width: 280px;
      flex-shrink: 0;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s ease, transform 0.5s ease;
    }

    .card.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(0,212,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .corner-tl, .corner-br {
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--accent);
      border-style: solid;
    }
    .corner-tl { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    .corner-br { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }

    /* =====================================================
       CARD INNER ELEMENTS
       ===================================================== */
    .card-badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      color: var(--muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .ship-name {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.5px;
      color: #fff;
      margin-bottom: 2px;
      line-height: 1.2;
      min-height: 22px;
    }

    .reg-no {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 2px;
      margin-bottom: 20px;
      min-height: 14px;
    }

    /* =====================================================
       SALDO DISPLAY (per card)
       ===================================================== */
    .saldo-section { margin-bottom: 16px; }

    .saldo-label {
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
      font-family: 'Share Tech Mono', monospace;
    }

    .saldo-track {
      background: var(--bar-bg);
      border: 1px solid var(--border);
      border-radius: 2px;
      height: 6px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .saldo-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px;
      width: 0%;
      transition: width 1.8s cubic-bezier(0.22, 1, 0.36, 1);
      position: relative;
    }

    .saldo-fill::after {
      content: '';
      position: absolute;
      right: 0; top: 0;
      width: 30px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
      animation: shimmer 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { opacity: 0; }
      50%  { opacity: 1; }
      100% { opacity: 0; }
    }

    .saldo-numbers {
      display: flex;
      align-items: flex-end;
      gap: 8px;
    }

    .saldo-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 38px;
      line-height: 1;
      color: #fff;
      letter-spacing: -1px;
      transition: color 0.3s, text-shadow 0.3s;
    }

    .saldo-value.increasing {
      color: var(--accent2);
      text-shadow: 0 0 20px rgba(0,255,153,0.5);
    }

    .saldo-delta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px;
      color: var(--accent2);
      margin-bottom: 6px;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.4s ease;
    }

    .saldo-delta.show { opacity: 1; transform: translateY(0); }

    /* Status chip on each card */
    .card-status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 9px;
      letter-spacing: 2px;
      padding: 4px 8px;
      border-radius: 2px;
      display: inline-block;
      margin-top: 8px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--muted);
      transition: all 0.3s;
    }

    .card-status.pending  { color: var(--muted); border-color: var(--border); }
    .card-status.loading  { color: var(--accent); border-color: var(--accent); }
    .card-status.done     { color: var(--accent2); border-color: var(--accent2); }
    .card-status.error    { color: var(--danger); border-color: var(--danger); }

    /* =====================================================
       FLOATING PARTICLES
       ===================================================== */
    .particle {
      position: fixed;
      font-family: 'Share Tech Mono', monospace;
      font-size: 16px;
      color: var(--particle);
      text-shadow: 0 0 8px var(--particle);
      pointer-events: none;
      animation: floatUp 1.4s ease-out forwards;
      z-index: 999;
    }

    @keyframes floatUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-100px) scale(1.3); }
    }

    /* =====================================================
       GLOBAL STATUS LOG
       ===================================================== */
    .global-log {
      width: 100%;
      max-width: 960px;
      margin-top: 20px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      min-height: 48px;
      position: relative;
      z-index: 2;
    }

    .log-line {
      display: flex;
      gap: 10px;
      margin-bottom: 4px;
      opacity: 0;
      transform: translateX(-8px);
      animation: logIn 0.3s ease forwards;
    }

    @keyframes logIn { to { opacity: 1; transform: translateX(0); } }

    .log-time { color: var(--accent); }
    .log-ok   { color: var(--accent2); }
    .log-err  { color: var(--danger); }

    /* =====================================================
       SCANLINES
       ===================================================== */
    .scanlines {
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        to bottom,
        transparent 0px,
        transparent 3px,
        rgba(0,0,0,0.08) 3px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* =====================================================
       REDIRECT BAR (global, bottom)
       ===================================================== */
    .redirect-bar {
      width: 100%;
      max-width: 960px;
      margin-top: 16px;
      display: none;
      position: relative;
      z-index: 2;
    }

    .redirect-bar.show { display: block; }

    .redirect-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-bottom: 6px;
      display: flex;
      justify-content: space-between;
    }

    .redirect-countdown { color: var(--gold); }

    .redirect-track {
      background: rgba(255,209,102,0.1);
      border: 1px solid rgba(255,209,102,0.3);
      border-radius: 2px;
      height: 4px;
      overflow: hidden;
    }

    .redirect-fill {
      height: 100%;
      background: var(--gold);
      width: 100%;
      transform-origin: left;
    }

    @keyframes drain {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* =====================================================
       FLASH OVERLAY
       ===================================================== */
    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(ellipse at center, var(--flash-col) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.15s;
    }

    .flash.active { opacity: 1; }
  </style>
</head>
<body>

<div class="scanlines"></div>
<div class="flash" id="flash"></div>

<div class="page-header">BATCH REGISTRY UPDATE // 3 ENTITIES</div>

<div class="cards-grid" id="cardsGrid">
  <!-- Cards injected by JS -->
</div>

<div class="global-log" id="globalLog"></div>

<div class="redirect-bar" id="redirectBar">
  <div class="redirect-label">
    <span>ALL UPDATES COMPLETE — REDIRECTING</span>
    <span class="redirect-countdown" id="countdown">3s</span>
  </div>
  <div class="redirect-track">
    <div class="redirect-fill" id="redirectFill"></div>
  </div>
</div>

<script>
  /* ==========================================================
     ▌ CONFIGURATION — edit only this block
     ========================================================== */
  const CONFIG = {
    apiBase:  'https://x8ki-letl-twmt.n7.xano.io/api:X6h8irt0/formalhault',

    // ── Entities to update ─────────────────────────────────
    targets: [
      { id: 21, increment: 10 },   // HMS Sirius
      { id: 22,  increment: 10 },   // Amau Ako
      { id: 23,  increment: 10 },   // HMS Javelin
    ],

    redirectUrl:   'https://www.youtube.com/watch?v=4Wp21Znx_Po',   // where to go after all updates
    redirectDelay: 3,          // countdown seconds before redirect
    barMax:        100,        // saldo value that equals 100% bar width
  };
  /* ========================================================== */


  /* ----------------------------------------------------------
     State — one entry per target
  ---------------------------------------------------------- */
  const state = CONFIG.targets.map(t => ({
    ...t,
    record:      null,
    oldSaldo:    null,
    newSaldo:    null,
    // DOM refs filled after card render
    els:         {},
  }));


  /* ----------------------------------------------------------
     Utilities
  ---------------------------------------------------------- */
  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function glog(msg, type = '') {
    const logEl = document.getElementById('globalLog');
    const ts    = new Date().toTimeString().slice(0, 8);
    const line  = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">[${ts}]</span><span class="${type}">${msg}</span>`;
    logEl.appendChild(line);
  }

  function animateCounter(el, from, to, duration = 1800) {
    const start = performance.now();
    (function tick(now) {
      const t    = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 4);
      el.textContent = Math.round(from + (to - from) * ease);
      if (t < 1) requestAnimationFrame(tick);
      else el.textContent = to;
    })(performance.now());
  }

  function spawnParticles(x, y, amount, count = 6) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className   = 'particle';
      p.textContent = `+${Math.ceil(amount / count)}`;
      p.style.left           = (x + (Math.random() - 0.5) * 100) + 'px';
      p.style.top            = (y + (Math.random() - 0.5) * 40)  + 'px';
      p.style.animationDelay = (Math.random() * 0.4) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }
  }

  function setStatus(entry, label, cls) {
    const el = entry.els.status;
    el.textContent = label;
    el.className   = `card-status ${cls}`;
  }

  function startRedirect() {
    const bar  = document.getElementById('redirectBar');
    const fill = document.getElementById('redirectFill');
    const cd   = document.getElementById('countdown');
    bar.classList.add('show');
    fill.style.animation = `drain ${CONFIG.redirectDelay}s linear forwards`;
    let sec = CONFIG.redirectDelay;
    cd.textContent = sec + 's';
    const iv = setInterval(() => {
      sec--;
      cd.textContent = sec + 's';
      if (sec <= 0) { clearInterval(iv); window.location.href = CONFIG.redirectUrl; }
    }, 1000);
  }

  /* ----------------------------------------------------------
     API helpers
  ---------------------------------------------------------- */
  async function fetchRecord(id) {
    const res = await fetch(`${CONFIG.apiBase}/${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function patchRecord(id, data) {
    const res = await fetch(`${CONFIG.apiBase}/${id}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(data),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  /* ----------------------------------------------------------
     Build card DOM for one entry
  ---------------------------------------------------------- */
  function buildCard(entry, index) {
    const grid = document.getElementById('cardsGrid');
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `card-${entry.id}`;
    card.innerHTML = `
      <div class="corner-tl"></div>
      <div class="corner-br"></div>
      <div class="card-badge">ID · ${entry.id}</div>
      <div class="ship-name" id="name-${entry.id}">—</div>
      <div class="reg-no"   id="reg-${entry.id}">REG NO. —</div>
      <div class="saldo-section">
        <div class="saldo-label">SALDO</div>
        <div class="saldo-track">
          <div class="saldo-fill" id="fill-${entry.id}"></div>
        </div>
        <div class="saldo-numbers">
          <div class="saldo-value" id="val-${entry.id}">—</div>
          <div class="saldo-delta" id="delta-${entry.id}"></div>
        </div>
      </div>
      <div class="card-status pending" id="status-${entry.id}">PENDING</div>
    `;
    grid.appendChild(card);

    // stagger entrance
    setTimeout(() => card.classList.add('visible'), index * 120);

    // store refs
    entry.els = {
      name:   document.getElementById(`name-${entry.id}`),
      reg:    document.getElementById(`reg-${entry.id}`),
      fill:   document.getElementById(`fill-${entry.id}`),
      val:    document.getElementById(`val-${entry.id}`),
      delta:  document.getElementById(`delta-${entry.id}`),
      status: document.getElementById(`status-${entry.id}`),
    };
  }

  /* ----------------------------------------------------------
     Process a single entity (fetch → patch → animate)
  ---------------------------------------------------------- */
  async function processEntry(entry) {
    setStatus(entry, 'LOADING...', 'loading');

    // Fetch
    try {
      entry.record = await fetchRecord(entry.id);
    } catch(e) {
      glog(`[ID ${entry.id}] FETCH ERROR: ${e.message}`, 'log-err');
      setStatus(entry, 'FETCH ERR', 'error');
      return false;
    }

    const rec = entry.record;
    entry.oldSaldo = rec.Saldo;
    entry.newSaldo = rec.Saldo + entry.increment;

    entry.els.name.textContent = rec.Nama;
    entry.els.reg.textContent  = `REG NO. ${String(rec.RegNo).padStart(3, '0')}`;
    entry.els.val.textContent  = entry.oldSaldo;
    entry.els.fill.style.width = Math.min(entry.oldSaldo / CONFIG.barMax * 100, 100) + '%';

    setStatus(entry, 'WRITING...', 'loading');

    // Patch
    try {
      await patchRecord(entry.id, { Saldo: entry.newSaldo });
    } catch(e) {
      glog(`[ID ${entry.id}] PATCH ERROR: ${e.message}`, 'log-err');
      setStatus(entry, 'WRITE ERR', 'error');
      return false;
    }

    return true;
  }

  /* ----------------------------------------------------------
     Animate a card's saldo increase
  ---------------------------------------------------------- */
  function animateCard(entry) {
    const { els, oldSaldo, newSaldo, increment } = entry;
    const rect = els.val.getBoundingClientRect();
    spawnParticles(rect.left + rect.width / 2, rect.top, increment, 6);

    els.val.classList.add('increasing');
    els.delta.textContent = `+${increment}`;
    els.delta.classList.add('show');

    animateCounter(els.val, oldSaldo, newSaldo, 1800);
    els.fill.style.width = Math.min(newSaldo / CONFIG.barMax * 100, 100) + '%';

    setTimeout(() => {
      els.val.classList.remove('increasing');
      setStatus(entry, 'UPDATED ✓', 'done');
    }, 2200);
  }

  /* ----------------------------------------------------------
     Main orchestration
  ---------------------------------------------------------- */
  async function run() {
    // Build cards
    state.forEach((entry, i) => buildCard(entry, i));
    await wait(600);

    glog(`Starting batch update — ${state.length} entities...`);
    await wait(400);

    // Phase 1: fetch all in parallel
    glog('Fetching all records in parallel...');
    const fetchResults = await Promise.all(state.map(e => processEntry(e)));

    const allOk = fetchResults.every(Boolean);
    if (!allOk) {
      glog('One or more records failed. Aborting.', 'log-err');
      return;
    }

    glog('All records patched successfully.', 'log-ok');
    await wait(300);

    // Phase 2: flash + animate all cards
    const flash = document.getElementById('flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 350);

    state.forEach(entry => animateCard(entry));
    glog(`Batch complete — ${state.length} Saldo values updated.`, 'log-ok');

    await wait(2600);
    glog('Preparing handoff to external host...');
    await wait(500);

    startRedirect();
  }

  run();
</script>
</body>
</html>
