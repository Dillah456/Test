<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multi Transaction</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Chakra+Petch:wght@300;500;700&display=swap');

    /* =====================================================
       THEME
       ===================================================== */
    :root {
      --bg:        #080c14;
      --panel:     #0d1525;
      --border:    #1a2f52;
      --accent:    #00d4ff;
      --accent2:   #00ff99;
      --gold:      #ffd166;
      --text:      #c8ddf0;
      --muted:     #4a6a8a;
      --danger:    #ff4757;
      --flash-col: rgba(0,255,153,0.18);
      --grid-col:  rgba(0,212,255,0.03);
      --bar-bg:    rgba(0,0,0,0.4);
      --particle:  #00ff99;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Chakra Petch', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
      padding: 24px 16px;
    }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(var(--grid-col) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid-col) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: gridDrift 20s linear infinite;
      pointer-events: none;
    }
    @keyframes gridDrift {
      0%   { transform: translate(0,0); }
      100% { transform: translate(40px,40px); }
    }

    /* =====================================================
       PAGE HEADER
       ===================================================== */
    .page-header {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; letter-spacing: 4px;
      color: var(--accent); text-transform: uppercase;
      margin-bottom: 20px;
      display: flex; align-items: center; gap: 10px;
      position: relative; z-index: 2;
    }
    .page-header::before {
      content: ''; width: 8px; height: 8px;
      background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 10px var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:0.3; transform:scale(0.6); }
    }

    /* Sender banner */
    .sender-banner {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px; letter-spacing: 2px;
      color: var(--muted);
      margin-bottom: 20px;
      position: relative; z-index: 2;
    }
    .sender-banner span {
      color: var(--gold); font-weight: 700;
    }

    /* =====================================================
       CARDS GRID
       ===================================================== */
    .cards-grid {
      display: flex; flex-wrap: wrap;
      gap: 14px; justify-content: center;
      position: relative; z-index: 2;
      width: 100%; max-width: 1000px;
    }

    /* =====================================================
       TXN CARD
       ===================================================== */
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      padding: 22px 22px;
      position: relative;
      clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
      width: 290px; flex-shrink: 0;
      opacity: 0; transform: translateY(14px);
      transition: opacity .5s ease, transform .5s ease;
    }
    .card.visible { opacity:1; transform:translateY(0); }

    .card::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(0,212,255,0.04) 0%, transparent 60%);
      pointer-events: none;
    }

    .corner-tl, .corner-br {
      position: absolute; width: 12px; height: 12px;
      border-color: var(--accent); border-style: solid;
    }
    .corner-tl { top:-1px; left:-1px; border-width: 2px 0 0 2px; }
    .corner-br { bottom:-1px; right:-1px; border-width: 0 2px 2px 0; }

    /* Arrow flow inside card */
    .card-flow {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 14px;
    }

    .card-party { flex:1; }

    .card-party-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px; letter-spacing: 2px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 3px;
    }

    .card-party-name {
      font-size: 13px; font-weight: 700; color: #fff;
      line-height: 1.2;
    }

    .card-arrow {
      font-family: 'Share Tech Mono', monospace;
      font-size: 14px; color: var(--accent);
      flex-shrink: 0; text-shadow: 0 0 6px var(--accent);
    }

    .card-meta {
      display: flex; gap: 8px; margin-bottom: 14px;
    }

    .meta-box {
      flex: 1; background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      padding: 8px 10px; border-radius: 2px;
    }

    .meta-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px; letter-spacing: 1px;
      color: var(--muted); text-transform: uppercase;
      margin-bottom: 4px;
    }

    .meta-value { font-size: 11px; color: var(--text); }

    .meta-nominal {
      font-family: 'Share Tech Mono', monospace;
      font-size: 20px; color: var(--gold);
      letter-spacing: -0.5px; line-height: 1;
    }

    /* Saldo per card */
    .saldo-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px; letter-spacing: 2px;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 6px;
    }

    .saldo-track {
      background: var(--bar-bg);
      border: 1px solid var(--border);
      border-radius: 2px; height: 5px;
      margin-bottom: 8px; overflow: hidden;
    }

    .saldo-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 2px; width: 0%;
      transition: width 1.8s cubic-bezier(0.22,1,0.36,1);
      position: relative;
    }

    .saldo-fill::after {
      content: '';
      position: absolute; right: 0; top: 0;
      width: 30px; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6));
      animation: shimmer 1.5s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%   { opacity:0; } 50% { opacity:1; } 100% { opacity:0; }
    }

    .saldo-numbers { display:flex; align-items:flex-end; gap:6px; }

    .saldo-value {
      font-family: 'Share Tech Mono', monospace;
      font-size: 32px; line-height: 1; color: #fff;
      letter-spacing: -1px;
      transition: color .3s, text-shadow .3s;
    }
    .saldo-value.increasing {
      color: var(--accent2);
      text-shadow: 0 0 20px rgba(0,255,153,0.5);
    }

    .saldo-delta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px; color: var(--accent2);
      margin-bottom: 5px;
      opacity: 0; transform: translateY(8px);
      transition: all .4s ease;
    }
    .saldo-delta.show { opacity:1; transform:translateY(0); }

    .card-status {
      font-family: 'Share Tech Mono', monospace;
      font-size: 8px; letter-spacing: 2px;
      padding: 3px 7px; border-radius: 2px;
      display: inline-block; margin-top: 10px;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      color: var(--muted);
      transition: all .3s;
    }
    .card-status.loading { color: var(--accent); border-color: var(--accent); }
    .card-status.done    { color: var(--accent2); border-color: var(--accent2); }
    .card-status.error   { color: var(--danger); border-color: var(--danger); }

    /* =====================================================
       PARTICLE
       ===================================================== */
    .particle {
      position: fixed;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px; color: var(--particle);
      text-shadow: 0 0 8px var(--particle);
      pointer-events: none;
      animation: floatUp 1.4s ease-out forwards;
      z-index: 999;
    }
    @keyframes floatUp {
      0%   { opacity:1; transform:translateY(0) scale(1); }
      100% { opacity:0; transform:translateY(-100px) scale(1.3); }
    }

    /* =====================================================
       GLOBAL LOG
       ===================================================== */
    .global-log {
      width: 100%; max-width: 1000px;
      margin-top: 18px;
      border-top: 1px solid var(--border);
      padding-top: 14px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--muted);
      min-height: 44px;
      position: relative; z-index: 2;
    }
    .log-line {
      display: flex; gap: 10px; margin-bottom: 4px;
      opacity: 0; transform: translateX(-8px);
      animation: logIn .3s ease forwards;
    }
    @keyframes logIn { to { opacity:1; transform:translateX(0); } }
    .log-time { color: var(--accent); }
    .log-ok   { color: var(--accent2); }
    .log-err  { color: var(--danger); }

    /* =====================================================
       REDIRECT BAR
       ===================================================== */
    .redirect-bar {
      width: 100%; max-width: 1000px;
      margin-top: 14px; display: none;
      position: relative; z-index: 2;
    }
    .redirect-bar.show { display: block; }

    .redirect-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px; color: var(--muted);
      margin-bottom: 6px;
      display: flex; justify-content: space-between;
    }
    .redirect-countdown { color: var(--gold); }

    .redirect-track {
      background: rgba(255,209,102,0.1);
      border: 1px solid rgba(255,209,102,0.3);
      border-radius: 2px; height: 4px; overflow: hidden;
    }
    .redirect-fill {
      height: 100%; background: var(--gold);
      width: 100%; transform-origin: left;
    }
    @keyframes drain {
      from { transform: scaleX(1); }
      to   { transform: scaleX(0); }
    }

    /* =====================================================
       SCANLINES + FLASH
       ===================================================== */
    .scanlines {
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        to bottom, transparent 0px, transparent 3px,
        rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px
      );
      pointer-events: none; z-index: 10;
    }
    .flash {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse at center, rgba(0,255,153,0.18) 0%, transparent 70%);
      opacity: 0; pointer-events: none; z-index: 5;
      transition: opacity .15s;
    }
    .flash.active { opacity:1; }
  </style>
</head>
<body>
<div class="scanlines"></div>
<div class="flash" id="flash"></div>

<div class="page-header">KWITANSI // BATCH TRANSACTION</div>
<div class="sender-banner">PENGIRIM: <span id="senderLabel">—</span></div>

<div class="cards-grid" id="cardsGrid"></div>
<div class="global-log"  id="globalLog"></div>

<div class="redirect-bar" id="redirectBar">
  <div class="redirect-label">
    <span>ALL TRANSACTIONS COMPLETE — REDIRECTING</span>
    <span class="redirect-countdown" id="countdown">3s</span>
  </div>
  <div class="redirect-track">
    <div class="redirect-fill" id="redirectFill"></div>
  </div>
</div>

<script>
  /* ==========================================================
     ▌ CONFIGURATION — edit only this block
     ========================================================== */
  const CONFIG = {
    // ── APIs ─────────────────────────────────────────────────
    apiSaldo:    'https://x8ki-letl-twmt.n7.xano.io/api:X6h8irt0/formalhault',
    apiKwitansi: 'https://x8ki-letl-twmt.n7.xano.io/api:ZBg3zfDx/kwitansi',

    // ── Default sender (shown in all kwitansi) ───────────────
    pengirimNama: 'Iwatani Naofumi',

    // ── Transactions list ────────────────────────────────────
    // penerimaId   : formalhault record ID
    // penerimaName : display name
    // nominal      : amount to add
    // keterangan   : note
    transactions: [
      { penerimaId: 11, penerimaName: 'HMS Sirius',   nominal: 10, keterangan: 'Maintenance Fund' },
      { penerimaId: 6,  penerimaName: 'Amau Ako',     nominal: 10, keterangan: 'Field Bonus'      },
      { penerimaId: 7,  penerimaName: 'HMS Javelin',  nominal: 10, keterangan: 'Patrol Reward'    },
    ],

    // ── Redirect ─────────────────────────────────────────────
    redirectUrl:   'https://www.google.com',
    redirectDelay: 3,

    // ── Bar scaling ──────────────────────────────────────────
    barMax: 100,
  };
  /* ========================================================== */


  /* ----------------------------------------------------------
     State
  ---------------------------------------------------------- */
  const state = CONFIG.transactions.map(t => ({ ...t, record: null, oldSaldo: null, newSaldo: null, els: {} }));


  /* ----------------------------------------------------------
     Utilities
  ---------------------------------------------------------- */
  function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

  function glog(msg, type = '') {
    const ts   = new Date().toTimeString().slice(0,8);
    const line = document.createElement('div');
    line.className = 'log-line';
    line.innerHTML = `<span class="log-time">[${ts}]</span><span class="${type}">${msg}</span>`;
    document.getElementById('globalLog').appendChild(line);
  }

  function animateCounter(el, from, to, duration = 1800) {
    const start = performance.now();
    (function tick(now) {
      const t    = Math.min((now - start) / duration, 1);
      const ease = 1 - Math.pow(1 - t, 4);
      el.textContent = Math.round(from + (to - from) * ease);
      if (t < 1) requestAnimationFrame(tick);
      else el.textContent = to;
    })(performance.now());
  }

  function spawnParticles(x, y, amount, count = 6) {
    for (let i = 0; i < count; i++) {
      const p = document.createElement('div');
      p.className   = 'particle';
      p.textContent = `+${Math.ceil(amount / count)}`;
      p.style.left           = (x + (Math.random()-0.5)*100) + 'px';
      p.style.top            = (y + (Math.random()-0.5)*40)  + 'px';
      p.style.animationDelay = (Math.random()*0.4) + 's';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 2000);
    }
  }

  function setStatus(entry, label, cls) {
    entry.els.status.textContent = label;
    entry.els.status.className   = `card-status ${cls}`;
  }

  function startRedirect() {
    const bar  = document.getElementById('redirectBar');
    const fill = document.getElementById('redirectFill');
    const cd   = document.getElementById('countdown');
    bar.classList.add('show');
    fill.style.animation = `drain ${CONFIG.redirectDelay}s linear forwards`;
    let sec = CONFIG.redirectDelay;
    cd.textContent = sec + 's';
    const iv = setInterval(() => {
      sec--; cd.textContent = sec + 's';
      if (sec <= 0) { clearInterval(iv); window.location.href = CONFIG.redirectUrl; }
    }, 1000);
  }

  /* ----------------------------------------------------------
     API helpers
  ---------------------------------------------------------- */
  async function postKwitansi(txn) {
    const res = await fetch(CONFIG.apiKwitansi, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        Nama_Pengirim: CONFIG.pengirimNama,
        Nama_Penerima: txn.penerimaName,
        Keterangan:    txn.keterangan,
        Nominal:       txn.nominal,
      }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function fetchRecord(id) {
    const res = await fetch(`${CONFIG.apiSaldo}/${id}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  async function patchSaldo(id, newSaldo) {
    const res = await fetch(`${CONFIG.apiSaldo}/${id}`, {
      method:  'PATCH',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ Saldo: newSaldo }),
    });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return res.json();
  }

  /* ----------------------------------------------------------
     Build card DOM
  ---------------------------------------------------------- */
  function buildCard(entry, index) {
    const grid = document.getElementById('cardsGrid');
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="corner-tl"></div>
      <div class="corner-br"></div>
      <div class="card-flow">
        <div class="card-party">
          <div class="card-party-label">FROM</div>
          <div class="card-party-name">${CONFIG.pengirimNama}</div>
        </div>
        <div class="card-arrow">→</div>
        <div class="card-party">
          <div class="card-party-label">TO</div>
          <div class="card-party-name">${entry.penerimaName}</div>
        </div>
      </div>
      <div class="card-meta">
        <div class="meta-box">
          <div class="meta-label">KETERANGAN</div>
          <div class="meta-value">${entry.keterangan}</div>
        </div>
        <div class="meta-box" style="flex:0 0 auto; min-width:80px;">
          <div class="meta-label">NOMINAL</div>
          <div class="meta-nominal" id="nom-${index}">${entry.nominal}</div>
        </div>
      </div>
      <div class="saldo-label">SALDO PENERIMA</div>
      <div class="saldo-track">
        <div class="saldo-fill" id="fill-${index}"></div>
      </div>
      <div class="saldo-numbers">
        <div class="saldo-value" id="val-${index}">—</div>
        <div class="saldo-delta" id="delta-${index}"></div>
      </div>
      <div class="card-status" id="status-${index}">PENDING</div>
    `;
    grid.appendChild(card);
    setTimeout(() => card.classList.add('visible'), index * 130);

    entry.els = {
      fill:   document.getElementById(`fill-${index}`),
      val:    document.getElementById(`val-${index}`),
      delta:  document.getElementById(`delta-${index}`),
      status: document.getElementById(`status-${index}`),
    };
  }

  /* ----------------------------------------------------------
     Process one transaction: kwitansi → fetch → patch
  ---------------------------------------------------------- */
  async function processEntry(entry) {
    setStatus(entry, 'LOGGING...', 'loading');

    // 1. Post kwitansi
    let kwitansi;
    try {
      kwitansi = await postKwitansi(entry);
    } catch(e) {
      glog(`[${entry.penerimaName}] KWITANSI ERROR: ${e.message}`, 'log-err');
      setStatus(entry, 'LOG ERR', 'error'); return false;
    }

    // 2. Fetch current saldo
    setStatus(entry, 'FETCHING...', 'loading');
    try {
      entry.record = await fetchRecord(entry.penerimaId);
    } catch(e) {
      glog(`[${entry.penerimaName}] FETCH ERROR: ${e.message}`, 'log-err');
      setStatus(entry, 'FETCH ERR', 'error'); return false;
    }

    entry.oldSaldo = entry.record.Saldo;
    entry.newSaldo = entry.oldSaldo + entry.nominal;

    entry.els.val.textContent  = entry.oldSaldo;
    entry.els.fill.style.width = Math.min(entry.oldSaldo / CONFIG.barMax * 100, 100) + '%';

    // 3. Patch
    setStatus(entry, 'WRITING...', 'loading');
    try {
      await patchSaldo(entry.penerimaId, entry.newSaldo);
    } catch(e) {
      glog(`[${entry.penerimaName}] PATCH ERROR: ${e.message}`, 'log-err');
      setStatus(entry, 'WRITE ERR', 'error'); return false;
    }

    return true;
  }

  /* ----------------------------------------------------------
     Animate a card
  ---------------------------------------------------------- */
  function animateCard(entry) {
    const rect = entry.els.val.getBoundingClientRect();
    spawnParticles(rect.left + rect.width/2, rect.top, entry.nominal);

    entry.els.val.classList.add('increasing');
    entry.els.delta.textContent = `+${entry.nominal}`;
    entry.els.delta.classList.add('show');

    animateCounter(entry.els.val, entry.oldSaldo, entry.newSaldo, 1800);
    entry.els.fill.style.width = Math.min(entry.newSaldo / CONFIG.barMax * 100, 100) + '%';

    setTimeout(() => {
      entry.els.val.classList.remove('increasing');
      setStatus(entry, 'DONE ✓', 'done');
    }, 2200);
  }

  /* ----------------------------------------------------------
     Main orchestration
  ---------------------------------------------------------- */
  async function run() {
    document.getElementById('senderLabel').textContent = CONFIG.pengirimNama;

    state.forEach((entry, i) => buildCard(entry, i));
    await wait(600);

    glog(`Batch: ${state.length} transactions — sender: ${CONFIG.pengirimNama}`);
    await wait(400);

    // Phase 1: all kwitansi + fetch + patch in parallel
    glog('Processing kwitansi logs and saldo updates in parallel...');
    const results = await Promise.all(state.map(e => processEntry(e)));

    if (!results.every(Boolean)) {
      glog('One or more transactions failed.', 'log-err'); return;
    }

    glog(`All ${state.length} kwitansi logged and saldo updated.`, 'log-ok');
    await wait(300);

    // Phase 2: animate all
    const flash = document.getElementById('flash');
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 350);

    state.forEach(e => animateCard(e));

    await wait(2600);
    glog('Batch complete. Preparing redirect...', 'log-ok');
    await wait(500);

    startRedirect();
  }

  run();
</script>
</body>
</html>
